<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">HVAC Delta T  temperature split for cooling and heating</title>
  <desc id="heroDesc">Diagram showing return and supply air temperatures and Delta T formulas for AC cooling and furnace heating modes.</desc>

  <!-- Background -->
  <rect width="1000" height="500" fill="#FAFAFA"/>
  <rect x="0" y="0" width="1000" height="88" fill="#152035"/>
  <text x="500" y="40" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="28" font-weight="700">HVAC Delta T</text>
  <text x="500" y="68" text-anchor="middle" fill="#a1a5ae" font-family="system-ui, sans-serif" font-size="15">Temperature split  the fastest first diagnostic check</text>

  <!-- Cooling panel -->
  <rect x="32" y="108" width="460" height="360" rx="16" fill="#fff" stroke="#D5D5D5" stroke-width="1.5"/>
  <rect x="32" y="108" width="460" height="48" rx="16" fill="#E8F8F6"/>
  <rect x="32" y="140" width="460" height="16" fill="#E8F8F6"/>
  <text x="56" y="140" fill="#01AD9F" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Cooling mode</text>
  <text x="56" y="162" fill="#747577" font-family="system-ui, sans-serif" font-size="13">Return  Supply = ”T · Normal: 1622°F</text>

  <rect x="72" y="200" width="96" height="64" rx="8" fill="#E8F8F6" stroke="#01AD9F" stroke-width="2"/>
  <text x="120" y="228" text-anchor="middle" fill="#152035" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Return</text>
  <text x="120" y="250" text-anchor="middle" fill="#01AD9F" font-family="system-ui, sans-serif" font-size="18" font-weight="700">75°F</text>

  <path d="M180 232 H220" stroke="#01AD9F" stroke-width="2.5" marker-end="url(#arrowTeal)"/>
  <rect x="224" y="212" width="72" height="40" rx="6" fill="#152035"/>
  <text x="260" y="238" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Coil</text>

  <path d="M304 232 H344" stroke="#01AD9F" stroke-width="2.5" marker-end="url(#arrowTeal)"/>
  <rect x="348" y="200" width="96" height="64" rx="8" fill="#E8F8F6" stroke="#01AD9F" stroke-width="2"/>
  <text x="396" y="228" text-anchor="middle" fill="#152035" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Supply</text>
  <text x="396" y="250" text-anchor="middle" fill="#2563EB" font-family="system-ui, sans-serif" font-size="18" font-weight="700">55°F</text>

  <rect x="72" y="300" width="372" height="52" rx="10" fill="#FAFAFA" stroke="#D5D5D5"/>
  <text x="258" y="334" text-anchor="middle" fill="#152035" font-family="system-ui, sans-serif" font-size="17" font-weight="600">”T = 75°F  55°F = <tspan fill="#01AD9F" font-weight="700">20°F</tspan></text>

  <!-- Heating panel -->
  <rect x="508" y="108" width="460" height="360" rx="16" fill="#fff" stroke="#D5D5D5" stroke-width="1.5"/>
  <rect x="508" y="108" width="460" height="48" rx="16" fill="#FFF7ED"/>
  <rect x="508" y="140" width="460" height="16" fill="#FFF7ED"/>
  <text x="532" y="140" fill="#EA580C" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Heating mode</text>
  <text x="532" y="162" fill="#747577" font-family="system-ui, sans-serif" font-size="13">Supply  Return = ”T · Normal: 4070°F</text>

  <rect x="548" y="200" width="96" height="64" rx="8" fill="#FFF7ED" stroke="#EA580C" stroke-width="2"/>
  <text x="596" y="228" text-anchor="middle" fill="#152035" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Return</text>
  <text x="596" y="250" text-anchor="middle" fill="#2563EB" font-family="system-ui, sans-serif" font-size="18" font-weight="700">65°F</text>

  <path d="M656 232 H696" stroke="#EA580C" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <rect x="700" y="212" width="72" height="40" rx="6" fill="#152035"/>
  <text x="736" y="232" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Heat</text>
  <text x="736" y="246" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Exch.</text>

  <path d="M780 232 H820" stroke="#EA580C" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <rect x="824" y="200" width="96" height="64" rx="8" fill="#FFF7ED" stroke="#EA580C" stroke-width="2"/>
  <text x="872" y="228" text-anchor="middle" fill="#152035" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Supply</text>
  <text x="872" y="250" text-anchor="middle" fill="#EA580C" font-family="system-ui, sans-serif" font-size="18" font-weight="700">115°F</text>

  <rect x="548" y="300" width="372" height="52" rx="10" fill="#FAFAFA" stroke="#D5D5D5"/>
  <text x="734" y="334" text-anchor="middle" fill="#152035" font-family="system-ui, sans-serif" font-size="17" font-weight="600">”T = 115°F  65°F = <tspan fill="#EA580C" font-weight="700">50°F</tspan></text>

  <!-- Brand accent -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>

  <defs>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#01AD9F"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#EA580C"/>
    </marker>
  </defs>
</svg>
