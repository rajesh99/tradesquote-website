<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Duct size calculator  CFM to round duct diameter</title>
  <desc id="heroDesc">Hero illustration showing an air handler, round sheet metal trunk duct, flex branch duct, and supply register with CFM and velocity sizing badges.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0FDFA"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F0F9FF"/>
    </linearGradient>
    <linearGradient id="tealBlob" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D9488" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="cyanBlob" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0891B2" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94A3B8"/>
      <stop offset="50%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <linearGradient id="flexGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#78716C"/>
      <stop offset="50%" stop-color="#A8A29E"/>
      <stop offset="100%" stop-color="#78716C"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="airFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#14B8A6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <ellipse cx="780" cy="100" rx="175" ry="130" fill="url(#tealBlob)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="340" rx="155" ry="120" fill="url(#cyanBlob)" filter="url(#softBlur)"/>
  <ellipse cx="640" cy="400" rx="115" ry="90" fill="url(#tealBlob)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="72" width="380" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.45" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>

  <text x="80" y="200" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Duct Size</tspan>
    <tspan x="80" dy="44" fill="#0D9488">Calculator</tspan>
  </text>
  <text x="80" y="290" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">CFM ’ round duct diameter</text>
  <rect x="80" y="310" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Metric badges -->
  <g filter="url(#cardShadow)">
    <rect x="80" y="336" width="96" height="34" rx="10" fill="#FFFFFF" stroke="#99F6E4" stroke-width="1.5"/>
    <text x="128" y="358" text-anchor="middle" fill="#0D9488" font-family="system-ui, sans-serif" font-size="12" font-weight="700">400 CFM</text>

    <rect x="188" y="336" width="96" height="34" rx="10" fill="#FFFFFF" stroke="#A5F3FC" stroke-width="1.5"/>
    <text x="236" y="358" text-anchor="middle" fill="#0891B2" font-family="system-ui, sans-serif" font-size="12" font-weight="700">733 fpm</text>

    <rect x="296" y="336" width="96" height="34" rx="10" fill="#FFFFFF" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="344" y="358" text-anchor="middle" fill="#0F766E" font-family="system-ui, sans-serif" font-size="12" font-weight="700">10" metal</text>
  </g>

  <!-- Equipment diagram -->
  <g transform="translate(480, 90)">

    <!-- Air handler / furnace -->
    <g filter="url(#cardShadow)">
      <rect x="0" y="40" width="150" height="130" rx="10" fill="#334155" stroke="#475569" stroke-width="2"/>
      <rect x="12" y="52" width="126" height="72" rx="6" fill="#1E293B"/>
      <!-- Blower fan -->
      <circle cx="75" cy="88" r="28" fill="none" stroke="#64748B" stroke-width="2"/>
      <circle cx="75" cy="88" r="20" fill="none" stroke="#475569" stroke-width="1.5"/>
      <g transform="translate(75, 88)">
        <path d="M0,-16 L3.5,-5 L16,-5 L5.5,2 L9,14 L0,7 L-9,14 L-5.5,2 L-16,-5 L-3.5,-5 Z" fill="#0D9488" opacity="0.95"/>
      </g>
      <!-- Control panel -->
      <rect x="28" y="132" width="94" height="22" rx="4" fill="#0F172A"/>
      <circle cx="46" cy="143" r="3.5" fill="#22C55E"/>
      <circle cx="60" cy="143" r="3.5" fill="#0D9488"/>
      <text x="75" y="147" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="8" font-weight="600">AIR HANDLER</text>
    </g>

    <!-- Connector plenum -->
    <path d="M150,105 L175,105 L175,125 L150,125 Z" fill="url(#metalGrad)"/>

    <!-- Round sheet metal trunk duct -->
    <g transform="translate(175, 85)">
      <ellipse cx="32" cy="0" rx="32" ry="11" fill="#64748B"/>
      <rect x="0" y="0" width="64" height="110" fill="url(#metalGrad)"/>
      <ellipse cx="32" cy="110" rx="32" ry="11" fill="#475569"/>
      <!-- Airflow arrows -->
      <g opacity="0.55">
        <path d="M32,18 L32,38" stroke="#14B8A6" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M27,33 L32,40 L37,33" fill="#14B8A6"/>
        <path d="M32,48 L32,68" stroke="#14B8A6" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M27,63 L32,70 L37,63" fill="#14B8A6"/>
        <path d="M32,78 L32,98" stroke="#14B8A6" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M27,93 L32,100 L37,93" fill="#14B8A6"/>
      </g>
      <text x="32" y="138" text-anchor="middle" fill="#0F172A" font-family="system-ui, sans-serif" font-size="11" font-weight="700">10" TRUNK</text>
      <text x="32" y="152" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9" font-weight="500">SHEET METAL</text>
    </g>

    <!-- Tee / branch fitting -->
    <path d="M239,195 L280,195 L280,210 L239,210 Z" fill="url(#metalGrad)"/>

    <!-- Flex duct branch -->
    <g transform="translate(280, 175)">
      <ellipse cx="20" cy="0" rx="20" ry="7" fill="#78716C"/>
      <rect x="0" y="0" width="40" height="70" fill="url(#flexGrad)"/>
      <line x1="-16" y1="10" x2="16" y2="10" stroke="#57534E" stroke-width="1"/>
      <line x1="-16" y1="22" x2="16" y2="22" stroke="#57534E" stroke-width="1"/>
      <line x1="-16" y1="34" x2="16" y2="34" stroke="#57534E" stroke-width="1"/>
      <line x1="-16" y1="46" x2="16" y2="46" stroke="#57534E" stroke-width="1"/>
      <line x1="-16" y1="58" x2="16" y2="58" stroke="#57534E" stroke-width="1"/>
      <ellipse cx="20" cy="70" rx="20" ry="7" fill="#57534E"/>
      <text x="20" y="92" text-anchor="middle" fill="#0F172A" font-family="system-ui, sans-serif" font-size="10" font-weight="700">12" FLEX</text>
      <text x="20" y="104" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="8" font-weight="500">BRANCH</text>
    </g>

    <!-- Supply register -->
    <g transform="translate(340, 210)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="72" height="52" rx="5" fill="#334155" stroke="#64748B" stroke-width="1.5"/>
      <line x1="8" y1="10" x2="64" y2="10" stroke="#94A3B8" stroke-width="2"/>
      <line x1="8" y1="20" x2="64" y2="20" stroke="#94A3B8" stroke-width="2"/>
      <line x1="8" y1="30" x2="64" y2="30" stroke="#94A3B8" stroke-width="2"/>
      <line x1="8" y1="40" x2="64" y2="40" stroke="#94A3B8" stroke-width="2"/>
      <text x="36" y="68" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="8" font-weight="600">SUPPLY REGISTER</text>
    </g>

    <!-- Diameter comparison card -->
    <g transform="translate(0, 210)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="130" height="88" rx="14" fill="#FFFFFF" fill-opacity="0.94" stroke="#E2E8F0" stroke-width="1.5"/>
      <text x="16" y="24" fill="#64748B" font-family="system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em">SIZING CHART</text>
      <circle cx="28" cy="52" r="14" fill="none" stroke="#94A3B8" stroke-width="3"/>
      <circle cx="28" cy="52" r="9" fill="none" stroke="#CBD5E1" stroke-width="2"/>
      <text x="52" y="48" fill="#0F172A" font-family="system-ui, sans-serif" font-size="11" font-weight="600">10" ’ 425 CFM</text>
      <text x="52" y="64" fill="#64748B" font-family="system-ui, sans-serif" font-size="10">12" flex ’ ~320 CFM</text>
      <rect x="16" y="72" width="98" height="5" rx="2.5" fill="#E2E8F0"/>
      <rect x="16" y="72" width="72" height="5" rx="2.5" fill="url(#accentBar)"/>
    </g>

    <!-- Velocity gauge -->
    <g transform="translate(420, 30)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="100" height="100" rx="16" fill="#FFFFFF" fill-opacity="0.94" stroke="#E2E8F0" stroke-width="1.5"/>
      <circle cx="50" cy="52" r="32" stroke="#E2E8F0" stroke-width="1.5" fill="none"/>
      <path d="M50,20 A32,32 0 0 1 78,52" stroke="#0D9488" stroke-width="5" stroke-linecap="round" fill="none"/>
      <circle cx="50" cy="52" r="4" fill="#0D9488"/>
      <line x1="50" y1="52" x2="68" y2="38" stroke="#0D9488" stroke-width="2" stroke-linecap="round"/>
      <text x="50" y="88" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9" font-weight="600">d 900 fpm</text>
    </g>
  </g>

  <!-- Decorative dots -->
  <circle cx="460" cy="120" r="3" fill="#0D9488" fill-opacity="0.3"/>
  <circle cx="920" cy="180" r="4" fill="#0891B2" fill-opacity="0.3"/>
  <circle cx="860" cy="420" r="3.5" fill="#14B8A6" fill-opacity="0.35"/>
</svg>
