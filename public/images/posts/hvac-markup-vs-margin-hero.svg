<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">HVAC Markup vs Margin - contractor pricing hero</title>
  <desc id="heroDesc">Abstract panoramic hero with soft gradients and geometric shapes representing markup and margin pricing concepts.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="40%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="markupGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="marginGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="costGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Ambient blobs -->
  <ellipse cx="760" cy="110" rx="210" ry="170" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="860" cy="360" rx="160" ry="130" fill="url(#tealGrad)" filter="url(#softBlur)"/>
  <ellipse cx="640" cy="400" rx="140" ry="110" fill="url(#indigoGrad)" filter="url(#softBlur)"/>

  <!-- Left headline zone  clean, minimal -->
  <rect x="40" y="60" width="420" height="380" rx="28" fill="#FFFFFF" fill-opacity="0.55" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.85"/>

  <g opacity="0.12">
    <circle cx="72" cy="130" r="2" fill="#94A3B8"/>
    <circle cx="112" cy="170" r="2" fill="#94A3B8"/>
    <circle cx="152" cy="110" r="2" fill="#94A3B8"/>
    <circle cx="192" cy="210" r="2" fill="#94A3B8"/>
    <circle cx="92" cy="270" r="2" fill="#94A3B8"/>
    <circle cx="172" cy="310" r="2" fill="#94A3B8"/>
    <circle cx="232" cy="150" r="2" fill="#94A3B8"/>
    <circle cx="52" cy="350" r="2" fill="#94A3B8"/>
    <circle cx="280" cy="200" r="2" fill="#94A3B8"/>
    <circle cx="320" cy="280" r="2" fill="#94A3B8"/>
    <circle cx="360" cy="140" r="2" fill="#94A3B8"/>
    <circle cx="400" cy="340" r="2" fill="#94A3B8"/>
  </g>

  <!-- Subtle accent line in headline zone -->
  <rect x="72" y="380" width="64" height="4" rx="2" fill="url(#accentBar)" opacity="0.7"/>

  <!-- Abstract pricing bars  markup model (cost + markup stacked) -->
  <g transform="translate(560, 120)">
    <rect x="0" y="80" width="88" height="200" rx="12" fill="#FFFFFF" fill-opacity="0.5" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect x="12" y="180" width="64" height="88" rx="8" fill="url(#costGrad)" opacity="0.75"/>
    <rect x="12" y="92" width="64" height="80" rx="8" fill="url(#markupGrad)" opacity="0.88" filter="url(#glow)"/>
    <line x1="0" y1="80" x2="88" y2="80" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
    <circle cx="44" cy="68" r="18" fill="#FFFFFF" fill-opacity="0.9" stroke="#7DD3FC" stroke-width="1.5"/>
    <text x="44" y="73" text-anchor="middle" fill="#0369A1" font-family="system-ui, sans-serif" font-size="14" font-weight="700">%</text>
  </g>

  <!-- Abstract pricing bars  margin model (margin slice of total) -->
  <g transform="translate(700, 120)">
    <rect x="0" y="80" width="88" height="200" rx="12" fill="#FFFFFF" fill-opacity="0.5" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect x="12" y="92" width="64" height="176" rx="8" fill="url(#costGrad)" opacity="0.45"/>
    <rect x="12" y="92" width="64" height="72" rx="8" fill="url(#marginGrad)" opacity="0.9" filter="url(#glow)"/>
    <line x1="0" y1="80" x2="88" y2="80" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
    <circle cx="44" cy="68" r="18" fill="#FFFFFF" fill-opacity="0.9" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="44" y="73" text-anchor="middle" fill="#0F766E" font-family="system-ui, sans-serif" font-size="14" font-weight="700">%</text>
  </g>

  <!-- Connecting arc  visual link between concepts -->
  <path
    d="M 648 200 Q 680 160 712 200"
    stroke="#94A3B8"
    stroke-width="1.5"
    stroke-linecap="round"
    fill="none"
    stroke-dasharray="5 6"
    opacity="0.6"
  />
  <path
    d="M 648 260 Q 680 300 712 260"
    stroke="#94A3B8"
    stroke-width="1.5"
    stroke-linecap="round"
    fill="none"
    stroke-dasharray="5 6"
    opacity="0.6"
  />

  <!-- Floating abstract shapes -->
  <rect x="840" y="88" width="64" height="64" rx="16" fill="#FFFFFF" fill-opacity="0.72" stroke="#BAE6FD" stroke-width="1.5" transform="rotate(-10 872 120)"/>
  <circle cx="520" cy="340" r="32" fill="#FFFFFF" fill-opacity="0.65" stroke="#99F6E4" stroke-width="1.5"/>
  <rect x="880" y="320" width="52" height="52" rx="13" fill="#FFFFFF" fill-opacity="0.6" stroke="#C7D2FE" stroke-width="1.5" transform="rotate(14 906 346)"/>

  <!-- Horizontal baseline grid -->
  <line x1="520" y1="380" x2="940" y2="380" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="520" y1="340" x2="940" y2="340" stroke="#F1F5F9" stroke-width="1"/>
  <line x1="520" y1="300" x2="940" y2="300" stroke="#F1F5F9" stroke-width="1"/>

  <!-- Small badge pills -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="548" y="400" width="88" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#7DD3FC" stroke-width="1.5"/>
    <text x="592" y="420" text-anchor="middle" fill="#0369A1" font-size="11" font-weight="700" letter-spacing="1.2">MARKUP</text>

    <rect x="688" y="400" width="88" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="732" y="420" text-anchor="middle" fill="#0F766E" font-size="11" font-weight="700" letter-spacing="1.2">MARGIN</text>
  </g>

  <!-- Decorative ring -->
  <circle cx="820" cy="200" r="56" stroke="#E2E8F0" stroke-width="1.5" fill="none"/>
  <circle cx="820" cy="200" r="40" stroke="#E2E8F0" stroke-width="1" fill="none" stroke-dasharray="5 7"/>
  <path
    d="M 820 144 A 56 56 0 0 1 876 200"
    stroke="url(#accentBar)"
    stroke-width="6"
    stroke-linecap="round"
    fill="none"
    opacity="0.75"
    filter="url(#glow)"
  />

  <!-- Bottom accent -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
