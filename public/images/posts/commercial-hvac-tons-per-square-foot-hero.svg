<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Commercial HVAC tons per square foot</title>
  <desc>Abstract hero graphic with soft gradients, a commercial building outline and bars representing how cooling tonnage per square foot varies by building type.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="bldgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="190" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Commercial HVAC</tspan>
    <tspan x="80" dy="46" fill="#01AD9F">tons per sq ft</tspan>
  </text>
  <text x="80" y="290" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Sizing by building type</text>
  <rect x="80" y="314" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Commercial building -->
  <rect x="560" y="150" width="180" height="210" rx="8" fill="url(#bldgGrad)" stroke="#2563EB" stroke-width="2" stroke-opacity="0.5"/>
  <g fill="#FFFFFF" fill-opacity="0.5" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4">
    <rect x="578" y="170" width="26" height="26" rx="3"/>
    <rect x="618" y="170" width="26" height="26" rx="3"/>
    <rect x="658" y="170" width="26" height="26" rx="3"/>
    <rect x="698" y="170" width="26" height="26" rx="3"/>
    <rect x="578" y="210" width="26" height="26" rx="3"/>
    <rect x="618" y="210" width="26" height="26" rx="3"/>
    <rect x="658" y="210" width="26" height="26" rx="3"/>
    <rect x="698" y="210" width="26" height="26" rx="3"/>
    <rect x="578" y="250" width="26" height="26" rx="3"/>
    <rect x="618" y="250" width="26" height="26" rx="3"/>
    <rect x="658" y="250" width="26" height="26" rx="3"/>
    <rect x="698" y="250" width="26" height="26" rx="3"/>
  </g>
  <!-- rooftop unit -->
  <rect x="610" y="128" width="80" height="24" rx="4" fill="#01AD9F" fill-opacity="0.3" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- varying bars (tonnage by use) -->
  <g>
    <rect x="770" y="250" width="34" height="110" rx="5" fill="url(#barGrad)" opacity="0.9" filter="url(#glow)"/>
    <rect x="812" y="200" width="34" height="160" rx="5" fill="url(#barGrad)" opacity="0.7"/>
    <rect x="854" y="300" width="34" height="60" rx="5" fill="url(#barGrad)" opacity="0.5"/>
    <line x1="760" y1="360" x2="900" y2="360" stroke="#94A3B8" stroke-width="2" stroke-opacity="0.5"/>
  </g>

  <!-- tons badge -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="600" y="96" width="100" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="650" y="115" text-anchor="middle" fill="#0F766E" font-size="12" font-weight="800" letter-spacing="0.5">TONS</text>
  </g>

  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
