<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Mini split AC calculator</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, an outdoor condenser unit linked by lines to multiple indoor wall-mounted heads serving separate rooms, representing mini split zone sizing.</desc>

  <defs>
    <linearGradient id="ms-bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="ms-skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="ms-tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="ms-unitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="ms-headGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="ms-accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="ms-softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="ms-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#ms-bgGrad)"/>
  <ellipse cx="800" cy="110" rx="210" ry="160" fill="url(#ms-skyGrad)" filter="url(#ms-softBlur)"/>
  <ellipse cx="660" cy="400" rx="180" ry="130" fill="url(#ms-tealGrad)" filter="url(#ms-softBlur)"/>

  <!-- Frosted card left -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="195" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Mini split</tspan>
    <tspan x="80" dy="48" fill="#01AD9F">AC calculator</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Size ductless AC by room &amp; zone</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#ms-accentBar)"/>

  <!-- Outdoor condenser unit (right side, centered vertically) -->
  <rect x="580" y="280" width="80" height="110" rx="10" fill="url(#ms-unitGrad)" stroke="#01AD9F" stroke-width="2.5" stroke-opacity="0.6"/>
  <!-- Fan circle on condenser -->
  <circle cx="620" cy="335" r="28" fill="none" stroke="#01AD9F" stroke-width="1.8" stroke-opacity="0.45"/>
  <circle cx="620" cy="335" r="6" fill="#01AD9F" fill-opacity="0.3"/>
  <line x1="620" y1="307" x2="620" y2="363" stroke="#01AD9F" stroke-width="1.4" stroke-opacity="0.3"/>
  <line x1="592" y1="335" x2="648" y2="335" stroke="#01AD9F" stroke-width="1.4" stroke-opacity="0.3"/>
  <!-- Condenser label -->
  <text x="620" y="405" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">outdoor</text>
  <text x="620" y="418" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">condenser</text>

  <!-- Refrigerant line trunk up from condenser -->
  <line x1="620" y1="280" x2="620" y2="200" stroke="#01AD9F" stroke-width="2.5" stroke-opacity="0.5" stroke-dasharray="6 3"/>

  <!-- Branch point -->
  <circle cx="620" cy="200" r="5" fill="#01AD9F" fill-opacity="0.7"/>

  <!-- Branch line to head 1 (top left) -->
  <line x1="620" y1="200" x2="720" y2="140" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.45" stroke-dasharray="5 3"/>
  <!-- Branch line to head 2 (middle) -->
  <line x1="620" y1="200" x2="750" y2="230" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.45" stroke-dasharray="5 3"/>
  <!-- Branch line to head 3 (lower) -->
  <line x1="620" y1="200" x2="720" y2="310" stroke="#0EA5E9" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="5 3"/>

  <!-- Indoor head 1 — bedroom / zone 1 -->
  <rect x="720" y="110" width="100" height="32" rx="8" fill="url(#ms-headGrad)" stroke="#0EA5E9" stroke-width="1.8" stroke-opacity="0.65"/>
  <text x="770" y="131" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700">Zone 1</text>
  <!-- Airflow arrows head 1 -->
  <path d="M752 142 l-5 8 M762 142 l-5 8 M772 142 l-5 8" stroke="#38BDF8" stroke-width="1.5" stroke-opacity="0.6" fill="none"/>

  <!-- Indoor head 2 — living room / zone 2 -->
  <rect x="750" y="200" width="100" height="32" rx="8" fill="url(#ms-headGrad)" stroke="#0EA5E9" stroke-width="1.8" stroke-opacity="0.65"/>
  <text x="800" y="221" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700">Zone 2</text>
  <!-- Airflow arrows head 2 -->
  <path d="M782 232 l-5 8 M792 232 l-5 8 M802 232 l-5 8" stroke="#38BDF8" stroke-width="1.5" stroke-opacity="0.6" fill="none"/>

  <!-- Indoor head 3 — bedroom 2 / zone 3 -->
  <rect x="720" y="282" width="100" height="32" rx="8" fill="url(#ms-headGrad)" stroke="#2563EB" stroke-width="1.8" stroke-opacity="0.5"/>
  <text x="770" y="303" text-anchor="middle" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700">Zone 3</text>
  <!-- Airflow arrows head 3 -->
  <path d="M752 314 l-5 8 M762 314 l-5 8 M772 314 l-5 8" stroke="#38BDF8" stroke-width="1.4" stroke-opacity="0.5" fill="none"/>

  <!-- BTU badge -->
  <rect x="840" y="148" width="108" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="894" y="168" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">1 head / zone</text>

  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
