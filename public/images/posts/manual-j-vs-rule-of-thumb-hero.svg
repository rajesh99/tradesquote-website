<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Manual J vs Rule of Thumb - HVAC load calculation methods</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients contrasting a precise blueprint grid with a rough sketch, representing Manual J load calculation versus square-footage rules of thumb.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Soft ambient blobs -->
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="280" rx="120" ry="120" fill="url(#indigoGrad)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>

  <g opacity="0.16">
    <circle cx="80" cy="140" r="2" fill="#94A3B8"/>
    <circle cx="120" cy="180" r="2" fill="#94A3B8"/>
    <circle cx="160" cy="120" r="2" fill="#94A3B8"/>
    <circle cx="200" cy="220" r="2" fill="#94A3B8"/>
    <circle cx="100" cy="280" r="2" fill="#94A3B8"/>
    <circle cx="180" cy="320" r="2" fill="#94A3B8"/>
    <circle cx="240" cy="160" r="2" fill="#94A3B8"/>
    <circle cx="60" cy="360" r="2" fill="#94A3B8"/>
  </g>

  <text x="80" y="200" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Manual J vs</tspan>
    <tspan x="80" dy="46" fill="#01AD9F">Rule of Thumb</tspan>
  </text>
  <text x="80" y="296" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Sizing done right</text>
  <rect x="80" y="318" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Right metaphor: precise blueprint grid vs rough sketch -->

  <!-- Precise blueprint panel -->
  <rect x="572" y="116" width="240" height="180" rx="16" fill="#FFFFFF" fill-opacity="0.7" stroke="#5EEAD4" stroke-width="1.5"/>
  <g stroke="#99F6E4" stroke-width="1" opacity="0.7">
    <line x1="600" y1="116" x2="600" y2="296"/>
    <line x1="640" y1="116" x2="640" y2="296"/>
    <line x1="680" y1="116" x2="680" y2="296"/>
    <line x1="720" y1="116" x2="720" y2="296"/>
    <line x1="760" y1="116" x2="760" y2="296"/>
    <line x1="572" y1="156" x2="812" y2="156"/>
    <line x1="572" y1="196" x2="812" y2="196"/>
    <line x1="572" y1="236" x2="812" y2="236"/>
    <line x1="572" y1="276" x2="812" y2="276"/>
  </g>
  <!-- Floor plan rooms on the grid -->
  <rect x="592" y="148" width="96" height="72" rx="4" fill="none" stroke="url(#gridGrad)" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="700" y="148" width="96" height="40" rx="4" fill="none" stroke="url(#gridGrad)" stroke-width="2.5"/>
  <rect x="700" y="200" width="96" height="60" rx="4" fill="none" stroke="url(#gridGrad)" stroke-width="2.5"/>
  <rect x="592" y="232" width="96" height="40" rx="4" fill="none" stroke="url(#gridGrad)" stroke-width="2.5"/>
  <circle cx="640" cy="184" r="4" fill="#2563EB"/>
  <circle cx="748" cy="168" r="4" fill="#01AD9F"/>

  <!-- Rough sketch shapes (the rule of thumb) floating off to the side -->
  <g opacity="0.85">
    <rect x="600" y="92" width="64" height="48" rx="10" fill="#FFFFFF" fill-opacity="0.65" stroke="#C7D2FE" stroke-width="1.5" transform="rotate(-10 632 116)"/>
    <path d="M824 322 q40 -28 84 4" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" fill="none" stroke-dasharray="5 6"/>
    <rect x="828" y="160" width="52" height="52" rx="14" fill="#FFFFFF" fill-opacity="0.6" stroke="#BAE6FD" stroke-width="1.5" transform="rotate(16 854 186)"/>
  </g>

  <!-- Method badges -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="548" y="316" width="120" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="608" y="337" text-anchor="middle" fill="#0F766E" font-size="13" font-weight="700" letter-spacing="0.5">Manual J</text>

    <rect x="700" y="316" width="132" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.92" stroke="#FED7AA" stroke-width="1.5"/>
    <text x="766" y="337" text-anchor="middle" fill="#C2410C" font-size="12" font-weight="700" letter-spacing="0.5">Rule of thumb</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
