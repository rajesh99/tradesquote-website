<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Furnace replacement cost - 2026 price guide</title>
  <desc>Abstract hero graphic with soft gradients, a stylized furnace with a warm flame, a price tag, and rising cost bars representing what a new furnace costs to install.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="furnaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#E2E8F0" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="55%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="barTeal" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Soft ambient blobs -->
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="280" rx="120" ry="120" fill="url(#amberGrad)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>

  <g opacity="0.16">
    <circle cx="80" cy="140" r="2" fill="#94A3B8"/>
    <circle cx="120" cy="180" r="2" fill="#94A3B8"/>
    <circle cx="160" cy="120" r="2" fill="#94A3B8"/>
    <circle cx="200" cy="220" r="2" fill="#94A3B8"/>
    <circle cx="100" cy="280" r="2" fill="#94A3B8"/>
    <circle cx="180" cy="320" r="2" fill="#94A3B8"/>
    <circle cx="240" cy="160" r="2" fill="#94A3B8"/>
    <circle cx="60" cy="360" r="2" fill="#94A3B8"/>
  </g>

  <text x="80" y="200" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Furnace</tspan>
    <tspan x="80" dy="50" fill="#01AD9F">replacement cost</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">2026 price guide</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Furnace cabinet -->
  <rect x="560" y="150" width="150" height="210" rx="14" fill="url(#furnaceGrad)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Burner viewport -->
  <rect x="586" y="186" width="98" height="74" rx="8" fill="#0F172A" fill-opacity="0.10" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Flame -->
  <path d="M635 250 C 612 232, 620 210, 635 196 C 642 210, 656 212, 652 232 C 668 224, 668 244, 658 254 C 652 262, 642 264, 635 250 Z" fill="url(#flameGrad)" filter="url(#glow)"/>
  <!-- Control panel lines -->
  <rect x="586" y="278" width="98" height="6" rx="3" fill="#01AD9F" fill-opacity="0.18"/>
  <rect x="586" y="294" width="70" height="6" rx="3" fill="#01AD9F" fill-opacity="0.14"/>
  <circle cx="672" cy="297" r="6" fill="#FBBF24" fill-opacity="0.7"/>
  <!-- Feet -->
  <rect x="572" y="360" width="14" height="14" rx="3" fill="#94A3B8" fill-opacity="0.5"/>
  <rect x="684" y="360" width="14" height="14" rx="3" fill="#94A3B8" fill-opacity="0.5"/>
  <!-- PVC vent stubs -->
  <rect x="600" y="120" width="18" height="34" rx="6" fill="#FFFFFF" fill-opacity="0.7" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="652" y="120" width="18" height="34" rx="6" fill="#FFFFFF" fill-opacity="0.7" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Rising cost bars -->
  <rect x="760" y="300" width="34" height="60" rx="6" fill="url(#barTeal)" opacity="0.85"/>
  <rect x="804" y="262" width="34" height="98" rx="6" fill="url(#barTeal)" opacity="0.9"/>
  <rect x="848" y="216" width="34" height="144" rx="6" fill="url(#barTeal)"/>
  <path d="M768 296 L812 256 L856 212" stroke="#2563EB" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.75" filter="url(#glow)"/>
  <path d="M856 212 l -3 14 l 13 -7" fill="#2563EB" opacity="0.8"/>

  <!-- Price tag -->
  <g font-family="system-ui, -apple-system, sans-serif" transform="rotate(-10 800 150)">
    <path d="M732 124 L820 124 L862 162 L820 200 L732 200 Z" fill="#FFFFFF" fill-opacity="0.92" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.55"/>
    <circle cx="836" cy="162" r="7" fill="none" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.6"/>
    <text x="772" y="170" text-anchor="middle" fill="#0F766E" font-size="20" font-weight="800">$</text>
  </g>

  <!-- Floating rounded shapes -->
  <rect x="700" y="92" width="50" height="50" rx="14" fill="#FFFFFF" fill-opacity="0.6" stroke="#99F6E4" stroke-width="1.5" transform="rotate(14 725 117)"/>
  <circle cx="930" cy="160" r="22" fill="#FFFFFF" fill-opacity="0.6" stroke="#5EEAD4" stroke-width="1.5"/>
  <circle cx="730" cy="410" r="16" fill="#FFFFFF" fill-opacity="0.6" stroke="#FCD34D" stroke-width="1.5"/>

  <!-- AFUE badge -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="586" y="318" width="76" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="624" y="338" text-anchor="middle" fill="#0F766E" font-size="12" font-weight="700" letter-spacing="1">AFUE</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
