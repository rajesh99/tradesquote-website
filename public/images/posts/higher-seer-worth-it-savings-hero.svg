<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Does a higher SEER save money</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, a descending bar chart and a savings gauge representing how a higher SEER rating lowers annual cooling cost.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="200" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Higher SEER,</tspan>
    <tspan x="80" dy="50" fill="#01AD9F">lower bills?</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">What efficiency really saves</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Descending bars -->
  <g>
    <rect x="560" y="180" width="56" height="200" rx="8" fill="url(#barGrad)" opacity="0.9" filter="url(#glow)"/>
    <rect x="632" y="230" width="56" height="150" rx="8" fill="url(#barGrad)" opacity="0.75"/>
    <rect x="704" y="270" width="56" height="110" rx="8" fill="url(#barGrad)" opacity="0.6"/>
    <rect x="776" y="300" width="56" height="80" rx="8" fill="url(#barGrad)" opacity="0.45"/>
    <line x1="548" y1="380" x2="860" y2="380" stroke="#94A3B8" stroke-width="2" stroke-opacity="0.5"/>
  </g>

  <!-- Downward savings arrow -->
  <path d="M580 150 C 660 150, 760 200, 840 260" stroke="#16A34A" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.85" filter="url(#glow)"/>
  <path d="M840 260 l -3 -15 l 14 7" fill="#16A34A" opacity="0.9"/>

  <!-- $/yr badge -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="556" y="118" width="104" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="608" y="138" text-anchor="middle" fill="#0F766E" font-size="12" font-weight="700" letter-spacing="0.5">$ / year</text>
  </g>

  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
