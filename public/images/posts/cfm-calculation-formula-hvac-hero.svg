<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">CFM Calculation Formula for HVAC</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients showing airflow arrows, a duct cross-section, and the CFM formula, representing how to calculate cubic feet per minute in HVAC systems.</desc>

  <defs>
    <linearGradient id="cfmBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="cfmSkyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="cfmTealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="cfmDuctGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="cfmStreamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="cfmAccentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="cfmSoftBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="cfmGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#cfmBgGrad)"/>
  <ellipse cx="780" cy="130" rx="210" ry="165" fill="url(#cfmSkyGrad)" filter="url(#cfmSoftBlur)"/>
  <ellipse cx="660" cy="390" rx="175" ry="135" fill="url(#cfmTealGrad)" filter="url(#cfmSoftBlur)"/>

  <!-- Frosted card -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="190" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">CFM Formula</tspan>
    <tspan x="80" dy="48" fill="#01AD9F">for HVAC</tspan>
  </text>
  <text x="80" y="292" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">400 CFM per ton · BTU ÷ (1.08 × ΔT)</text>
  <rect x="80" y="316" width="56" height="4" rx="2" fill="url(#cfmAccentBar)"/>

  <!-- Horizontal duct body -->
  <rect x="555" y="210" width="320" height="80" rx="10" fill="url(#cfmDuctGrad)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.50"/>

  <!-- Duct left cap (circle cross-section view) -->
  <ellipse cx="563" cy="250" rx="12" ry="40" fill="#FFFFFF" fill-opacity="0.35" stroke="#01AD9F" stroke-width="1.8" stroke-opacity="0.55"/>

  <!-- Duct right opening (grille lines) -->
  <rect x="867" y="202" width="18" height="96" rx="4" fill="#FFFFFF" fill-opacity="0.55" stroke="#2563EB" stroke-width="1.4" stroke-opacity="0.45"/>
  <line x1="867" y1="222" x2="885" y2="222" stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.38"/>
  <line x1="867" y1="242" x2="885" y2="242" stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.38"/>
  <line x1="867" y1="262" x2="885" y2="262" stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.38"/>
  <line x1="867" y1="282" x2="885" y2="282" stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.38"/>

  <!-- Airflow arrows inside duct, left to right -->
  <path d="M590 233 C 660 233, 730 233, 800 233" stroke="url(#cfmStreamGrad)" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.80" filter="url(#cfmGlow)"/>
  <path d="M590 250 C 660 250, 730 250, 800 250" stroke="url(#cfmStreamGrad)" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.65" filter="url(#cfmGlow)"/>
  <path d="M590 267 C 660 267, 730 267, 800 267" stroke="url(#cfmStreamGrad)" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.50" filter="url(#cfmGlow)"/>
  <!-- Arrow heads -->
  <path d="M800 233 l-10 -5 l 0 10 Z" fill="#0EA5E9" opacity="0.85"/>
  <path d="M800 250 l-10 -5 l 0 10 Z" fill="#0EA5E9" opacity="0.70"/>
  <path d="M800 267 l-10 -5 l 0 10 Z" fill="#0EA5E9" opacity="0.55"/>

  <!-- CFM badge above duct -->
  <rect x="650" y="158" width="160" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.90" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="730" y="182" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" letter-spacing="0.5">400 CFM / ton</text>

  <!-- Formula badge below duct -->
  <rect x="565" y="310" width="310" height="38" rx="10" fill="#FFFFFF" fill-opacity="0.88" stroke="#2563EB" stroke-width="1.3" stroke-opacity="0.40"/>
  <text x="720" y="334" text-anchor="middle" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700">CFM = BTU/hr ÷ (1.08 × ΔT)</text>

  <!-- Velocity badge -->
  <rect x="650" y="370" width="200" height="34" rx="17" fill="#01AD9F" fill-opacity="0.12" stroke="#01AD9F" stroke-width="1.2"/>
  <text x="750" y="392" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" font-weight="700">V = CFM ÷ area (sq ft)</text>

  <!-- Bottom teal strip -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
