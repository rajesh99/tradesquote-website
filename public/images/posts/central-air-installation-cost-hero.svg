<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Central air installation cost - 2026 price guide</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, an outdoor AC condenser unit, a price tag, and cost bars representing the cost to install central air conditioning.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="unitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#E2E8F0" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="barTeal" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Soft ambient blobs -->
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="280" rx="120" ry="120" fill="url(#indigoGrad)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>

  <g opacity="0.16">
    <circle cx="80" cy="140" r="2" fill="#94A3B8"/>
    <circle cx="120" cy="180" r="2" fill="#94A3B8"/>
    <circle cx="160" cy="120" r="2" fill="#94A3B8"/>
    <circle cx="200" cy="220" r="2" fill="#94A3B8"/>
    <circle cx="100" cy="280" r="2" fill="#94A3B8"/>
    <circle cx="180" cy="320" r="2" fill="#94A3B8"/>
    <circle cx="240" cy="160" r="2" fill="#94A3B8"/>
    <circle cx="60" cy="360" r="2" fill="#94A3B8"/>
  </g>

  <text x="80" y="196" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Central Air</tspan>
    <tspan x="80" dy="50" fill="#01AD9F">installation cost</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">2026 price guide</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Outdoor AC condenser unit -->
  <g>
    <!-- Cabinet -->
    <rect x="556" y="208" width="200" height="172" rx="14" fill="url(#unitGrad)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.55"/>
    <!-- Top louver lines -->
    <line x1="576" y1="230" x2="736" y2="230" stroke="#94A3B8" stroke-width="2" stroke-opacity="0.5"/>
    <line x1="576" y1="244" x2="736" y2="244" stroke="#94A3B8" stroke-width="2" stroke-opacity="0.5"/>
    <!-- Fan circle -->
    <circle cx="656" cy="316" r="56" fill="#FFFFFF" fill-opacity="0.7" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.55"/>
    <circle cx="656" cy="316" r="10" fill="#01AD9F" fill-opacity="0.35"/>
    <!-- Fan blades -->
    <path d="M656 316 C 690 296, 706 308, 700 330 C 678 326, 664 324, 656 316 Z" fill="#01AD9F" fill-opacity="0.18"/>
    <path d="M656 316 C 636 350, 624 362, 604 350 C 612 330, 624 320, 656 316 Z" fill="#01AD9F" fill-opacity="0.18"/>
    <path d="M656 316 C 622 282, 608 290, 608 312 C 630 312, 644 312, 656 316 Z" fill="#01AD9F" fill-opacity="0.18"/>
    <!-- Feet -->
    <rect x="578" y="380" width="16" height="14" rx="3" fill="#94A3B8" fill-opacity="0.5"/>
    <rect x="718" y="380" width="16" height="14" rx="3" fill="#94A3B8" fill-opacity="0.5"/>
  </g>

  <!-- Cost bars (right) -->
  <g>
    <rect x="804" y="300" width="26" height="60" rx="4" fill="url(#barTeal)" opacity="0.9" filter="url(#glow)"/>
    <rect x="840" y="270" width="26" height="90" rx="4" fill="url(#barBlue)" opacity="0.9" filter="url(#glow)"/>
    <rect x="876" y="232" width="26" height="128" rx="4" fill="url(#barTeal)" opacity="0.9" filter="url(#glow)"/>
    <line x1="796" y1="362" x2="910" y2="362" stroke="#94A3B8" stroke-width="2" stroke-opacity="0.5"/>
  </g>

  <!-- Price tag -->
  <g font-family="system-ui, -apple-system, sans-serif" transform="rotate(-8 700 150)">
    <path d="M640 120 L724 120 L760 150 L724 180 L640 180 Z" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <circle cx="738" cy="150" r="6" fill="none" stroke="#0F766E" stroke-width="2"/>
    <text x="676" y="156" text-anchor="middle" fill="#0F766E" font-size="20" font-weight="800">$$$</text>
  </g>

  <!-- Floating rounded shapes -->
  <rect x="700" y="92" width="60" height="60" rx="16" fill="#FFFFFF" fill-opacity="0.0"/>
  <circle cx="900" cy="120" r="26" fill="#FFFFFF" fill-opacity="0.65" stroke="#99F6E4" stroke-width="1.5"/>
  <rect x="852" y="392" width="48" height="48" rx="14" fill="#FFFFFF" fill-opacity="0.6" stroke="#C7D2FE" stroke-width="1.5" transform="rotate(18 876 416)"/>
  <circle cx="540" cy="410" r="18" fill="#FFFFFF" fill-opacity="0.6" stroke="#5EEAD4" stroke-width="1.5"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
