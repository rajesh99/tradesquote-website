<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Sizing a dehumidifier - matching pints per day to the space</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, water droplets, and a humidity gauge representing how to size a dehumidifier by capacity in pints per day.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="gaugeArc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="unitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Soft ambient blobs -->
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="280" rx="120" ry="120" fill="url(#indigoGrad)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>

  <g opacity="0.16">
    <circle cx="80" cy="140" r="2" fill="#94A3B8"/>
    <circle cx="120" cy="180" r="2" fill="#94A3B8"/>
    <circle cx="160" cy="120" r="2" fill="#94A3B8"/>
    <circle cx="200" cy="220" r="2" fill="#94A3B8"/>
    <circle cx="100" cy="280" r="2" fill="#94A3B8"/>
    <circle cx="180" cy="320" r="2" fill="#94A3B8"/>
    <circle cx="240" cy="160" r="2" fill="#94A3B8"/>
    <circle cx="60" cy="360" r="2" fill="#94A3B8"/>
  </g>

  <text x="80" y="210" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Sizing a</tspan>
    <tspan x="80" dy="48">Dehumidifier</tspan>
    <tspan x="80" dy="44" fill="#01AD9F" font-size="30">Pints per day</tspan>
  </text>
  <text x="80" y="348" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Match capacity to the space</text>
  <rect x="80" y="368" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Humidity gauge metaphor -->
  <circle cx="720" cy="240" r="140" stroke="#E2E8F0" stroke-width="1.5" fill="none"/>
  <circle cx="720" cy="240" r="112" stroke="#E2E8F0" stroke-width="1" fill="none" stroke-dasharray="6 8"/>

  <!-- Gauge arc (target humidity sweep) -->
  <path
    d="M 620 339 A 140 140 0 1 1 820 339"
    stroke="url(#gaugeArc)"
    stroke-width="12"
    stroke-linecap="round"
    fill="none"
    opacity="0.9"
    filter="url(#glow)"
  />

  <!-- Gauge needle -->
  <line x1="720" y1="240" x2="676" y2="176" stroke="#0F766E" stroke-width="4" stroke-linecap="round"/>
  <circle cx="720" cy="240" r="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="720" y="288" text-anchor="middle" fill="#0F766E" font-family="system-ui, sans-serif" font-size="20" font-weight="700">45%</text>
  <text x="720" y="306" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="11" font-weight="600">target RH</text>

  <!-- Stylized dehumidifier unit -->
  <rect x="822" y="300" width="96" height="120" rx="16" fill="url(#unitGrad)" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="838" y="318" width="64" height="28" rx="6" fill="#01AD9F" fill-opacity="0.18" stroke="#5EEAD4" stroke-width="1.5"/>
  <line x1="846" y1="362" x2="894" y2="362" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
  <line x1="846" y1="378" x2="894" y2="378" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
  <line x1="846" y1="394" x2="894" y2="394" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>

  <!-- Water droplets -->
  <g filter="url(#glow)">
    <path d="M 600 150 C 600 168, 588 176, 588 188 a 12 12 0 0 0 24 0 C 612 176, 600 168, 600 150 Z" fill="url(#dropGrad)" opacity="0.85"/>
    <path d="M 860 170 C 860 184, 851 190, 851 199 a 9 9 0 0 0 18 0 C 869 190, 860 184, 860 170 Z" fill="url(#dropGrad)" opacity="0.7"/>
    <path d="M 660 380 C 660 392, 652 397, 652 405 a 8 8 0 0 0 16 0 C 668 397, 660 392, 660 380 Z" fill="url(#dropGrad)" opacity="0.65"/>
  </g>

  <!-- Floating abstract shapes -->
  <rect x="566" y="246" width="64" height="64" rx="16" fill="#FFFFFF" fill-opacity="0.7" stroke="#BAE6FD" stroke-width="1.5" transform="rotate(-12 598 278)"/>
  <circle cx="868" cy="120" r="26" fill="#FFFFFF" fill-opacity="0.65" stroke="#99F6E4" stroke-width="1.5"/>
  <rect x="600" y="430" width="52" height="52" rx="14" fill="#FFFFFF" fill-opacity="0.6" stroke="#C7D2FE" stroke-width="1.5" transform="rotate(18 626 456)"/>

  <!-- PPD badge -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="556" y="96" width="92" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="602" y="117" text-anchor="middle" fill="#0F766E" font-size="13" font-weight="700" letter-spacing="1">PPD</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
