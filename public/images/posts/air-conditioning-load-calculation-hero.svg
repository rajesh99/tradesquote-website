<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Air conditioning load calculation</title>
  <desc id="heroDesc">Abstract hero graphic showing a house with arrows indicating winter heat loss and summer heat gain, plus a BTU and tonnage output badge, representing how to size HVAC equipment to a building's true heating and cooling load.</desc>

  <defs>
    <linearGradient id="acl-bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="acl-skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="acl-tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="acl-accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="acl-houseWall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0F2FE" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#BAE6FD" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="acl-roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.30"/>
    </linearGradient>
    <filter id="acl-softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="acl-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#acl-bgGrad)"/>
  <ellipse cx="800" cy="110" rx="210" ry="170" fill="url(#acl-skyGrad)" filter="url(#acl-softBlur)"/>
  <ellipse cx="680" cy="390" rx="190" ry="150" fill="url(#acl-tealGrad)" filter="url(#acl-softBlur)"/>

  <!-- Frosted card left -->
  <rect x="48" y="68" width="400" height="364" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text font-family="system-ui, -apple-system, sans-serif">
    <tspan x="80" y="192" fill="#152035" font-size="38" font-weight="700" letter-spacing="-0.02em">Air conditioning</tspan>
    <tspan x="80" dy="50" fill="#01AD9F" font-size="38" font-weight="700" letter-spacing="-0.02em">load calculation</tspan>
  </text>
  <text x="80" y="298" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Size to the building, not a guess</text>
  <rect x="80" y="322" width="56" height="4" rx="2" fill="url(#acl-accentBar)"/>

  <!-- House illustration right side -->
  <!-- Roof -->
  <polygon points="620,170 820,170 820,255 620,255" fill="url(#acl-roofGrad)" stroke="#2563EB" stroke-width="2" stroke-opacity="0.40"/>
  <polygon points="590,255 850,255 820,170 620,170" fill="url(#acl-roofGrad)" stroke="#2563EB" stroke-width="1.8" stroke-opacity="0.45"/>
  <!-- Walls -->
  <rect x="620" y="255" width="200" height="160" rx="4" fill="url(#acl-houseWall)" stroke="#0EA5E9" stroke-width="2" stroke-opacity="0.45"/>
  <!-- Window -->
  <rect x="650" y="280" width="50" height="45" rx="4" fill="#FFFFFF" fill-opacity="0.70" stroke="#38BDF8" stroke-width="1.5"/>
  <line x1="675" y1="280" x2="675" y2="325" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="650" y1="302" x2="700" y2="302" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.6"/>
  <!-- Door -->
  <rect x="730" y="330" width="42" height="85" rx="4" fill="#FFFFFF" fill-opacity="0.55" stroke="#0EA5E9" stroke-width="1.5"/>

  <!-- Winter heat-loss arrows (blue, going outward from house) -->
  <!-- Top arrow -->
  <path d="M720 250 L720 215" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" marker-end="url(#acl-arr-blue)" opacity="0.80" filter="url(#acl-glow)"/>
  <!-- Left arrow -->
  <path d="M620 310 L580 310" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" marker-end="url(#acl-arr-blue)" opacity="0.75"/>
  <!-- Right arrow -->
  <path d="M820 310 L860 310" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" marker-end="url(#acl-arr-blue)" opacity="0.75"/>
  <!-- Label -->
  <rect x="544" y="288" width="30" height="46" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1" stroke-opacity="0.5"/>
  <text x="559" y="316" text-anchor="middle" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700">heat</text>
  <text x="559" y="328" text-anchor="middle" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700">loss</text>

  <!-- Summer sun + heat-gain arrows (teal/orange, going inward) -->
  <!-- Sun -->
  <circle cx="900" cy="155" r="34" fill="#FEF9C3" stroke="#FCD34D" stroke-width="2.5" opacity="0.85"/>
  <circle cx="900" cy="155" r="24" fill="#FDE047" opacity="0.65"/>
  <!-- Sun rays -->
  <line x1="900" y1="108" x2="900" y2="96" stroke="#FCD34D" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="935" y1="120" x2="944" y2="111" stroke="#FCD34D" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="947" y1="155" x2="960" y2="155" stroke="#FCD34D" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="935" y1="190" x2="944" y2="199" stroke="#FCD34D" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="865" y1="120" x2="856" y2="111" stroke="#FCD34D" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>

  <!-- Solar/heat gain arrows inward -->
  <path d="M870 205 L840 230" stroke="#01AD9F" stroke-width="2.5" stroke-linecap="round" marker-end="url(#acl-arr-teal)" opacity="0.80"/>
  <path d="M880 270 L855 270" stroke="#01AD9F" stroke-width="2.5" stroke-linecap="round" marker-end="url(#acl-arr-teal)" opacity="0.80"/>
  <!-- Label -->
  <rect x="858" y="248" width="36" height="46" rx="6" fill="#E8F8F6" stroke="#01AD9F" stroke-width="1" stroke-opacity="0.5"/>
  <text x="876" y="270" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700">heat</text>
  <text x="876" y="283" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700">gain</text>

  <!-- BTU / tons output badge -->
  <rect x="595" y="435" width="270" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.8"/>
  <text x="730" y="456" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" letter-spacing="0.3">BTU/hr output  →  tons of AC</text>
  <text x="730" y="471" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="9.5">Manual J load calculation result</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="acl-arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563EB"/>
    </marker>
    <marker id="acl-arr-teal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#01AD9F"/>
    </marker>
  </defs>

  <!-- Bottom teal strip -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
