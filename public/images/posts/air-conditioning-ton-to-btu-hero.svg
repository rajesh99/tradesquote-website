<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Air conditioning ton to BTU conversion</title>
  <desc id="heroDesc">Abstract hero graphic showing a ton badge and a 12,000 BTU/hr badge linked by a conversion arrow, representing the air conditioning ton to BTU unit conversion.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="800" cy="110" rx="210" ry="170" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="660" cy="390" rx="190" ry="145" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <!-- Frosted card left -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="195" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Ton ↔ BTU</tspan>
    <tspan x="80" dy="48" fill="#01AD9F">conversion</tspan>
  </text>
  <text x="80" y="295" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">1 ton = 12,000 BTU/hr, always</text>
  <rect x="80" y="319" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Right side illustration: ice block motif (subtle) -->
  <rect x="555" y="320" width="90" height="55" rx="8" fill="#38BDF8" fill-opacity="0.12" stroke="#38BDF8" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="575" y="305" width="70" height="20" rx="5" fill="#38BDF8" fill-opacity="0.10" stroke="#0EA5E9" stroke-width="1" stroke-opacity="0.35"/>
  <rect x="590" y="293" width="44" height="15" rx="4" fill="#38BDF8" fill-opacity="0.09" stroke="#0EA5E9" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Ice shimmer lines -->
  <line x1="568" y1="340" x2="580" y2="350" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.55"/>
  <line x1="580" y1="332" x2="592" y2="342" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.45"/>
  <line x1="605" y1="345" x2="617" y2="355" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"/>
  <!-- Ice label -->
  <text x="600" y="388" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500">2,000 lb ice/24 h</text>

  <!-- "1 ton" badge -->
  <rect x="590" y="152" width="140" height="72" rx="14" fill="url(#badgeGrad)" stroke="#01AD9F" stroke-width="2.2"/>
  <text x="660" y="185" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" letter-spacing="-0.02em">1 ton</text>
  <text x="660" y="207" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500">cooling capacity</text>

  <!-- Conversion arrow/equals -->
  <line x1="740" y1="188" x2="798" y2="188" stroke="#01AD9F" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M790 180 l10 8 l-10 8" fill="none" stroke="#01AD9F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="769" y="178" text-anchor="middle" fill="#01AD9F" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">=</text>

  <!-- "12,000 BTU/hr" badge -->
  <rect x="808" y="152" width="152" height="72" rx="14" fill="#EFF6FF" stroke="#2563EB" stroke-width="2.2"/>
  <text x="884" y="185" text-anchor="middle" fill="#1D4ED8" font-family="system-ui, -apple-system, sans-serif" font-size="19" font-weight="800" letter-spacing="-0.01em">12,000</text>
  <text x="884" y="207" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500">BTU/hr</text>

  <!-- Subtle connector line between badges and ice block -->
  <line x1="660" y1="224" x2="660" y2="305" stroke="#01AD9F" stroke-width="1.2" stroke-dasharray="4 3" stroke-opacity="0.35"/>
  <line x1="884" y1="224" x2="884" y2="370" stroke="#2563EB" stroke-width="1.2" stroke-dasharray="4 3" stroke-opacity="0.25"/>

  <!-- Bottom teal strip -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
