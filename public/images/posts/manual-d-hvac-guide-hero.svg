<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Manual D HVAC duct design guide</title>
  <desc id="heroDesc">Abstract hero graphic showing a duct network schematic with trunk and branch runs, friction rate labels, and CFM badges, representing the ACCA Manual D residential duct design standard.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="ductGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="700" cy="390" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <!-- Frosted card -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="195" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Manual D</tspan>
    <tspan x="80" dy="48" fill="#01AD9F">Duct Design</tspan>
  </text>
  <text x="80" y="295" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Size every run. Deliver every BTU.</text>
  <rect x="80" y="319" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Air handler box -->
  <rect x="540" y="180" width="80" height="140" rx="10" fill="url(#ductGrad)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.6"/>
  <text x="580" y="252" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800">AHU</text>

  <!-- Main trunk duct going right -->
  <rect x="620" y="228" width="260" height="44" rx="8" fill="#01AD9F" fill-opacity="0.12" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Trunk label -->
  <text x="750" y="255" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">trunk</text>

  <!-- Branch 1 top-right -->
  <rect x="740" y="164" width="110" height="64" rx="7" fill="#2563EB" fill-opacity="0.08" stroke="#2563EB" stroke-width="1.6" stroke-opacity="0.4"/>
  <line x1="790" y1="228" x2="790" y2="228" stroke="#2563EB" stroke-width="1.8" stroke-opacity="0.5"/>
  <path d="M790 228 L790 208" stroke="#2563EB" stroke-width="1.8" stroke-opacity="0.5" fill="none"/>

  <!-- Branch 2 bottom-right -->
  <rect x="740" y="272" width="110" height="64" rx="7" fill="#0EA5E9" fill-opacity="0.08" stroke="#0EA5E9" stroke-width="1.6" stroke-opacity="0.4"/>
  <path d="M790 272 L790 292" stroke="#0EA5E9" stroke-width="1.8" stroke-opacity="0.45" fill="none"/>

  <!-- Far branch from end of trunk -->
  <rect x="858" y="196" width="80" height="108" rx="7" fill="#01AD9F" fill-opacity="0.10" stroke="#01AD9F" stroke-width="1.4" stroke-opacity="0.4"/>
  <path d="M880 228 L880 244" stroke="#01AD9F" stroke-width="1.8" stroke-opacity="0.5" fill="none"/>

  <!-- Airflow arrows along trunk -->
  <path d="M635 250 L660 250" stroke="#01AD9F" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7" filter="url(#glow)" marker-end="url(#md-hero-arr)"/>
  <path d="M680 250 L705 250" stroke="#01AD9F" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6" filter="url(#glow)" marker-end="url(#md-hero-arr)"/>

  <!-- Friction rate badge -->
  <rect x="614" y="162" width="116" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.9" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="672" y="181" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">0.1 in.wc / 100 ft</text>

  <!-- CFM badge branch 1 -->
  <rect x="744" y="168" width="100" height="22" rx="11" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="794" y="183" text-anchor="middle" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700">150 CFM</text>

  <!-- CFM badge branch 2 -->
  <rect x="744" y="276" width="100" height="22" rx="11" fill="#F0F9FF" stroke="#0EA5E9" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="794" y="291" text-anchor="middle" fill="#0EA5E9" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700">200 CFM</text>

  <!-- Longest run annotation -->
  <line x1="620" y1="356" x2="940" y2="356" stroke="#01AD9F" stroke-width="1.4" stroke-dasharray="4 3" stroke-opacity="0.55"/>
  <text x="780" y="374" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">longest run → sets friction rate</text>

  <defs>
    <marker id="md-hero-arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#01AD9F"/>
    </marker>
  </defs>

  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
