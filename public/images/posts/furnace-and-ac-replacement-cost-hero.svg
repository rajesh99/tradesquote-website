<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Furnace and AC replacement cost</title>
  <desc>Abstract hero graphic with soft gradients, a furnace and condenser unit pairing and a price range badge representing the cost to replace a furnace and air conditioner together.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#EA580C" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="coolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="195" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Furnace + AC</tspan>
    <tspan x="80" dy="46" fill="#01AD9F">replacement cost</tspan>
  </text>
  <text x="80" y="295" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Replacing both at once</text>
  <rect x="80" y="319" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Furnace box -->
  <rect x="560" y="150" width="120" height="200" rx="12" fill="url(#warmGrad)" stroke="#EA580C" stroke-width="2" stroke-opacity="0.5"/>
  <text x="620" y="258" text-anchor="middle" fill="#C2410C" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800">furnace</text>
  <circle cx="620" cy="200" r="8" fill="#EA580C" opacity="0.5"/>

  <!-- Condenser box -->
  <rect x="720" y="190" width="150" height="160" rx="12" fill="url(#coolGrad)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="740" y1="220" x2="850" y2="220" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="740" y1="245" x2="850" y2="245" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="740" y1="270" x2="850" y2="270" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.4"/>
  <text x="795" y="320" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800">AC</text>

  <!-- price badge -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="612" y="110" width="200" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="712" y="132" text-anchor="middle" fill="#0F766E" font-size="14" font-weight="800" letter-spacing="0.5">$7k – $25k</text>
  </g>

  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
