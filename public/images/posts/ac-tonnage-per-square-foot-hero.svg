<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">AC tonnage per square foot</title>
  <desc id="heroDesc">Abstract hero graphic showing an AC unit sizing concept — a floor-area grid with a tonnage badge and a sun cue representing climate adjustment, illustrating how square footage maps to AC tonnage by climate zone.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <!-- Frosted card (left) -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="195" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">AC tonnage</tspan>
    <tspan x="80" dy="48" fill="#01AD9F">per square foot</tspan>
  </text>
  <text x="80" y="295" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Sq ft → tons, adjusted for climate</text>
  <rect x="80" y="319" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Right illustration: floor-area grid -->
  <!-- Grid base panel -->
  <rect x="545" y="160" width="360" height="230" rx="14" fill="url(#gridGrad)" stroke="#01AD9F" stroke-width="1.8" stroke-opacity="0.45"/>

  <!-- Grid lines (4 cols × 4 rows) -->
  <line x1="635" y1="160" x2="635" y2="390" stroke="#01AD9F" stroke-width="1" stroke-opacity="0.28"/>
  <line x1="725" y1="160" x2="725" y2="390" stroke="#01AD9F" stroke-width="1" stroke-opacity="0.28"/>
  <line x1="815" y1="160" x2="815" y2="390" stroke="#01AD9F" stroke-width="1" stroke-opacity="0.28"/>
  <line x1="545" y1="218" x2="905" y2="218" stroke="#01AD9F" stroke-width="1" stroke-opacity="0.28"/>
  <line x1="545" y1="276" x2="905" y2="276" stroke="#01AD9F" stroke-width="1" stroke-opacity="0.28"/>
  <line x1="545" y1="334" x2="905" y2="334" stroke="#01AD9F" stroke-width="1" stroke-opacity="0.28"/>

  <!-- Highlighted cells (sq ft areas) -->
  <rect x="546" y="161" width="89" height="57" rx="4" fill="#14B8A6" fill-opacity="0.22"/>
  <rect x="636" y="161" width="89" height="57" rx="4" fill="#0EA5E9" fill-opacity="0.18"/>
  <rect x="726" y="161" width="89" height="57" rx="4" fill="#14B8A6" fill-opacity="0.14"/>
  <rect x="546" y="219" width="89" height="57" rx="4" fill="#0EA5E9" fill-opacity="0.16"/>
  <rect x="636" y="219" width="89" height="57" rx="4" fill="#14B8A6" fill-opacity="0.20"/>

  <!-- Sq ft label at bottom of grid -->
  <text x="725" y="415" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" opacity="0.85">sq ft floor area</text>

  <!-- Tonnage badge -->
  <g filter="url(#glow)">
    <rect x="788" y="198" width="108" height="52" rx="26" fill="#FFFFFF" fill-opacity="0.92" stroke="#01AD9F" stroke-width="2"/>
    <text x="842" y="224" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800">3.5 ton</text>
    <text x="842" y="242" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">moderate zone</text>
  </g>

  <!-- Sun (climate cue) -->
  <circle cx="870" cy="130" r="26" fill="#FCD34D" fill-opacity="0.82" stroke="#F59E0B" stroke-width="2"/>
  <!-- Sun rays -->
  <line x1="870" y1="96" x2="870" y2="88" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="870" y1="162" x2="870" y2="170" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="836" y1="130" x2="828" y2="130" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="904" y1="130" x2="912" y2="130" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="846" y1="106" x2="840" y2="100" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="894" y1="154" x2="900" y2="160" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="894" y1="106" x2="900" y2="100" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="846" y1="154" x2="840" y2="160" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Arrow from grid to badge -->
  <path d="M816 250 C 820 270, 800 280, 795 250" stroke="#01AD9F" stroke-width="1.5" stroke-dasharray="4 3" fill="none" stroke-opacity="0.6"/>

  <!-- Bottom teal strip -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
