<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">How to Estimate an HVAC Job - contractor pricing guide</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, a clipboard quote, stacked cost bars, and dollar accents representing how to price an HVAC job for profit.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="barTeal" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="barIndigo" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Soft ambient blobs -->
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="280" rx="120" ry="120" fill="url(#indigoGrad)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>

  <g opacity="0.16">
    <circle cx="80" cy="140" r="2" fill="#94A3B8"/>
    <circle cx="120" cy="180" r="2" fill="#94A3B8"/>
    <circle cx="160" cy="120" r="2" fill="#94A3B8"/>
    <circle cx="200" cy="220" r="2" fill="#94A3B8"/>
    <circle cx="100" cy="280" r="2" fill="#94A3B8"/>
    <circle cx="180" cy="320" r="2" fill="#94A3B8"/>
    <circle cx="240" cy="160" r="2" fill="#94A3B8"/>
    <circle cx="60" cy="360" r="2" fill="#94A3B8"/>
  </g>

  <text x="80" y="196" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">How to Estimate</tspan>
    <tspan x="80" dy="50" fill="#01AD9F">an HVAC job</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Price for profit</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Clipboard / quote -->
  <g transform="rotate(-4 600 250)">
    <rect x="540" y="120" width="170" height="240" rx="14" fill="#FFFFFF" fill-opacity="0.92" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.5"/>
    <rect x="600" y="108" width="50" height="26" rx="8" fill="#01AD9F" fill-opacity="0.85"/>
    <!-- quote lines -->
    <rect x="562" y="156" width="120" height="8" rx="4" fill="#CBD5E1"/>
    <rect x="562" y="180" width="86" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="562" y="204" width="120" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="562" y="228" width="70" height="8" rx="4" fill="#E2E8F0"/>
    <line x1="562" y1="262" x2="688" y2="262" stroke="#CBD5E1" stroke-width="1.5"/>
    <!-- total row -->
    <rect x="562" y="278" width="76" height="10" rx="5" fill="#94A3B8"/>
    <rect x="640" y="276" width="48" height="14" rx="7" fill="#01AD9F" fill-opacity="0.85"/>
  </g>

  <!-- Cost bars -->
  <g filter="url(#glow)">
    <rect x="752" y="296" width="34" height="64" rx="6" fill="url(#barIndigo)" opacity="0.9"/>
    <rect x="796" y="252" width="34" height="108" rx="6" fill="url(#barBlue)" opacity="0.9"/>
    <rect x="840" y="200" width="34" height="160" rx="6" fill="url(#barTeal)" opacity="0.95"/>
  </g>
  <!-- baseline -->
  <line x1="744" y1="364" x2="888" y2="364" stroke="#94A3B8" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Dollar accents -->
  <g font-family="system-ui, -apple-system, sans-serif" font-weight="800">
    <circle cx="838" cy="138" r="26" fill="#FFFFFF" fill-opacity="0.9" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="838" y="148" text-anchor="middle" fill="#0F766E" font-size="24">$</text>
    <circle cx="916" cy="210" r="18" fill="#FFFFFF" fill-opacity="0.75" stroke="#99F6E4" stroke-width="1.5"/>
    <text x="916" y="217" text-anchor="middle" fill="#0F766E" font-size="16">$</text>
  </g>

  <!-- Floating rounded shapes -->
  <rect x="710" y="92" width="48" height="48" rx="14" fill="#FFFFFF" fill-opacity="0.6" stroke="#BAE6FD" stroke-width="1.5" transform="rotate(-12 734 116)"/>
  <circle cx="770" cy="408" r="16" fill="#FFFFFF" fill-opacity="0.6" stroke="#5EEAD4" stroke-width="1.5"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
