<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">HVAC Financing Calculator Guide</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, dollar-sign badges, a monthly payment breakdown card, and a loan calculator theme representing HVAC financing and monthly payment math.</desc>

  <defs>
    <linearGradient id="fin-bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="fin-skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="fin-tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="fin-cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="fin-accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="fin-softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="fin-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#fin-bgGrad)"/>
  <ellipse cx="790" cy="110" rx="210" ry="170" fill="url(#fin-skyGrad)" filter="url(#fin-softBlur)"/>
  <ellipse cx="660" cy="390" rx="190" ry="150" fill="url(#fin-tealGrad)" filter="url(#fin-softBlur)"/>

  <!-- Frosted card left -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="195" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">HVAC Financing</tspan>
    <tspan x="80" dy="46" fill="#01AD9F">Calculator Guide</tspan>
  </text>
  <text x="80" y="295" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">Monthly payments · total cost · APR comparison</text>
  <rect x="80" y="318" width="56" height="4" rx="2" fill="url(#fin-accentBar)"/>

  <!-- Right illustration: stylized loan payment card -->
  <!-- Main calculator card -->
  <rect x="540" y="110" width="390" height="280" rx="18" fill="url(#fin-cardGrad)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.45"/>

  <!-- Card header bar -->
  <rect x="540" y="110" width="390" height="44" rx="18" fill="#01AD9F" fill-opacity="0.22"/>
  <rect x="540" y="136" width="390" height="18" fill="#01AD9F" fill-opacity="0.22"/>
  <text x="558" y="139" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" letter-spacing="0.3">HVAC LOAN CALCULATOR</text>

  <!-- Row labels -->
  <text x="558" y="180" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Loan amount</text>
  <text x="558" y="218" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">APR</text>
  <text x="558" y="256" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Term</text>
  <text x="558" y="306" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">Monthly payment</text>
  <text x="558" y="360" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">Total cost</text>

  <!-- Values -->
  <text x="700" y="180" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800">$10,000</text>
  <text x="700" y="218" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800">6.99%</text>
  <text x="700" y="256" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800">60 mo</text>

  <!-- Divider -->
  <line x1="558" y1="270" x2="902" y2="270" stroke="#D5D5D5" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Payment result highlight -->
  <rect x="680" y="288" width="200" height="36" rx="10" fill="#01AD9F" fill-opacity="0.15" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="780" y="313" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" filter="url(#fin-glow)">$198/mo</text>

  <!-- Total cost result -->
  <rect x="680" y="340" width="200" height="32" rx="10" fill="#2563EB" fill-opacity="0.10" stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.4"/>
  <text x="780" y="362" text-anchor="middle" fill="#1D4ED8" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">$11,880 total</text>

  <!-- Dollar badge floating top-right -->
  <circle cx="888" cy="126" r="26" fill="#FFFFFF" fill-opacity="0.82" stroke="#5EEAD4" stroke-width="2"/>
  <text x="888" y="134" text-anchor="middle" fill="#01AD9F" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="900">$</text>

  <!-- Small % badge -->
  <circle cx="570" cy="420" r="22" fill="#FFFFFF" fill-opacity="0.70" stroke="#2563EB" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="570" y="428" text-anchor="middle" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800">%</text>

  <!-- Accent sparkle dots -->
  <circle cx="900" cy="340" r="5" fill="#5EEAD4" opacity="0.45"/>
  <circle cx="920" cy="360" r="3" fill="#38BDF8" opacity="0.35"/>
  <circle cx="870" cy="410" r="4" fill="#01AD9F" opacity="0.30"/>

  <!-- Bottom teal strip -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
