<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">AC Tonnage by Room Size - sizing air conditioning from square footage</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, a room outline, a tonnage gauge, and square-footage-to-ton bars representing how to size an air conditioner from floor area.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="roomGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="barTeal" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="barIndigo" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Soft ambient blobs -->
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="280" rx="120" ry="120" fill="url(#indigoGrad)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>

  <g opacity="0.16">
    <circle cx="80" cy="140" r="2" fill="#94A3B8"/>
    <circle cx="120" cy="180" r="2" fill="#94A3B8"/>
    <circle cx="160" cy="120" r="2" fill="#94A3B8"/>
    <circle cx="200" cy="220" r="2" fill="#94A3B8"/>
    <circle cx="100" cy="280" r="2" fill="#94A3B8"/>
    <circle cx="180" cy="320" r="2" fill="#94A3B8"/>
    <circle cx="240" cy="160" r="2" fill="#94A3B8"/>
    <circle cx="60" cy="360" r="2" fill="#94A3B8"/>
  </g>

  <text x="80" y="200" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">AC Tonnage</tspan>
    <tspan x="80" dy="50" fill="#01AD9F">by room size</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Square feet &#8594; tons</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Room outline -->
  <rect x="540" y="150" width="180" height="150" rx="10" fill="url(#roomGrad)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.55"/>
  <rect x="560" y="172" width="60" height="40" rx="4" fill="#FFFFFF" fill-opacity="0.5" stroke="#38BDF8" stroke-width="1.5" stroke-opacity="0.6"/>
  <path d="M620 300 L620 262 L660 262 L660 300" fill="none" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.5"/>
  <!-- sq ft label -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="556" y="222" width="84" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.9" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="598" y="242" text-anchor="middle" fill="#0F766E" font-size="13" font-weight="700">sq ft</text>
  </g>

  <!-- Tonnage gauge (semi-circle) -->
  <path d="M770 290 A 70 70 0 0 1 910 290" fill="none" stroke="#E2E8F0" stroke-width="14" stroke-linecap="round"/>
  <path d="M770 290 A 70 70 0 0 1 880 236" fill="none" stroke="url(#barTeal)" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="840" y1="290" x2="878" y2="248" stroke="#152035" stroke-width="3" stroke-linecap="round"/>
  <circle cx="840" cy="290" r="6" fill="#152035"/>
  <g font-family="system-ui, -apple-system, sans-serif">
    <text x="840" y="318" text-anchor="middle" fill="#0F766E" font-size="18" font-weight="800">3 ton</text>
    <text x="840" y="190" text-anchor="middle" fill="#64748B" font-size="11" font-weight="600">TONNAGE</text>
  </g>

  <!-- sqft-to-ton bars -->
  <g>
    <rect x="556" y="360" width="22" height="40" rx="4" fill="url(#barBlue)" opacity="0.9"/>
    <rect x="588" y="340" width="22" height="60" rx="4" fill="url(#barTeal)" opacity="0.9"/>
    <rect x="620" y="316" width="22" height="84" rx="4" fill="url(#barTeal)" opacity="0.95"/>
    <rect x="652" y="296" width="22" height="104" rx="4" fill="url(#barIndigo)" opacity="0.9"/>
    <line x1="548" y1="402" x2="690" y2="402" stroke="#94A3B8" stroke-width="1.5" stroke-opacity="0.5"/>
  </g>

  <!-- Floating rounded shapes -->
  <rect x="700" y="92" width="64" height="64" rx="16" fill="#FFFFFF" fill-opacity="0.7" stroke="#BAE6FD" stroke-width="1.5" transform="rotate(-12 732 124)"/>
  <circle cx="940" cy="150" r="26" fill="#FFFFFF" fill-opacity="0.65" stroke="#99F6E4" stroke-width="1.5"/>
  <rect x="900" y="380" width="52" height="52" rx="14" fill="#FFFFFF" fill-opacity="0.6" stroke="#C7D2FE" stroke-width="1.5" transform="rotate(18 926 406)"/>
  <circle cx="770" cy="410" r="18" fill="#FFFFFF" fill-opacity="0.6" stroke="#5EEAD4" stroke-width="1.5"/>

  <!-- BTU badge -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="742" y="356" width="96" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="790" y="377" text-anchor="middle" fill="#0F766E" font-size="12" font-weight="700" letter-spacing="0.5">20 BTU/ft&#178;</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
