<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" role="img" style="font-family: system-ui, -apple-system, sans-serif;">
  <title>Superheat vs Subcooling — HVAC diagnostic gauges</title>
  <desc>Two diagnostic gauge displays showing superheat (blue, left) and subcooling (orange, right) measurement targets for HVAC refrigerant systems</desc>

  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0d1f40"/>
      <stop offset="100%" stop-color="#050b18"/>
    </radialGradient>
    <radialGradient id="lhalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rhalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lface" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#173354"/>
      <stop offset="100%" stop-color="#091525"/>
    </radialGradient>
    <radialGradient id="rface" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#3d1a06"/>
      <stop offset="100%" stop-color="#120800"/>
    </radialGradient>
    <linearGradient id="glare" x1="15%" y1="0%" x2="75%" y2="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="gb" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="go" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sh" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#bg)"/>
  <!-- Subtle dot-grid overlay -->
  <pattern id="grid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#1e293b" fill-opacity="0.5"/>
  </pattern>
  <rect width="1000" height="500" fill="url(#grid)"/>

  <!-- ═══════════════ LEFT GAUGE — SUPERHEAT ═══════════════ -->
  <!-- Halo glow -->
  <circle cx="255" cy="255" r="205" fill="url(#lhalo)"/>
  <!-- Outer bezel ring -->
  <circle cx="255" cy="255" r="178" fill="#080f1e" stroke="#0e2a47" stroke-width="3.5" filter="url(#sh)"/>
  <!-- Face -->
  <circle cx="255" cy="255" r="170" fill="url(#lface)"/>

  <!-- Track arc: center(255,255) r=148, 120°→60° CW 300° -->
  <!-- Start 120°: (255-74,255+128)=(181,383)  End 60°: (255+74,255+128)=(329,383) -->
  <path d="M 181,383 A 148,148 0 1,1 329,383" fill="none" stroke="#0d2137" stroke-width="18" stroke-linecap="round"/>

  <!-- Low danger zone: 0–5°F = first 50° of 300° arc (120°→170°) -->
  <!-- 170°: (255+148*cos170, 255+148*sin170)=(255-145.7,255+25.7)=(109.3,280.7)=(109,281) -->
  <path d="M 181,383 A 148,148 0 0,1 109,281" fill="none" stroke="#ef4444" stroke-width="18" stroke-linecap="round" stroke-opacity="0.45"/>

  <!-- Normal zone: 10–18°F = 100°–180° into arc (220°→300°) -->
  <!-- 220°: (255+148*(-0.766),255+148*(-0.643))=(255-113.4,255-95.2)=(141.6,159.8)=(142,160) -->
  <!-- 300°: (255+148*(0.5),255+148*(-0.866))=(255+74,255-128.2)=(329,126.8)=(329,127) -->
  <path d="M 142,160 A 148,148 0 0,1 329,127" fill="none" stroke="#22c55e" stroke-width="18" stroke-linecap="round" stroke-opacity="0.38"/>

  <!-- High danger zone: >18°F = 300°→60° (remaining 120°) -->
  <!-- 329,127 → 329,383 going CW through 0° -->
  <path d="M 329,127 A 148,148 0 0,1 329,383" fill="none" stroke="#f97316" stroke-width="18" stroke-linecap="round" stroke-opacity="0.35"/>

  <!-- Value arc: 13°F target = 130° into 300° arc → SVG angle 250° -->
  <!-- 250°: (255+148*(-0.342),255+148*(-0.940))=(255-50.6,255-139.1)=(204.4,115.9)=(204,116) -->
  <path d="M 181,383 A 148,148 0 0,1 204,116" fill="none" stroke="#38bdf8" stroke-width="18" stroke-linecap="round" filter="url(#gb)"/>

  <!-- Tick marks (r_inner=143, r_outer=160) at 120°,170°,220°,270°,320°,10°,60° -->
  <line x1="174" y1="393" x2="181" y2="383" stroke="#2d4a63" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="97"  y1="280" x2="109" y2="281" stroke="#2d4a63" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="130" y1="151" x2="142" y2="160" stroke="#2d4a63" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="255" y1="92"  x2="255" y2="107" stroke="#2d4a63" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="380" y1="151" x2="368" y2="160" stroke="#2d4a63" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="413" y1="280" x2="401" y2="281" stroke="#2d4a63" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="336" y1="393" x2="329" y2="383" stroke="#2d4a63" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tick labels -->
  <text x="255" y="68"  text-anchor="middle" fill="#4a7a9b" font-size="10">15</text>
  <text x="122" y="136" text-anchor="middle" fill="#4a7a9b" font-size="10">10</text>
  <text x="82"  y="275" text-anchor="middle" fill="#4a7a9b" font-size="10">5</text>
  <text x="388" y="136" text-anchor="middle" fill="#4a7a9b" font-size="10">20</text>
  <text x="425" y="275" text-anchor="middle" fill="#4a7a9b" font-size="10">25</text>

  <!-- Needle: center→250° tip -->
  <!-- Inner r=42: (255+42*(-0.342),255+42*(-0.940))=(255-14.4,255-39.5)=(241,216) -->
  <!-- Outer r=128: (255+128*(-0.342),255+128*(-0.940))=(255-43.8,255-120.3)=(211,135) -->
  <line x1="241" y1="216" x2="211" y2="135" stroke="#38bdf8" stroke-width="3.5" stroke-linecap="round" filter="url(#gb)"/>
  <!-- Needle pivot -->
  <circle cx="255" cy="255" r="13" fill="#0d2236" stroke="#38bdf8" stroke-width="2"/>
  <circle cx="255" cy="255" r="5" fill="#38bdf8" fill-opacity="0.6"/>
  <!-- Needle tip glow dot at arc -->
  <circle cx="204" cy="116" r="8" fill="#38bdf8" filter="url(#gb)"/>

  <!-- Inner display circle -->
  <circle cx="255" cy="255" r="92" fill="#070e1b" stroke="#0e2744" stroke-width="1.5"/>
  <!-- Value -->
  <text x="255" y="242" text-anchor="middle" fill="#38bdf8" font-size="38" font-weight="700" letter-spacing="-1.5" filter="url(#gb)">13°F</text>
  <text x="255" y="264" text-anchor="middle" fill="#7dd3fc" font-size="10.5" letter-spacing="2.5">TARGET</text>
  <text x="255" y="284" text-anchor="middle" fill="#334d66" font-size="9" letter-spacing="1">RANGE  10 – 18 °F</text>

  <!-- Gauge label -->
  <text x="255" y="428" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="700" letter-spacing="3.5">SUPERHEAT</text>
  <text x="255" y="447" text-anchor="middle" fill="#334155" font-size="9.5" letter-spacing="0.5">Suction Temp − Sat. Temp @ Suction Pressure</text>

  <!-- Formula callout -->
  <rect x="48" y="30" width="210" height="36" rx="8" fill="#0a1828" stroke="#0e3252" stroke-width="1"/>
  <text x="153" y="48" text-anchor="middle" fill="#475569" font-size="8.5" letter-spacing="1">FIXED-ORIFICE TARGET</text>
  <text x="153" y="60" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="600">(3×WB − 80 − OD) ÷ 2</text>

  <!-- Glass glare -->
  <ellipse cx="222" cy="178" rx="68" ry="38" fill="url(#glare)" transform="rotate(-20 222 178)"/>

  <!-- ═══════════════ RIGHT GAUGE — SUBCOOLING ═══════════════ -->
  <!-- Halo glow -->
  <circle cx="745" cy="255" r="205" fill="url(#rhalo)"/>
  <!-- Outer bezel ring -->
  <circle cx="745" cy="255" r="178" fill="#0e0500" stroke="#3a1500" stroke-width="3.5" filter="url(#sh)"/>
  <!-- Face -->
  <circle cx="745" cy="255" r="170" fill="url(#rface)"/>

  <!-- Track arc: center(745,255) r=148 -->
  <!-- Start 120°: (745-74,255+128)=(671,383)  End 60°: (745+74,255+128)=(819,383) -->
  <path d="M 671,383 A 148,148 0 1,1 819,383" fill="none" stroke="#2a0f00" stroke-width="18" stroke-linecap="round"/>

  <!-- Low danger (0–5°F of 0–25 range = first 60° of 300°) -->
  <!-- 5/25*300=60°; angle=120+60=180°; (745-148,255)=(597,255) -->
  <path d="M 671,383 A 148,148 0 0,1 597,255" fill="none" stroke="#ef4444" stroke-width="18" stroke-linecap="round" stroke-opacity="0.45"/>

  <!-- Normal zone: 10–18°F of 0–25 = 120°–216° into arc (240°→336°) -->
  <!-- 240°: (745+148*(-0.5),255+148*(-0.866))=(745-74,255-128.2)=(671,126.8)=(671,127) -->
  <!-- 336°: (745+148*(0.914),255+148*(-0.407))=(745+135.3,255-60.2)=(880.3,194.8)=(880,195) -->
  <path d="M 671,127 A 148,148 0 0,1 880,195" fill="none" stroke="#22c55e" stroke-width="18" stroke-linecap="round" stroke-opacity="0.38"/>

  <!-- High danger: >18°F = 336°→60° -->
  <!-- 880,195 → 819,383 -->
  <path d="M 880,195 A 148,148 0 0,1 819,383" fill="none" stroke="#ef4444" stroke-width="18" stroke-linecap="round" stroke-opacity="0.38"/>

  <!-- Value arc: 12°F = 12/25*300=144° into arc → SVG angle 264° -->
  <!-- 264°: (745+148*(-0.105),255+148*(-0.995))=(745-15.5,255-147.3)=(729.5,107.7)=(730,108) -->
  <path d="M 671,383 A 148,148 0 0,1 730,108" fill="none" stroke="#fb923c" stroke-width="18" stroke-linecap="round" filter="url(#go)"/>

  <!-- Tick marks for right gauge (+490 x-offset from left gauge ticks) -->
  <line x1="664" y1="393" x2="671" y2="383" stroke="#4a2200" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="587" y1="280" x2="599" y2="281" stroke="#4a2200" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="620" y1="151" x2="632" y2="160" stroke="#4a2200" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="745" y1="92"  x2="745" y2="107" stroke="#4a2200" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="870" y1="151" x2="858" y2="160" stroke="#4a2200" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="903" y1="280" x2="891" y2="281" stroke="#4a2200" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="826" y1="393" x2="819" y2="383" stroke="#4a2200" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tick labels -->
  <text x="745" y="68"  text-anchor="middle" fill="#7a4a30" font-size="10">15</text>
  <text x="612" y="136" text-anchor="middle" fill="#7a4a30" font-size="10">10</text>
  <text x="572" y="275" text-anchor="middle" fill="#7a4a30" font-size="10">5</text>
  <text x="878" y="136" text-anchor="middle" fill="#7a4a30" font-size="10">20</text>
  <text x="915" y="275" text-anchor="middle" fill="#7a4a30" font-size="10">25</text>

  <!-- Needle: 264° -->
  <!-- Inner r=42: (745+42*(-0.105),255+42*(-0.995))=(745-4.4,255-41.8)=(741,213) -->
  <!-- Outer r=128: (745+128*(-0.105),255+128*(-0.995))=(745-13.4,255-127.4)=(732,128) -->
  <line x1="741" y1="213" x2="732" y2="128" stroke="#fb923c" stroke-width="3.5" stroke-linecap="round" filter="url(#go)"/>
  <!-- Needle pivot -->
  <circle cx="745" cy="255" r="13" fill="#1e0800" stroke="#fb923c" stroke-width="2"/>
  <circle cx="745" cy="255" r="5" fill="#fb923c" fill-opacity="0.6"/>
  <!-- Needle tip glow -->
  <circle cx="730" cy="108" r="8" fill="#fb923c" filter="url(#go)"/>

  <!-- Inner display circle -->
  <circle cx="745" cy="255" r="92" fill="#0d0500" stroke="#3a1500" stroke-width="1.5"/>
  <text x="745" y="242" text-anchor="middle" fill="#fb923c" font-size="38" font-weight="700" letter-spacing="-1.5" filter="url(#go)">12°F</text>
  <text x="745" y="264" text-anchor="middle" fill="#fdba74" font-size="10.5" letter-spacing="2.5">TARGET</text>
  <text x="745" y="284" text-anchor="middle" fill="#4a2800" font-size="9" letter-spacing="1">RANGE  10 – 18 °F</text>

  <!-- Gauge label -->
  <text x="745" y="428" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="700" letter-spacing="3.5">SUBCOOLING</text>
  <text x="745" y="447" text-anchor="middle" fill="#334155" font-size="9.5" letter-spacing="0.5">Sat. Temp @ Liquid Pressure − Liquid Line Temp</text>

  <!-- Formula callout top-right -->
  <rect x="742" y="30" width="210" height="36" rx="8" fill="#18090000" stroke="#3d1a0a" stroke-width="1"/>
  <rect x="742" y="30" width="210" height="36" rx="8" fill="#180900" stroke="#3d1a0a" stroke-width="1"/>
  <text x="847" y="48" text-anchor="middle" fill="#5a3a22" font-size="8.5" letter-spacing="1">TXV / EEV PRIMARY</text>
  <text x="847" y="60" text-anchor="middle" fill="#fb923c" font-size="9" font-weight="600">Charge to subcooling target</text>

  <!-- Glass glare -->
  <ellipse cx="712" cy="178" rx="68" ry="38" fill="url(#glare)" transform="rotate(-20 712 178)"/>

  <!-- ═══════════════ CENTER DIVIDER ═══════════════ -->
  <line x1="500" y1="55" x2="500" y2="445" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="5,5"/>
  <circle cx="500" cy="255" r="26" fill="#080f1e" stroke="#1e3a5c" stroke-width="1.5"/>
  <text x="500" y="261" text-anchor="middle" fill="#4b6a80" font-size="14" font-weight="700" letter-spacing="0.5">VS</text>

  <!-- ═══════════════ HEADER / FOOTER ═══════════════ -->
  <text x="500" y="38" text-anchor="middle" fill="#2d4a63" font-size="11" font-weight="600" letter-spacing="4">HVAC REFRIGERANT DIAGNOSTICS</text>
  <text x="500" y="478" text-anchor="middle" fill="#1a2a36" font-size="9.5" letter-spacing="2.5">SUPERHEAT vs SUBCOOLING · TRADESQUOTE.COM</text>
</svg>
