<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" role="img" style="background:#0f172a; font-family: 'Inter', system-ui, sans-serif;">
  <title>Superheat vs Subcooling — refrigeration cycle diagram</title>
  <desc>Diagram of a refrigeration cycle showing superheat at the evaporator outlet and subcooling at the condenser outlet</desc>
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.15"/>
    </linearGradient>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb923c"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background zones -->
  <rect x="0" y="0" width="460" height="500" fill="url(#blueGrad)"/>
  <rect x="540" y="0" width="460" height="500" fill="url(#redGrad)"/>

  <!-- Zone divider -->
  <line x1="500" y1="0" x2="500" y2="500" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ========== EVAPORATOR (left) ========== -->
  <rect x="60" y="155" width="180" height="190" rx="6" fill="#0c2a3f" stroke="#0ea5e9" stroke-width="1.5"/>
  <line x1="60" y1="195" x2="240" y2="195" stroke="#0ea5e9" stroke-width="2.5" stroke-opacity="0.7"/>
  <line x1="60" y1="218" x2="240" y2="218" stroke="#0ea5e9" stroke-width="2.5" stroke-opacity="0.7"/>
  <line x1="60" y1="241" x2="240" y2="241" stroke="#0ea5e9" stroke-width="2.5" stroke-opacity="0.7"/>
  <line x1="60" y1="264" x2="240" y2="264" stroke="#0ea5e9" stroke-width="2.5" stroke-opacity="0.7"/>
  <line x1="60" y1="287" x2="240" y2="287" stroke="#0ea5e9" stroke-width="2.5" stroke-opacity="0.7"/>
  <line x1="60" y1="310" x2="240" y2="310" stroke="#0ea5e9" stroke-width="2.5" stroke-opacity="0.7"/>
  <line x1="95"  y1="155" x2="95"  y2="345" stroke="#1e4a6b" stroke-width="1"/>
  <line x1="120" y1="155" x2="120" y2="345" stroke="#1e4a6b" stroke-width="1"/>
  <line x1="145" y1="155" x2="145" y2="345" stroke="#1e4a6b" stroke-width="1"/>
  <line x1="170" y1="155" x2="170" y2="345" stroke="#1e4a6b" stroke-width="1"/>
  <line x1="195" y1="155" x2="195" y2="345" stroke="#1e4a6b" stroke-width="1"/>
  <line x1="220" y1="155" x2="220" y2="345" stroke="#1e4a6b" stroke-width="1"/>
  <text x="150" y="142" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="600" letter-spacing="2">EVAPORATOR</text>
  <text x="150" y="376" text-anchor="middle" fill="#475569" font-size="10">COLD SIDE</text>
  <!-- Airflow -->
  <text x="28" y="258" text-anchor="middle" fill="#38bdf8" font-size="9" opacity="0.6">&#9654;</text>
  <text x="28" y="240" text-anchor="middle" fill="#38bdf8" font-size="9" opacity="0.45">&#9654;</text>
  <text x="28" y="276" text-anchor="middle" fill="#38bdf8" font-size="9" opacity="0.45">&#9654;</text>

  <!-- ========== CONDENSER (right) ========== -->
  <rect x="760" y="155" width="180" height="190" rx="6" fill="#2a1500" stroke="#f97316" stroke-width="1.5"/>
  <line x1="760" y1="195" x2="940" y2="195" stroke="#f97316" stroke-width="2.5" stroke-opacity="0.7"/>
  <line x1="760" y1="218" x2="940" y2="218" stroke="#f97316" stroke-width="2.5" stroke-opacity="0.7"/>
  <line x1="760" y1="241" x2="940" y2="241" stroke="#f97316" stroke-width="2.5" stroke-opacity="0.7"/>
  <line x1="760" y1="264" x2="940" y2="264" stroke="#f97316" stroke-width="2.5" stroke-opacity="0.7"/>
  <line x1="760" y1="287" x2="940" y2="287" stroke="#f97316" stroke-width="2.5" stroke-opacity="0.7"/>
  <line x1="760" y1="310" x2="940" y2="310" stroke="#f97316" stroke-width="2.5" stroke-opacity="0.7"/>
  <line x1="795"  y1="155" x2="795"  y2="345" stroke="#4a2400" stroke-width="1"/>
  <line x1="820" y1="155" x2="820" y2="345" stroke="#4a2400" stroke-width="1"/>
  <line x1="845" y1="155" x2="845" y2="345" stroke="#4a2400" stroke-width="1"/>
  <line x1="870" y1="155" x2="870" y2="345" stroke="#4a2400" stroke-width="1"/>
  <line x1="895" y1="155" x2="895" y2="345" stroke="#4a2400" stroke-width="1"/>
  <line x1="920" y1="155" x2="920" y2="345" stroke="#4a2400" stroke-width="1"/>
  <text x="850" y="142" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600" letter-spacing="2">CONDENSER</text>
  <text x="850" y="376" text-anchor="middle" fill="#475569" font-size="10">HOT SIDE</text>
  <!-- Airflow -->
  <text x="972" y="258" text-anchor="middle" fill="#fb923c" font-size="9" opacity="0.6">&#9654;</text>
  <text x="972" y="240" text-anchor="middle" fill="#fb923c" font-size="9" opacity="0.45">&#9654;</text>
  <text x="972" y="276" text-anchor="middle" fill="#fb923c" font-size="9" opacity="0.45">&#9654;</text>

  <!-- ========== COMPRESSOR ========== -->
  <circle cx="390" cy="390" r="42" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <circle cx="390" cy="390" r="34" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <polygon points="375,375 375,405 405,390" fill="#64748b"/>
  <text x="390" y="448" text-anchor="middle" fill="#64748b" font-size="10" letter-spacing="1">COMPRESSOR</text>

  <!-- ========== METERING DEVICE ========== -->
  <rect x="582" y="377" width="46" height="26" rx="4" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <line x1="582" y1="390" x2="605" y2="390" stroke="#94a3b8" stroke-width="2"/>
  <line x1="605" y1="390" x2="596" y2="381" stroke="#94a3b8" stroke-width="2"/>
  <line x1="605" y1="390" x2="596" y2="399" stroke="#94a3b8" stroke-width="2"/>
  <line x1="605" y1="390" x2="628" y2="390" stroke="#94a3b8" stroke-width="2"/>
  <text x="605" y="418" text-anchor="middle" fill="#64748b" font-size="9" letter-spacing="1">TXV / ORIFICE</text>

  <!-- ========== REFRIGERANT FLOW LINES ========== -->
  <!-- Suction line: Evaporator outlet → Compressor -->
  <path d="M 240 250 L 348 250 L 348 390" fill="none" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <!-- Discharge line: Compressor → Condenser (hot gas over top) -->
  <path d="M 432 390 L 500 390 L 500 100 L 760 100" fill="none" stroke="#fb923c" stroke-width="3" marker-end="url(#arrowOrange)"/>
  <!-- Liquid line: Condenser → Metering device -->
  <path d="M 760 390 L 628 390" fill="none" stroke="#fb923c" stroke-width="3" marker-end="url(#arrowOrange)"/>
  <!-- Liquid + two-phase: Metering device → Evaporator (bottom) -->
  <path d="M 582 390 L 500 390 L 500 430 L 60 430 L 60 345" fill="none" stroke="#38bdf8" stroke-width="3" stroke-dasharray="8,3" marker-end="url(#arrowBlue)"/>

  <!-- ========== SUPERHEAT CALLOUT ========== -->
  <!-- Dot on suction line -->
  <circle cx="295" cy="250" r="6" fill="#0ea5e9" filter="url(#glow)"/>
  <line x1="295" y1="244" x2="295" y2="132" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <!-- Callout box -->
  <rect x="160" y="30" width="270" height="100" rx="8" fill="#0c1f33" stroke="#0ea5e9" stroke-width="1.5"/>
  <rect x="175" y="22" width="120" height="22" rx="11" fill="#0ea5e9"/>
  <text x="235" y="37" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700" letter-spacing="1.5">SUPERHEAT</text>
  <text x="295" y="71" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="600">Suction Temp &#8722; Sat. Temp</text>
  <text x="295" y="95" text-anchor="middle" fill="#38bdf8" font-size="20" font-weight="700" filter="url(#glow)">50&#176;F &#8722; 40&#176;F = <tspan fill="#ffffff">10&#176;F SH</tspan></text>
  <text x="295" y="114" text-anchor="middle" fill="#4b8fa8" font-size="10">Vapor fully boiled &#183; protect the compressor</text>

  <!-- ========== SUBCOOLING CALLOUT ========== -->
  <!-- Dot on liquid line -->
  <circle cx="760" cy="390" r="6" fill="#f97316" filter="url(#glow)"/>
  <line x1="760" y1="384" x2="760" y2="132" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <!-- Callout box -->
  <rect x="575" y="30" width="270" height="100" rx="8" fill="#2a1000" stroke="#f97316" stroke-width="1.5"/>
  <rect x="590" y="22" width="120" height="22" rx="11" fill="#f97316"/>
  <text x="650" y="37" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700" letter-spacing="1.5">SUBCOOLING</text>
  <text x="710" y="71" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="600">Sat. Temp &#8722; Liquid Temp</text>
  <text x="710" y="95" text-anchor="middle" fill="#fb923c" font-size="20" font-weight="700" filter="url(#glow)">115&#176;F &#8722; 105&#176;F = <tspan fill="#ffffff">10&#176;F SC</tspan></text>
  <text x="710" y="114" text-anchor="middle" fill="#8a5a30" font-size="10">Solid liquid column &#183; protect the metering device</text>

  <!-- ========== LEGEND ========== -->
  <rect x="396" y="198" width="208" height="70" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <line x1="410" y1="220" x2="444" y2="220" stroke="#38bdf8" stroke-width="2.5"/>
  <text x="452" y="224" fill="#94a3b8" font-size="10">Vapor (low-side)</text>
  <line x1="410" y1="240" x2="444" y2="240" stroke="#fb923c" stroke-width="2.5"/>
  <text x="452" y="244" fill="#94a3b8" font-size="10">Hot gas / liquid (high-side)</text>
  <line x1="410" y1="260" x2="444" y2="260" stroke="#38bdf8" stroke-width="2.5" stroke-dasharray="8,3"/>
  <text x="452" y="264" fill="#94a3b8" font-size="10">Two-phase / liquid (low-side)</text>

  <!-- ========== FOOTER ========== -->
  <text x="500" y="481" text-anchor="middle" fill="#334155" font-size="10" letter-spacing="2.5">REFRIGERATION CYCLE DIAGNOSTICS &#183; TRADESQUOTE.COM</text>
</svg>
