<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Flex duct calculator: size flexible duct by CFM</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients showing flexible corrugated duct segments, airflow arrows, and diameter badges, representing how to size flexible duct using CFM and friction rate.</desc>

  <defs>
    <linearGradient id="fd-bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="fd-skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="fd-tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="fd-ductFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="fd-accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="fd-airflow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="fd-softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="fd-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#fd-bgGrad)"/>
  <ellipse cx="800" cy="130" rx="210" ry="170" fill="url(#fd-skyGrad)" filter="url(#fd-softBlur)"/>
  <ellipse cx="680" cy="390" rx="190" ry="145" fill="url(#fd-tealGrad)" filter="url(#fd-softBlur)"/>

  <!-- Frosted card -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" y="192">Flex duct</tspan>
    <tspan x="80" dy="48" fill="#01AD9F">calculator</tspan>
  </text>
  <text x="80" y="294" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Size flexible duct by CFM &amp; friction rate</text>
  <rect x="80" y="318" width="56" height="4" rx="2" fill="url(#fd-accentBar)"/>

  <!-- Illustration: flexible duct run on the right -->

  <!-- Supply box (air handler outlet) -->
  <rect x="540" y="200" width="80" height="100" rx="10" fill="url(#fd-ductFill)" stroke="#2563EB" stroke-width="2" stroke-opacity="0.45"/>
  <text x="580" y="254" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800">air</text>
  <text x="580" y="270" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800">handler</text>

  <!-- Flexible duct: corrugated look with repeated ribs -->
  <!-- Duct tube outer shape -->
  <rect x="620" y="222" width="230" height="56" rx="28" fill="url(#fd-ductFill)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Corrugation ribs (thin vertical lines) -->
  <line x1="648" y1="222" x2="648" y2="278" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="668" y1="222" x2="668" y2="278" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="688" y1="222" x2="688" y2="278" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="708" y1="222" x2="708" y2="278" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="728" y1="222" x2="728" y2="278" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="748" y1="222" x2="748" y2="278" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="768" y1="222" x2="768" y2="278" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="788" y1="222" x2="788" y2="278" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="808" y1="222" x2="808" y2="278" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="828" y1="222" x2="828" y2="278" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.35"/>

  <!-- Airflow arrows inside duct -->
  <path d="M638 250 H820" stroke="url(#fd-airflow)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.75" filter="url(#fd-glow)"/>
  <path d="M820 250 l -10 -6 l 0 12 Z" fill="#01AD9F" opacity="0.9"/>

  <!-- Register/boot at the end -->
  <rect x="850" y="215" width="22" height="70" rx="5" fill="#FFFFFF" fill-opacity="0.65" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.55"/>
  <line x1="850" y1="232" x2="872" y2="232" stroke="#01AD9F" stroke-width="1.3" stroke-opacity="0.4"/>
  <line x1="850" y1="250" x2="872" y2="250" stroke="#01AD9F" stroke-width="1.3" stroke-opacity="0.4"/>
  <line x1="850" y1="268" x2="872" y2="268" stroke="#01AD9F" stroke-width="1.3" stroke-opacity="0.4"/>

  <!-- Diameter badge -->
  <rect x="688" y="170" width="120" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="748" y="190" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="0.4">10 in flex → 360 CFM</text>

  <!-- CFM penalty badge -->
  <rect x="630" y="295" width="150" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.9" stroke="#2563EB" stroke-width="1.5"/>
  <text x="705" y="315" text-anchor="middle" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="0.3">−15–20% vs rigid</text>

  <!-- Second smaller duct segment below for depth -->
  <rect x="620" y="330" width="170" height="42" rx="21" fill="url(#fd-ductFill)" stroke="#2563EB" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="644" y1="330" x2="644" y2="372" stroke="#2563EB" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="660" y1="330" x2="660" y2="372" stroke="#2563EB" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="676" y1="330" x2="676" y2="372" stroke="#2563EB" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="692" y1="330" x2="692" y2="372" stroke="#2563EB" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="708" y1="330" x2="708" y2="372" stroke="#2563EB" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="724" y1="330" x2="724" y2="372" stroke="#2563EB" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="740" y1="330" x2="740" y2="372" stroke="#2563EB" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="756" y1="330" x2="756" y2="372" stroke="#2563EB" stroke-width="1" stroke-opacity="0.25"/>
  <text x="790" y="355" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">8 in → 180 CFM</text>

  <!-- Teal bottom strip -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
