<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">AC Tonnage Calculator Guide</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, square footage and BTU badges flowing into a tonnage result, representing how to calculate AC tonnage for a home.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="tonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="780" cy="120" rx="210" ry="165" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="390" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <!-- Frosted card -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="195" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">AC Tonnage</tspan>
    <tspan x="80" dy="48" fill="#01AD9F">Calculator</tspan>
  </text>
  <text x="80" y="295" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Sq ft / BTU → right-size your system</text>
  <rect x="80" y="319" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- House silhouette (abstract) -->
  <path d="M580 320 L580 210 L680 140 L780 210 L780 320 Z" fill="url(#badgeGrad)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.45"/>
  <!-- Roof highlight -->
  <path d="M580 210 L680 140 L780 210" stroke="#01AD9F" stroke-width="3" stroke-opacity="0.6" fill="none"/>

  <!-- Window/AC unit on house -->
  <rect x="640" y="240" width="80" height="55" rx="8" fill="url(#tonGrad)" stroke="#2563EB" stroke-width="1.8" stroke-opacity="0.5"/>
  <!-- AC unit grille lines -->
  <line x1="655" y1="255" x2="705" y2="255" stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.4"/>
  <line x1="655" y1="268" x2="705" y2="268" stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.4"/>
  <line x1="655" y1="281" x2="705" y2="281" stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.4"/>

  <!-- Sq ft badge (left input) -->
  <rect x="548" y="155" width="104" height="44" rx="12" fill="#FFFFFF" fill-opacity="0.88" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="600" y="174" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" letter-spacing="0.3">SQ FT</text>
  <text x="600" y="191" text-anchor="middle" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="800">2,000</text>

  <!-- BTU badge (right input) -->
  <rect x="708" y="155" width="104" height="44" rx="12" fill="#FFFFFF" fill-opacity="0.88" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="760" y="174" text-anchor="middle" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" letter-spacing="0.3">BTU/hr</text>
  <text x="760" y="191" text-anchor="middle" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="800">36,000</text>

  <!-- Arrow pointing down from badges toward tons result -->
  <path d="M600 200 L600 330 L648 330" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.5" fill="none" stroke-dasharray="4 3"/>
  <path d="M760 200 L760 330 L712 330" stroke="#2563EB" stroke-width="2" stroke-opacity="0.5" fill="none" stroke-dasharray="4 3"/>

  <!-- Tons result badge at bottom of house -->
  <rect x="631" y="323" width="98" height="38" rx="10" fill="#01AD9F" fill-opacity="0.92" stroke="#01AD9F" stroke-width="1.5" filter="url(#glow)"/>
  <text x="680" y="338" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" letter-spacing="0.5">RESULT</text>
  <text x="680" y="354" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800">3 tons</text>

  <!-- Floating 1 ton = 12,000 BTU label -->
  <rect x="820" y="300" width="148" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.90" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="894" y="320" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">1 ton = 12,000 BTU</text>

  <!-- Bottom teal strip -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
