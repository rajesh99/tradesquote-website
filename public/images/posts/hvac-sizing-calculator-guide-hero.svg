<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">HVAC sizing calculator guide</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, AC unit, BTU and tonnage badges, and a sizing formula, representing how to size HVAC equipment by square footage and load calculation.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="unitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="800" cy="110" rx="210" ry="165" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="660" cy="390" rx="175" ry="145" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <!-- Frosted card -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="190" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">HVAC Sizing</tspan>
    <tspan x="80" dy="46" fill="#01AD9F">Calculator</tspan>
  </text>
  <text x="80" y="292" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">Right-size AC, furnace &amp; heat pump</text>
  <rect x="80" y="314" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- AC outdoor condenser unit (right side) -->
  <rect x="580" y="200" width="130" height="160" rx="16" fill="url(#unitGrad)" stroke="#01AD9F" stroke-width="2.5" stroke-opacity="0.55"/>
  <!-- Fan grill lines -->
  <circle cx="645" cy="260" r="48" fill="none" stroke="#01AD9F" stroke-width="1.8" stroke-opacity="0.35"/>
  <circle cx="645" cy="260" r="32" fill="none" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.25"/>
  <circle cx="645" cy="260" r="12" fill="#01AD9F" fill-opacity="0.22" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Fan blade cross -->
  <line x1="645" y1="218" x2="645" y2="302" stroke="#01AD9F" stroke-width="1.6" stroke-opacity="0.30"/>
  <line x1="601" y1="260" x2="689" y2="260" stroke="#01AD9F" stroke-width="1.6" stroke-opacity="0.30"/>
  <line x1="614" y1="228" x2="676" y2="292" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.22"/>
  <line x1="676" y1="228" x2="614" y2="292" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.22"/>
  <!-- Unit label -->
  <text x="645" y="378" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="800">condenser</text>

  <!-- Tonnage badge -->
  <rect x="730" y="192" width="148" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.90" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="804" y="215" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" letter-spacing="0.3">2–5 tons typical</text>

  <!-- BTU badge -->
  <rect x="748" y="252" width="150" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.90" stroke="#2563EB" stroke-width="1.5"/>
  <text x="823" y="275" text-anchor="middle" fill="#1E40AF" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" letter-spacing="0.3">12,000 BTU = 1 ton</text>

  <!-- Sq ft formula badge -->
  <rect x="720" y="312" width="192" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.90" stroke="#01AD9F" stroke-width="1.5"/>
  <text x="816" y="335" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700">20 BTU × sq ft = load</text>

  <!-- Bottom teal strip -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
