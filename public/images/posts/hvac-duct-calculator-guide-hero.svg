<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">HVAC duct calculator guide</title>
  <desc id="heroDesc">Abstract hero graphic showing duct sizing by CFM with round and rectangular duct cross-sections, airflow arrows, and labeled CFM badges representing how to size HVAC ductwork.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="ductFillH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="ductFillV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="streamFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#5EEAD4"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="800" cy="110" rx="210" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="650" cy="400" rx="190" ry="130" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <!-- Frosted card left -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="195" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">HVAC duct</tspan>
    <tspan x="80" dy="46" fill="#01AD9F">calculator guide</tspan>
  </text>
  <text x="80" y="295" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">Size ductwork by CFM at 0.10 in.wg/100 ft</text>
  <rect x="80" y="319" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Right side illustration: horizontal trunk duct with branching supply runs -->

  <!-- Trunk duct (horizontal) -->
  <rect x="530" y="220" width="380" height="60" rx="10" fill="url(#ductFillH)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.6"/>
  <text x="700" y="256" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="800">TRUNK — 1,700 CFM / 16 in</text>

  <!-- Airflow arrows inside trunk -->
  <path d="M560 250 H620" stroke="url(#streamFlow)" stroke-width="5" stroke-linecap="round" opacity="0.7" filter="url(#glow)"/>
  <path d="M650 250 H710" stroke="url(#streamFlow)" stroke-width="5" stroke-linecap="round" opacity="0.6" filter="url(#glow)"/>
  <path d="M740 250 H800" stroke="url(#streamFlow)" stroke-width="5" stroke-linecap="round" opacity="0.5" filter="url(#glow)"/>
  <!-- arrow heads -->
  <path d="M620 250 l-10 -4 l4 8" fill="#5EEAD4" opacity="0.85"/>
  <path d="M710 250 l-10 -4 l4 8" fill="#5EEAD4" opacity="0.7"/>
  <path d="M800 250 l-10 -4 l4 8" fill="#5EEAD4" opacity="0.55"/>

  <!-- Branch run 1 — drops down from trunk -->
  <rect x="590" y="280" width="36" height="90" rx="8" fill="url(#ductFillV)" stroke="#2563EB" stroke-width="1.6" stroke-opacity="0.55"/>
  <rect x="576" y="366" width="64" height="12" rx="4" fill="#FFFFFF" fill-opacity="0.7" stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.4"/>
  <!-- grille lines -->
  <line x1="584" y1="368" x2="584" y2="377" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="594" y1="368" x2="594" y2="377" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="604" y1="368" x2="604" y2="377" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="614" y1="368" x2="614" y2="377" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="624" y1="368" x2="624" y2="377" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Branch CFM badge 1 -->
  <rect x="570" y="300" width="80" height="22" rx="11" fill="#FFFFFF" fill-opacity="0.9" stroke="#5EEAD4" stroke-width="1.3"/>
  <text x="610" y="315" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700">100 CFM / 6 in</text>

  <!-- Branch run 2 -->
  <rect x="700" y="280" width="44" height="90" rx="8" fill="url(#ductFillV)" stroke="#2563EB" stroke-width="1.6" stroke-opacity="0.55"/>
  <rect x="684" y="366" width="76" height="12" rx="4" fill="#FFFFFF" fill-opacity="0.7" stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.4"/>
  <line x1="692" y1="368" x2="692" y2="377" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="704" y1="368" x2="704" y2="377" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="716" y1="368" x2="716" y2="377" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="728" y1="368" x2="728" y2="377" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="740" y1="368" x2="740" y2="377" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="752" y1="368" x2="752" y2="377" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Branch CFM badge 2 -->
  <rect x="676" y="300" width="96" height="22" rx="11" fill="#FFFFFF" fill-opacity="0.9" stroke="#5EEAD4" stroke-width="1.3"/>
  <text x="724" y="315" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700">450 CFM / 10 in</text>

  <!-- Branch run 3 -->
  <rect x="830" y="280" width="52" height="90" rx="8" fill="url(#ductFillV)" stroke="#2563EB" stroke-width="1.6" stroke-opacity="0.55"/>
  <rect x="814" y="366" width="84" height="12" rx="4" fill="#FFFFFF" fill-opacity="0.7" stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.4"/>
  <line x1="822" y1="368" x2="822" y2="377" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="834" y1="368" x2="834" y2="377" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="846" y1="368" x2="846" y2="377" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="858" y1="368" x2="858" y2="377" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="870" y1="368" x2="870" y2="377" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="882" y1="368" x2="882" y2="377" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="894" y1="368" x2="894" y2="377" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Branch CFM badge 3 -->
  <rect x="806" y="300" width="100" height="22" rx="11" fill="#FFFFFF" fill-opacity="0.9" stroke="#5EEAD4" stroke-width="1.3"/>
  <text x="856" y="315" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700">700 CFM / 12 in</text>

  <!-- Friction rate label -->
  <rect x="556" y="158" width="190" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.88" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="651" y="177" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" letter-spacing="0.3">0.10 in.wg / 100 ft</text>

  <!-- Bottom teal strip -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
