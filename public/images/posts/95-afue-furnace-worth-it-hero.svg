<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">95% AFUE furnace - efficiency comparison hero</title>
  <desc id="heroDesc">Abstract hero illustration comparing 80% and 96% AFUE furnace efficiency with soft gradients, warm heating accents, and minimal geometric shapes on a wide panoramic layout.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFBF5"/>
      <stop offset="42%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#F0F9FF"/>
    </linearGradient>
    <linearGradient id="warmBlob" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#FDBA74" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="tealBlob" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="blueBlob" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="cardOld" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#F8FAFC" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="cardNew" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#FFF7ED" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="efficiencyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#01AD9F"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <ellipse cx="760" cy="110" rx="170" ry="130" fill="url(#warmBlob)" filter="url(#softBlur)"/>
  <ellipse cx="890" cy="330" rx="150" ry="115" fill="url(#tealBlob)" filter="url(#softBlur)"/>
  <ellipse cx="650" cy="390" rx="110" ry="85" fill="url(#blueBlob)" filter="url(#softBlur)"/>

  <circle cx="710" cy="255" r="104" stroke="#EA580C" stroke-width="1.5" stroke-opacity="0.16"/>
  <circle cx="710" cy="255" r="74" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.14"/>
  <circle cx="710" cy="255" r="44" stroke="#FB923C" stroke-width="2" stroke-opacity="0.2"/>

  <circle cx="580" cy="120" r="6" fill="#EA580C" fill-opacity="0.32"/>
  <circle cx="840" cy="170" r="4" fill="#01AD9F" fill-opacity="0.35"/>
  <circle cx="910" cy="285" r="5" fill="#2563EB" fill-opacity="0.28"/>
  <circle cx="660" cy="95" r="3.5" fill="#FB923C" fill-opacity="0.4"/>

  <g opacity="0.5">
    <rect x="555" y="92" width="8" height="68" rx="4" fill="#FED7AA"/>
    <rect x="571" y="108" width="8" height="52" rx="4" fill="#FB923C" fill-opacity="0.55"/>
    <rect x="587" y="100" width="8" height="60" rx="4" fill="#EA580C" fill-opacity="0.45"/>
    <rect x="603" y="116" width="8" height="44" rx="4" fill="#01AD9F" fill-opacity="0.4"/>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="538" y="168" width="168" height="196" rx="18" fill="url(#cardOld)" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect x="538" y="168" width="168" height="44" rx="18" fill="#F8FAFC"/>
    <rect x="538" y="196" width="168" height="16" fill="#F8FAFC"/>
    <text x="562" y="198" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" letter-spacing="0.08em">80% AFUE</text>
    <text x="562" y="222" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="11">Standard furnace</text>
    <text x="622" y="292" text-anchor="middle" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700">80</text>
    <text x="622" y="318" text-anchor="middle" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="12">% fuel to heat</text>
    <rect x="562" y="336" width="120" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="562" y="336" width="96" height="8" rx="4" fill="#94A3B8" fill-opacity="0.55"/>

    <rect x="718" y="148" width="188" height="216" rx="20" fill="url(#cardNew)" stroke="#EA580C" stroke-width="2"/>
    <rect x="718" y="148" width="188" height="48" rx="20" fill="#FFF7ED"/>
    <rect x="718" y="180" width="188" height="16" fill="#FFF7ED"/>
    <text x="744" y="180" fill="#EA580C" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" letter-spacing="0.06em">96% AFUE</text>
    <text x="744" y="202" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">High-efficiency</text>
    <text x="812" y="278" text-anchor="middle" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700">96</text>
    <text x="812" y="306" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="12">% fuel to heat</text>
    <rect x="744" y="326" width="136" height="10" rx="5" fill="#E2E8F0"/>
    <rect x="744" y="326" width="130" height="10" rx="5" fill="url(#efficiencyGrad)"/>
  </g>

  <path d="M706 266 H718" stroke="#EA580C" stroke-width="2" stroke-linecap="round"/>
  <path d="M712 260 L720 266 L712 272" fill="#EA580C"/>

  <rect x="738" y="352" width="88" height="28" rx="14" fill="#152035" fill-opacity="0.06" stroke="#01AD9F" stroke-width="1" stroke-opacity="0.35"/>
  <text x="782" y="371" text-anchor="middle" fill="#01AD9F" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">-16.7% fuel</text>

  <g opacity="0.18" transform="translate(620, 72)">
    <rect x="0" y="24" width="56" height="36" rx="4" fill="#152035"/>
    <rect x="8" y="8" width="40" height="20" rx="3" fill="#152035"/>
    <path d="M20 8 V0 M28 8 V0 M36 8 V0" stroke="#152035" stroke-width="2" stroke-linecap="round"/>
  </g>

  <rect x="48" y="56" width="420" height="388" rx="24" fill="#FFFFFF" fill-opacity="0.35" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.7"/>

  <text x="80" y="196" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Is 95% AFUE</tspan>
    <tspan x="80" dy="46">Worth the</tspan>
    <tspan x="80" dy="46" fill="#EA580C">Extra Cost?</tspan>
  </text>
  <text x="80" y="330" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Payback, savings, and when it makes sense</text>

  <rect x="80" y="354" width="56" height="4" rx="2" fill="url(#efficiencyGrad)"/>

  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
