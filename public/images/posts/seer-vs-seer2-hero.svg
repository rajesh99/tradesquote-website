<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">SEER vs SEER2 - HVAC efficiency rating comparison</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients and geometric shapes representing the transition from SEER to SEER2 efficiency ratings.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="arcOld" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="arcNew" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Soft ambient blobs -->
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="280" rx="120" ry="120" fill="url(#indigoGrad)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>

  <g opacity="0.16">
    <circle cx="80" cy="140" r="2" fill="#94A3B8"/>
    <circle cx="120" cy="180" r="2" fill="#94A3B8"/>
    <circle cx="160" cy="120" r="2" fill="#94A3B8"/>
    <circle cx="200" cy="220" r="2" fill="#94A3B8"/>
    <circle cx="100" cy="280" r="2" fill="#94A3B8"/>
    <circle cx="180" cy="320" r="2" fill="#94A3B8"/>
    <circle cx="240" cy="160" r="2" fill="#94A3B8"/>
    <circle cx="60" cy="360" r="2" fill="#94A3B8"/>
  </g>

  <text x="80" y="210" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">SEER vs</tspan>
    <tspan x="80" dy="48" fill="#01AD9F">SEER2</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">What changed - and does it matter?</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Abstract rings - efficiency gauge metaphor -->
  <circle cx="720" cy="250" r="148" stroke="#E2E8F0" stroke-width="1.5" fill="none"/>
  <circle cx="720" cy="250" r="118" stroke="#E2E8F0" stroke-width="1" fill="none" stroke-dasharray="6 8"/>

  <!-- SEER arc (slightly larger sweep) -->
  <path
    d="M 720 102 A 148 148 0 0 1 868 250"
    stroke="url(#arcOld)"
    stroke-width="10"
    stroke-linecap="round"
    fill="none"
    opacity="0.85"
    filter="url(#glow)"
  />

  <!-- SEER2 arc (slightly shorter - ~5% visual gap) -->
  <path
    d="M 720 132 A 118 118 0 0 1 838 250"
    stroke="url(#arcNew)"
    stroke-width="10"
    stroke-linecap="round"
    fill="none"
    opacity="0.9"
    filter="url(#glow)"
  />

  <!-- Center hub -->
  <circle cx="720" cy="250" r="36" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="720" cy="250" r="22" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>

  <!-- Floating abstract shapes -->
  <rect x="580" y="88" width="72" height="72" rx="18" fill="#FFFFFF" fill-opacity="0.7" stroke="#BAE6FD" stroke-width="1.5" transform="rotate(-12 616 124)"/>
  <circle cx="860" cy="160" r="28" fill="#FFFFFF" fill-opacity="0.65" stroke="#99F6E4" stroke-width="1.5"/>
  <rect x="820" y="340" width="56" height="56" rx="14" fill="#FFFFFF" fill-opacity="0.6" stroke="#C7D2FE" stroke-width="1.5" transform="rotate(18 848 368)"/>

  <!-- Conversion arrow -->
  <path d="M 600 250 H 648" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 5"/>
  <path d="M 644 244 L 656 250 L 644 256" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Small rating badges -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="548" y="196" width="72" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.92" stroke="#7DD3FC" stroke-width="1.5"/>
    <text x="584" y="217" text-anchor="middle" fill="#0369A1" font-size="13" font-weight="700" letter-spacing="1.5">SEER</text>

    <rect x="548" y="272" width="88" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="592" y="293" text-anchor="middle" fill="#0F766E" font-size="13" font-weight="700" letter-spacing="1">SEER2</text>
  </g>

  <!-- Factor hint -->
  <text x="720" y="258" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="11" font-weight="600">&#215;0.95</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
