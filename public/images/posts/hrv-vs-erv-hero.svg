<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">HRV vs ERV - heat and energy recovery ventilator comparison</title>
  <desc id="heroDesc">Side-by-side illustration of a heat recovery ventilator with aluminum plate core and an energy recovery ventilator with enthalpy wheel, showing duct connections, fans, and moisture transfer.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="coldZone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="humidZone" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="aluminumPlate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CBD5E1"/>
      <stop offset="50%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#01AD9F" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#01AD9F"/>
    </linearGradient>
    <linearGradient id="ductCold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="ductWarm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="ductHumid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38BDF8"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#FB923C"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#14B8A6"/>
    </marker>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="620" cy="130" rx="200" ry="150" fill="url(#coldZone)" filter="url(#softBlur)"/>
  <ellipse cx="860" cy="340" rx="170" ry="130" fill="url(#humidZone)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="40" y="68" width="360" height="364" rx="22" fill="#FFFFFF" fill-opacity="0.45" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.85"/>
  <text x="72" y="200" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="72" dy="0">HRV vs</tspan>
    <tspan x="72" dy="48" fill="#01AD9F">ERV</tspan>
  </text>
  <text x="72" y="290" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">Heat recovery vs energy recovery</text>
  <text x="72" y="316" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="13">Which ventilator fits your climate?</text>
  <rect x="72" y="336" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Zone divider -->
  <line x1="500" y1="88" x2="500" y2="412" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="6 6"/>

  <!-- ==================== HRV UNIT (left equipment) ==================== -->
  <g filter="url(#cardShadow)">
    <!-- Cabinet -->
    <rect x="430" y="118" width="200" height="268" rx="10" fill="#FFFFFF" stroke="#7DD3FC" stroke-width="2"/>
    <rect x="430" y="118" width="200" height="36" rx="10" fill="#F0F9FF"/>
    <rect x="430" y="142" width="200" height="12" fill="#F0F9FF"/>
    <text x="530" y="142" text-anchor="middle" fill="#0369A1" font-family="system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">HRV</text>
    <text x="530" y="158" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Heat Recovery Ventilator</text>

    <!-- Top fan -->
    <circle cx="530" cy="188" r="22" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
    <circle cx="530" cy="188" r="14" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="1"/>
    <line x1="530" y1="174" x2="530" y2="202" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
    <line x1="516" y1="188" x2="544" y2="188" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
    <line x1="520" y1="178" x2="540" y2="198" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="540" y1="178" x2="520" y2="198" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <text x="530" y="214" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="8" letter-spacing="0.5">SUPPLY FAN</text>

    <!-- Aluminum plate heat exchanger core -->
    <rect x="452" y="224" width="156" height="108" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="530" y="238" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="8" font-weight="600" letter-spacing="0.8">PLATE CORE</text>
    <g>
      <rect x="462" y="246" width="136" height="5" rx="1" fill="url(#aluminumPlate)"/>
      <rect x="462" y="254" width="136" height="5" rx="1" fill="url(#aluminumPlate)" opacity="0.9"/>
      <rect x="462" y="262" width="136" height="5" rx="1" fill="url(#aluminumPlate)"/>
      <rect x="462" y="270" width="136" height="5" rx="1" fill="url(#aluminumPlate)" opacity="0.9"/>
      <rect x="462" y="278" width="136" height="5" rx="1" fill="url(#aluminumPlate)"/>
      <rect x="462" y="286" width="136" height="5" rx="1" fill="url(#aluminumPlate)" opacity="0.9"/>
      <rect x="462" y="294" width="136" height="5" rx="1" fill="url(#aluminumPlate)"/>
      <rect x="462" y="302" width="136" height="5" rx="1" fill="url(#aluminumPlate)" opacity="0.9"/>
      <rect x="462" y="310" width="136" height="5" rx="1" fill="url(#aluminumPlate)"/>
      <rect x="462" y="318" width="136" height="5" rx="1" fill="url(#aluminumPlate)" opacity="0.9"/>
    </g>
    <!-- Heat transfer arrows inside core -->
    <path d="M 478 268 L 492 268" stroke="#38BDF8" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <path d="M 568 278 L 554 278" stroke="#FB923C" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

    <!-- Bottom exhaust fan -->
    <circle cx="530" cy="352" r="18" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
    <line x1="530" y1="338" x2="530" y2="366" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="516" y1="352" x2="544" y2="352" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <text x="530" y="374" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="8" letter-spacing="0.5">EXHAUST FAN</text>
  </g>

  <!-- HRV duct connections -->
  <rect x="392" y="176" width="38" height="22" rx="4" fill="url(#ductCold)" opacity="0.85"/>
  <rect x="392" y="318" width="38" height="22" rx="4" fill="url(#ductWarm)" opacity="0.85"/>
  <text x="374" y="190" text-anchor="end" fill="#0369A1" font-family="system-ui, sans-serif" font-size="8" font-weight="600">FRESH</text>
  <text x="374" y="332" text-anchor="end" fill="#C2410C" font-family="system-ui, sans-serif" font-size="8" font-weight="600">STALE</text>

  <!-- HRV badge -->
  <rect x="444" y="396" width="172" height="28" rx="14" fill="#FFFFFF" stroke="#7DD3FC" stroke-width="1.5"/>
  <text x="530" y="415" text-anchor="middle" fill="#0369A1" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Sensible heat only · Zones 57</text>

  <!-- Snowflake / dry climate icon -->
  <g transform="translate(448, 88)" opacity="0.7">
    <line x1="10" y1="0" x2="10" y2="20" stroke="#38BDF8" stroke-width="1.5"/>
    <line x1="0" y1="10" x2="20" y2="10" stroke="#38BDF8" stroke-width="1.5"/>
    <line x1="3" y1="3" x2="17" y2="17" stroke="#38BDF8" stroke-width="1.2"/>
    <line x1="17" y1="3" x2="3" y2="17" stroke="#38BDF8" stroke-width="1.2"/>
  </g>

  <!-- ==================== ERV UNIT (right equipment) ==================== -->
  <g filter="url(#cardShadow)">
    <!-- Cabinet -->
    <rect x="570" y="118" width="200" height="268" rx="10" fill="#FFFFFF" stroke="#5EEAD4" stroke-width="2"/>
    <rect x="570" y="118" width="200" height="36" rx="10" fill="#F0FDFA"/>
    <rect x="570" y="142" width="200" height="12" fill="#F0FDFA"/>
    <text x="670" y="142" text-anchor="middle" fill="#0F766E" font-family="system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">ERV</text>
    <text x="670" y="158" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="9">Energy Recovery Ventilator</text>

    <!-- Top fan -->
    <circle cx="670" cy="188" r="22" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
    <circle cx="670" cy="188" r="14" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="1"/>
    <line x1="670" y1="174" x2="670" y2="202" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
    <line x1="656" y1="188" x2="684" y2="188" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
    <line x1="660" y1="178" x2="680" y2="198" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="680" y1="178" x2="660" y2="198" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <text x="670" y="214" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="8" letter-spacing="0.5">SUPPLY FAN</text>

    <!-- Enthalpy wheel core -->
    <rect x="592" y="224" width="156" height="108" rx="6" fill="#F0FDFA" stroke="#99F6E4" stroke-width="1.5"/>
    <text x="670" y="238" text-anchor="middle" fill="#0F766E" font-family="system-ui, sans-serif" font-size="8" font-weight="600" letter-spacing="0.8">ENTHALPY WHEEL</text>
    <circle cx="670" cy="282" r="38" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <circle cx="670" cy="282" r="32" fill="none" stroke="#E2E8F0" stroke-width="1"/>
    <!-- Wheel sectors -->
    <path d="M 670 250 A 32 32 0 0 1 698 270 L 670 282 Z" fill="#0EA5E9" opacity="0.75"/>
    <path d="M 698 270 A 32 32 0 0 1 698 294 L 670 282 Z" fill="#01AD9F" opacity="0.8"/>
    <path d="M 698 294 A 32 32 0 0 1 670 314 L 670 282 Z" fill="#38BDF8" opacity="0.7"/>
    <path d="M 670 314 A 32 32 0 0 1 642 294 L 670 282 Z" fill="#14B8A6" opacity="0.8"/>
    <path d="M 642 294 A 32 32 0 0 1 642 270 L 670 282 Z" fill="#0EA5E9" opacity="0.65"/>
    <path d="M 642 270 A 32 32 0 0 1 670 250 L 670 282 Z" fill="#2DD4BF" opacity="0.75"/>
    <!-- Hub -->
    <circle cx="670" cy="282" r="10" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
    <!-- Moisture permeable membrane hint lines -->
    <path d="M 608 268 Q 640 262 662 268" stroke="#14B8A6" stroke-width="1" stroke-dasharray="3 2" fill="none" opacity="0.6"/>
    <path d="M 678 296 Q 702 302 728 296" stroke="#0EA5E9" stroke-width="1" stroke-dasharray="3 2" fill="none" opacity="0.6"/>

    <!-- Bottom exhaust fan -->
    <circle cx="670" cy="352" r="18" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
    <line x1="670" y1="338" x2="670" y2="366" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="656" y1="352" x2="684" y2="352" stroke="#64748B" stroke-width="1.5" stroke-linecap="round"/>
    <text x="670" y="374" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="8" letter-spacing="0.5">EXHAUST FAN</text>
  </g>

  <!-- ERV duct connections -->
  <rect x="770" y="176" width="38" height="22" rx="4" fill="url(#ductHumid)" opacity="0.85"/>
  <rect x="770" y="318" width="38" height="22" rx="4" fill="url(#ductWarm)" opacity="0.85"/>
  <text x="818" y="190" fill="#0F766E" font-family="system-ui, sans-serif" font-size="8" font-weight="600">HUMID</text>
  <text x="818" y="332" fill="#C2410C" font-family="system-ui, sans-serif" font-size="8" font-weight="600">STALE</text>

  <!-- Moisture droplets (ERV only) -->
  <g fill="#14B8A6" opacity="0.75">
    <ellipse cx="748" cy="252" rx="4" ry="5.5"/>
    <ellipse cx="762" cy="268" rx="3" ry="4"/>
    <ellipse cx="754" cy="290" rx="3.5" ry="4.5"/>
  </g>
  <path d="M 736 260 Q 752 248 768 258" stroke="#14B8A6" stroke-width="1.2" fill="none" marker-end="url(#arrowTeal)" opacity="0.7"/>

  <!-- ERV badge -->
  <rect x="584" y="396" width="172" height="28" rx="14" fill="#FFFFFF" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="670" y="415" text-anchor="middle" fill="#0F766E" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Heat + moisture · Zones 13</text>

  <!-- Humidity icon -->
  <g transform="translate(758, 84)" opacity="0.75">
    <ellipse cx="10" cy="14" rx="8" ry="10" fill="#5EEAD4" fill-opacity="0.35" stroke="#14B8A6" stroke-width="1.2"/>
    <path d="M 10 2 C 6 8 4 11 4 14 C 4 18 7 21 10 21 C 13 21 16 18 16 14 C 16 11 14 8 10 2 Z" fill="#14B8A6" fill-opacity="0.5"/>
  </g>

  <!-- VS divider -->
  <circle cx="500" cy="252" r="22" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="500" y="258" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="13" font-weight="700">VS</text>

  <!-- Effectiveness callout -->
  <rect x="420" y="438" width="360" height="34" rx="8" fill="#FFFFFF" fill-opacity="0.85" stroke="#E2E8F0" stroke-width="1"/>
  <text x="600" y="460" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="11">
    <tspan fill="#0369A1" font-weight="600">7085%</tspan> sensible recovery
    <tspan fill="#94A3B8"> · </tspan>
    <tspan fill="#0F766E" font-weight="600">ERV</tspan>
    <tspan fill="#64748B"> also transfers water vapor</tspan>
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
