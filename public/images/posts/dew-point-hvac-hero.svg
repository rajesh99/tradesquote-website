<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Dew Point and HVAC - condensation, ducts and comfort</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, condensation droplets forming on a cool surface, and a saturation curve representing dew point in HVAC.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="curveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Soft ambient blobs -->
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="280" rx="120" ry="120" fill="url(#indigoGrad)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>

  <g opacity="0.16">
    <circle cx="80" cy="140" r="2" fill="#94A3B8"/>
    <circle cx="120" cy="180" r="2" fill="#94A3B8"/>
    <circle cx="160" cy="120" r="2" fill="#94A3B8"/>
    <circle cx="200" cy="220" r="2" fill="#94A3B8"/>
    <circle cx="100" cy="280" r="2" fill="#94A3B8"/>
    <circle cx="180" cy="320" r="2" fill="#94A3B8"/>
    <circle cx="240" cy="160" r="2" fill="#94A3B8"/>
    <circle cx="60" cy="360" r="2" fill="#94A3B8"/>
  </g>

  <text x="80" y="200" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Dew Point</tspan>
    <tspan x="80" dy="48" fill="#01AD9F">Where air meets water</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Condensation, ducts &amp; comfort</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Saturation curve metaphor -->
  <path d="M 560 380 C 640 380 700 300 720 230 C 736 174 760 132 840 120"
        stroke="url(#curveGrad)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.85" filter="url(#glow)"/>
  <circle cx="720" cy="230" r="9" fill="#FFFFFF" stroke="#01AD9F" stroke-width="3"/>
  <text x="734" y="222" fill="#0F766E" font-family="system-ui, sans-serif" font-size="13" font-weight="700">dew point</text>

  <!-- Cool surface line -->
  <rect x="556" y="252" width="300" height="6" rx="3" fill="#CBD5E1" opacity="0.7"/>

  <!-- Condensation droplets forming on the cool surface -->
  <g filter="url(#glow)">
    <path d="M600 258 q11 18 0 26 q-11 -8 0 -26 Z" fill="url(#dropGrad)" opacity="0.92"/>
    <path d="M656 258 q8 14 0 20 q-8 -6 0 -20 Z" fill="url(#dropGrad)" opacity="0.85"/>
    <path d="M704 258 q13 22 0 30 q-13 -9 0 -30 Z" fill="url(#dropGrad)" opacity="0.95"/>
    <path d="M760 258 q9 15 0 22 q-9 -6 0 -22 Z" fill="url(#dropGrad)" opacity="0.8"/>
    <path d="M812 258 q11 18 0 26 q-11 -8 0 -26 Z" fill="url(#dropGrad)" opacity="0.88"/>
  </g>

  <!-- Floating abstract shapes -->
  <rect x="580" y="100" width="72" height="72" rx="18" fill="#FFFFFF" fill-opacity="0.7" stroke="#BAE6FD" stroke-width="1.5" transform="rotate(-12 616 136)"/>
  <circle cx="868" cy="180" r="28" fill="#FFFFFF" fill-opacity="0.65" stroke="#99F6E4" stroke-width="1.5"/>
  <rect x="824" y="350" width="56" height="56" rx="14" fill="#FFFFFF" fill-opacity="0.6" stroke="#C7D2FE" stroke-width="1.5" transform="rotate(18 852 378)"/>

  <!-- Small free droplets floating -->
  <g opacity="0.6">
    <path d="M880 240 q7 12 0 17 q-7 -5 0 -17 Z" fill="#7DD3FC"/>
    <path d="M560 200 q6 10 0 14 q-6 -4 0 -14 Z" fill="#5EEAD4"/>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
