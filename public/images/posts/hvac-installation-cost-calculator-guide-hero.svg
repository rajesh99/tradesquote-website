<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">HVAC installation cost calculator</title>
  <desc id="heroDesc">Abstract hero graphic with an AC condenser unit, a price badge, and an installed-cost range bar, representing how an HVAC installation cost calculator turns tonnage and efficiency into an installed price.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="unitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="790" cy="120" rx="210" ry="170" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="660" cy="390" rx="190" ry="150" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="195" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">HVAC install</tspan>
    <tspan x="80" dy="48" fill="#01AD9F">cost calculator</tspan>
  </text>
  <text x="80" y="295" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Tonnage + efficiency → installed price</text>
  <rect x="80" y="319" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Price badge -->
  <rect x="700" y="150" width="212" height="96" rx="16" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.6"/>
  <text x="724" y="194" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="23" font-weight="800">$4,600–$6,800</text>
  <text x="724" y="218" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">3-ton install · existing ducts</text>

  <!-- Cost range bar -->
  <rect x="700" y="272" width="212" height="10" rx="5" fill="#E2E8F0"/>
  <rect x="734" y="272" width="124" height="10" rx="5" fill="url(#accentBar)"/>
  <circle cx="734" cy="277" r="8" fill="#01AD9F" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="858" cy="277" r="8" fill="#2563EB" stroke="#FFFFFF" stroke-width="2"/>
  <text x="700" y="302" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500">low</text>
  <text x="912" y="302" text-anchor="end" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500">high</text>

  <!-- Condenser unit -->
  <rect x="540" y="296" width="150" height="128" rx="12" fill="url(#unitGrad)" stroke="#01AD9F" stroke-width="2.5" stroke-opacity="0.55"/>
  <circle cx="615" cy="358" r="42" fill="#FFFFFF" fill-opacity="0.5" stroke="#0F766E" stroke-width="2" stroke-opacity="0.5" filter="url(#glow)"/>
  <line x1="615" y1="358" x2="615" y2="320" stroke="#0F766E" stroke-width="2" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="615" y1="358" x2="648" y2="377" stroke="#0F766E" stroke-width="2" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="615" y1="358" x2="582" y2="377" stroke="#0F766E" stroke-width="2" stroke-opacity="0.45" stroke-linecap="round"/>
  <circle cx="615" cy="358" r="6" fill="#01AD9F" fill-opacity="0.7"/>
  <text x="615" y="412" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">condenser</text>

  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
