<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Ductwork replacement cost - 2026 price guide</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, branching duct runs, and a price tag representing what new or replacement ductwork costs in 2026.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="ductGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Soft ambient blobs -->
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="280" rx="120" ry="120" fill="url(#indigoGrad)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>

  <g opacity="0.16">
    <circle cx="80" cy="140" r="2" fill="#94A3B8"/>
    <circle cx="120" cy="180" r="2" fill="#94A3B8"/>
    <circle cx="160" cy="120" r="2" fill="#94A3B8"/>
    <circle cx="200" cy="220" r="2" fill="#94A3B8"/>
    <circle cx="100" cy="280" r="2" fill="#94A3B8"/>
    <circle cx="180" cy="320" r="2" fill="#94A3B8"/>
    <circle cx="240" cy="160" r="2" fill="#94A3B8"/>
    <circle cx="60" cy="360" r="2" fill="#94A3B8"/>
  </g>

  <text x="80" y="196" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Ductwork</tspan>
    <tspan x="80" dy="50" fill="#01AD9F">replacement cost</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">2026 price guide</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Abstract branching duct runs -->
  <g stroke="#01AD9F" stroke-opacity="0.5" stroke-linecap="round" fill="none">
    <!-- main trunk -->
    <rect x="540" y="232" width="170" height="36" rx="8" fill="url(#ductGrad)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.55"/>
    <!-- branches -->
    <path d="M620 232 C 640 180, 700 168, 760 150" stroke-width="10" opacity="0.7"/>
    <path d="M680 232 C 720 200, 780 196, 850 190" stroke-width="10" opacity="0.7"/>
    <path d="M660 268 C 700 312, 770 320, 840 332" stroke-width="10" opacity="0.6"/>
    <path d="M600 268 C 620 312, 680 330, 740 344" stroke-width="10" opacity="0.6"/>
  </g>

  <!-- branch register caps -->
  <rect x="744" y="138" width="34" height="24" rx="5" fill="#FFFFFF" fill-opacity="0.85" stroke="#5EEAD4" stroke-width="1.5"/>
  <rect x="838" y="178" width="34" height="24" rx="5" fill="#FFFFFF" fill-opacity="0.85" stroke="#5EEAD4" stroke-width="1.5"/>
  <rect x="828" y="322" width="34" height="24" rx="5" fill="#FFFFFF" fill-opacity="0.85" stroke="#5EEAD4" stroke-width="1.5"/>
  <rect x="726" y="334" width="34" height="24" rx="5" fill="#FFFFFF" fill-opacity="0.85" stroke="#5EEAD4" stroke-width="1.5"/>

  <!-- Floating rounded shapes -->
  <rect x="700" y="92" width="64" height="64" rx="16" fill="#FFFFFF" fill-opacity="0.7" stroke="#BAE6FD" stroke-width="1.5" transform="rotate(-12 732 124)"/>
  <circle cx="900" cy="120" r="26" fill="#FFFFFF" fill-opacity="0.65" stroke="#99F6E4" stroke-width="1.5"/>
  <circle cx="760" cy="410" r="18" fill="#FFFFFF" fill-opacity="0.6" stroke="#5EEAD4" stroke-width="1.5"/>

  <!-- Price tag -->
  <g filter="url(#glow)">
    <path d="M512 366 L600 366 L640 406 L600 446 L512 446 Z" fill="url(#tagGrad)" transform="translate(0 0)"/>
    <path d="M512 366 L512 446 L478 446 L460 426 L460 386 L478 366 Z" fill="url(#tagGrad)" opacity="0.9"/>
    <circle cx="492" cy="406" r="9" fill="#FFFFFF" fill-opacity="0.95"/>
  </g>
  <g font-family="system-ui, -apple-system, sans-serif">
    <text x="566" y="402" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="800">$3k&#8211;$4k</text>
    <text x="566" y="424" text-anchor="middle" fill="#E6FFFB" font-size="11" font-weight="600">typical whole house</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
