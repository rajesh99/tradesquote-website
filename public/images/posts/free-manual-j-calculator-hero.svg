<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Free Manual J Calculator</title>
  <desc id="heroDesc">Abstract hero graphic showing a Manual J load calculation workflow — envelope inputs feeding into a calculation that outputs BTU/hr heating and cooling loads, with a free vs paid accuracy comparison badge.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="800" cy="110" rx="210" ry="170" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="700" cy="390" rx="190" ry="150" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <!-- Frosted card left -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="200" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Free Manual J</tspan>
    <tspan x="80" dy="46" fill="#01AD9F">Calculator</tspan>
  </text>
  <text x="80" y="305" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">ACCA load calc — free online tools</text>
  <rect x="80" y="326" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Illustration: inputs → calc box → outputs -->

  <!-- Input cards column -->
  <rect x="528" y="110" width="130" height="32" rx="7" fill="url(#boxGrad)" stroke="#01AD9F" stroke-width="1.6" stroke-opacity="0.5"/>
  <text x="593" y="131" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">Zip / Climate Zone</text>

  <rect x="528" y="155" width="130" height="32" rx="7" fill="url(#boxGrad)" stroke="#01AD9F" stroke-width="1.6" stroke-opacity="0.5"/>
  <text x="593" y="176" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">Floor Area + Height</text>

  <rect x="528" y="200" width="130" height="32" rx="7" fill="url(#boxGrad)" stroke="#01AD9F" stroke-width="1.6" stroke-opacity="0.5"/>
  <text x="593" y="221" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">Insulation R-values</text>

  <rect x="528" y="245" width="130" height="32" rx="7" fill="url(#boxGrad)" stroke="#01AD9F" stroke-width="1.6" stroke-opacity="0.5"/>
  <text x="593" y="266" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">Windows + Glazing</text>

  <rect x="528" y="290" width="130" height="32" rx="7" fill="url(#boxGrad)" stroke="#01AD9F" stroke-width="1.6" stroke-opacity="0.5"/>
  <text x="593" y="311" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">Duct Location</text>

  <!-- Arrows from inputs to calc box -->
  <path d="M659 126 H686" stroke="#01AD9F" stroke-width="1.8" stroke-opacity="0.6" fill="none"/>
  <path d="M659 171 H686" stroke="#01AD9F" stroke-width="1.8" stroke-opacity="0.6" fill="none"/>
  <path d="M659 216 H700" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.7" fill="none" filter="url(#glow)"/>
  <path d="M659 261 H686" stroke="#01AD9F" stroke-width="1.8" stroke-opacity="0.6" fill="none"/>
  <path d="M659 306 H686" stroke="#01AD9F" stroke-width="1.8" stroke-opacity="0.6" fill="none"/>

  <!-- Central calc box -->
  <rect x="700" y="170" width="100" height="92" rx="12" fill="#FFFFFF" fill-opacity="0.75" stroke="#01AD9F" stroke-width="2.2"/>
  <text x="750" y="208" text-anchor="middle" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="800">Manual J</text>
  <text x="750" y="226" text-anchor="middle" fill="#01AD9F" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">Calc</text>
  <text x="750" y="252" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="9">ACCA 8th Ed.</text>

  <!-- Arrow from calc box to outputs -->
  <path d="M800 216 H828" stroke="#2563EB" stroke-width="2.2" stroke-opacity="0.75" fill="none" filter="url(#glow)"/>
  <path d="M828 210 l 8 6 l -8 6" fill="none" stroke="#2563EB" stroke-width="2" stroke-opacity="0.75"/>

  <!-- Output badges -->
  <rect x="836" y="148" width="130" height="40" rx="10" fill="url(#outputGrad)" stroke="#2563EB" stroke-width="1.8" stroke-opacity="0.55"/>
  <text x="901" y="164" text-anchor="middle" fill="#1D4ED8" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" font-weight="600">HEATING LOAD</text>
  <text x="901" y="181" text-anchor="middle" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800">BTU/hr</text>

  <rect x="836" y="200" width="130" height="40" rx="10" fill="url(#outputGrad)" stroke="#2563EB" stroke-width="1.8" stroke-opacity="0.55"/>
  <text x="901" y="216" text-anchor="middle" fill="#1D4ED8" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" font-weight="600">COOLING LOAD</text>
  <text x="901" y="233" text-anchor="middle" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800">BTU/hr</text>

  <rect x="836" y="252" width="130" height="40" rx="10" fill="url(#outputGrad)" stroke="#2563EB" stroke-width="1.8" stroke-opacity="0.55"/>
  <text x="901" y="268" text-anchor="middle" fill="#1D4ED8" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" font-weight="600">AIRFLOW</text>
  <text x="901" y="285" text-anchor="middle" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800">CFM</text>

  <!-- Free badge -->
  <rect x="700" y="340" width="270" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.88" stroke="#5EEAD4" stroke-width="1.8"/>
  <text x="835" y="362" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="0.3">FREE · No subscription required</text>

  <!-- Bottom teal strip -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
