<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Air Conditioning BTU Calculator Guide</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients showing BTU cooling capacity sizing — a frosted card with the post title on the left, and abstract AC unit with BTU and tonnage badges on the right.</desc>

  <defs>
    <linearGradient id="btuBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="btuSkyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="btuTealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="btuUnitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="btuCoolFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="btuAccentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="btuSoftBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="btuGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#btuBgGrad)"/>
  <ellipse cx="790" cy="110" rx="210" ry="165" fill="url(#btuSkyGrad)" filter="url(#btuSoftBlur)"/>
  <ellipse cx="670" cy="390" rx="175" ry="145" fill="url(#btuTealGrad)" filter="url(#btuSoftBlur)"/>

  <!-- Frosted card -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="195" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">AC BTU</tspan>
    <tspan x="80" dy="46" fill="#01AD9F">Calculator</tspan>
  </text>
  <text x="80" y="298" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Size your air conditioner right</text>
  <rect x="80" y="320" width="56" height="4" rx="2" fill="url(#btuAccentBar)"/>

  <!-- AC unit (window/wall unit silhouette) -->
  <rect x="555" y="155" width="290" height="190" rx="16" fill="url(#btuUnitGrad)" stroke="#01AD9F" stroke-width="2.2" stroke-opacity="0.50"/>
  <!-- Front vents -->
  <line x1="590" y1="200" x2="810" y2="200" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="590" y1="222" x2="810" y2="222" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="590" y1="244" x2="810" y2="244" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="590" y1="266" x2="810" y2="266" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="590" y1="288" x2="810" y2="288" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.35"/>
  <!-- Control panel area -->
  <rect x="740" y="175" width="88" height="130" rx="8" fill="#FFFFFF" fill-opacity="0.28" stroke="#2563EB" stroke-width="1.3" stroke-opacity="0.4"/>
  <!-- Panel buttons -->
  <circle cx="784" cy="205" r="7" fill="#01AD9F" fill-opacity="0.55"/>
  <circle cx="784" cy="230" r="7" fill="#2563EB" fill-opacity="0.45"/>
  <circle cx="784" cy="255" r="7" fill="#0EA5E9" fill-opacity="0.40"/>

  <!-- Cold airflow streams emerging left of unit -->
  <path d="M555 210 C 500 210, 480 218, 460 218" stroke="url(#btuCoolFlow)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.75" filter="url(#btuGlow)"/>
  <path d="M555 250 C 500 250, 480 258, 460 258" stroke="url(#btuCoolFlow)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.60" filter="url(#btuGlow)"/>
  <path d="M555 290 C 500 290, 480 298, 460 298" stroke="url(#btuCoolFlow)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.45" filter="url(#btuGlow)"/>
  <!-- Arrowheads -->
  <path d="M463 218 l -14 -5 l 5 12" fill="#38BDF8" opacity="0.80"/>
  <path d="M463 258 l -14 -5 l 5 12" fill="#38BDF8" opacity="0.65"/>
  <path d="M463 298 l -14 -5 l 5 12" fill="#38BDF8" opacity="0.50"/>

  <!-- BTU badge -->
  <rect x="570" y="118" width="148" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="644" y="138" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="0.4">20 BTU / sq ft</text>

  <!-- Tonnage badge -->
  <rect x="730" y="118" width="118" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#2563EB" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="789" y="138" text-anchor="middle" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" letter-spacing="0.4">1 ton = 12,000 BTU</text>

  <!-- Teal bottom strip -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
