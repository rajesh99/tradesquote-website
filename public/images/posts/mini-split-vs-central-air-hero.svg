<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Mini-split vs central air conditioning comparison</title>
  <desc id="heroDesc">Hero illustration comparing ductless mini-split and central air HVAC systems, showing outdoor condensers, indoor units, ductwork, and wall-mounted heads on a soft gradient background.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="42%" stop-color="#F0FDFA"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="tealBlob" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="blueBlob" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="warmBlob" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#FDBA74" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#F8FAFC" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="miniAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="centralAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <ellipse cx="760" cy="95" rx="170" ry="125" fill="url(#tealBlob)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="350" rx="150" ry="115" fill="url(#blueBlob)" filter="url(#softBlur)"/>
  <ellipse cx="640" cy="410" rx="110" ry="85" fill="url(#warmBlob)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="56" width="400" height="388" rx="24" fill="#FFFFFF" fill-opacity="0.35" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.7"/>

  <text x="80" y="188" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Mini-Split vs</tspan>
    <tspan x="80" dy="46" fill="#01AD9F">Central Air</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Pros, cons, costs, and which wins</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#accentGrad)"/>

  <!-- VS badge -->
  <circle cx="500" cy="250" r="28" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#cardShadow)"/>
  <text x="500" y="257" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">VS</text>

  <!-- ========== MINI-SPLIT PANEL ========== -->
  <g filter="url(#cardShadow)">
    <rect x="528" y="88" width="210" height="324" rx="20" fill="url(#cardGrad)" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.45"/>
    <rect x="528" y="88" width="210" height="44" rx="20" fill="#F0FDFA"/>
    <rect x="528" y="116" width="210" height="16" fill="#F0FDFA"/>
    <text x="552" y="118" fill="#01AD9F" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" letter-spacing="0.06em">MINI-SPLIT</text>
    <text x="552" y="136" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Ductless · zoned</text>

    <!-- Outdoor condenser -->
    <rect x="556" y="318" width="72" height="56" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <rect x="564" y="326" width="56" height="32" rx="3" fill="#E2E8F0"/>
    <g stroke="#94A3B8" stroke-width="1.2">
      <line x1="572" y1="334" x2="612" y2="334"/>
      <line x1="572" y1="342" x2="612" y2="342"/>
      <line x1="572" y1="350" x2="612" y2="350"/>
    </g>
    <circle cx="592" cy="366" r="10" fill="#FFFFFF" stroke="#01AD9F" stroke-width="1.5"/>
    <circle cx="592" cy="366" r="4" fill="#01AD9F" fill-opacity="0.5"/>
    <text x="592" y="392" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">Outdoor unit</text>

    <!-- Line set -->
    <path d="M628 346 C648 346 658 280 668 220" stroke="#B45309" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M628 352 C648 352 658 286 668 226" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" fill="none" stroke-opacity="0.7"/>

    <!-- Interior wall cross-section -->
    <rect x="668" y="148" width="54" height="220" rx="2" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect x="668" y="148" width="8" height="220" fill="#E2E8F0"/>

    <!-- Wall-mounted head -->
    <rect x="676" y="196" width="38" height="14" rx="3" fill="#FFFFFF" stroke="#01AD9F" stroke-width="1.5"/>
    <rect x="680" y="200" width="30" height="6" rx="1" fill="#CCFBF1"/>
    <path d="M676 210 L694 210 L694 218 L676 218 Z" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
    <text x="695" y="208" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">Indoor head</text>

    <!-- Remote -->
    <rect x="676" y="248" width="22" height="34" rx="4" fill="#152035" fill-opacity="0.85"/>
    <rect x="680" y="254" width="14" height="8" rx="2" fill="#01AD9F" fill-opacity="0.6"/>
    <circle cx="687" cy="272" r="3" fill="#64748B"/>
    <text x="702" y="268" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="8">Remote</text>

    <!-- No ducts badge -->
    <rect x="556" y="156" width="88" height="22" rx="11" fill="#F0FDFA" stroke="#01AD9F" stroke-width="1" stroke-opacity="0.35"/>
    <text x="600" y="171" text-anchor="middle" fill="#01AD9F" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">No ductwork</text>
  </g>

  <!-- ========== CENTRAL AIR PANEL ========== -->
  <g filter="url(#cardShadow)">
    <rect x="758" y="88" width="210" height="324" rx="20" fill="url(#cardGrad)" stroke="#2563EB" stroke-width="1.5" stroke-opacity="0.4"/>
    <rect x="758" y="88" width="210" height="44" rx="20" fill="#EFF6FF"/>
    <rect x="758" y="116" width="210" height="16" fill="#EFF6FF"/>
    <text x="782" y="118" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" letter-spacing="0.06em">CENTRAL AIR</text>
    <text x="782" y="136" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Ducted · whole house</text>

    <!-- Outdoor condenser -->
    <rect x="786" y="318" width="80" height="56" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <circle cx="826" cy="346" r="18" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
    <circle cx="826" cy="346" r="8" fill="#2563EB" fill-opacity="0.25"/>
    <g stroke="#94A3B8" stroke-width="1">
      <line x1="794" y1="328" x2="858" y2="328"/>
      <line x1="794" y1="336" x2="858" y2="336"/>
    </g>
    <text x="826" y="392" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">Condenser</text>

    <!-- Refrigerant lines to air handler -->
    <path d="M866 346 L900 346 L900 268" stroke="#B45309" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M866 352 L900 352 L900 274" stroke="#2563EB" stroke-width="2" stroke-linecap="round" fill="none" stroke-opacity="0.65"/>

    <!-- Air handler / furnace -->
    <rect x="876" y="228" width="68" height="88" rx="4" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <rect x="884" y="238" width="52" height="36" rx="2" fill="#E2E8F0"/>
    <rect x="884" y="282" width="52" height="24" rx="2" fill="#EFF6FF" stroke="#2563EB" stroke-width="1" stroke-opacity="0.35"/>
    <text x="910" y="298" text-anchor="middle" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">Air handler</text>
    <text x="910" y="332" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="8">Furnace</text>

    <!-- Ductwork -->
    <rect x="786" y="156" width="120" height="14" rx="3" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="1"/>
    <rect x="806" y="170" width="14" height="48" rx="2" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="1"/>
    <rect x="848" y="170" width="14" height="48" rx="2" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="1"/>
    <rect x="798" y="148" width="28" height="10" rx="2" fill="#FFFFFF" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
    <rect x="862" y="148" width="28" height="10" rx="2" fill="#FFFFFF" stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
    <text x="846" y="142" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">Supply ducts</text>

    <!-- Thermostat -->
    <rect x="786" y="248" width="34" height="42" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <rect x="792" y="256" width="22" height="14" rx="3" fill="#EFF6FF"/>
    <text x="803" y="267" text-anchor="middle" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700">72°</text>
    <text x="803" y="298" text-anchor="middle" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="7">Thermostat</text>

    <!-- Ductwork badge -->
    <rect x="876" y="156" width="72" height="22" rx="11" fill="#EFF6FF" stroke="#2563EB" stroke-width="1" stroke-opacity="0.35"/>
    <text x="912" y="171" text-anchor="middle" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">Ducted</text>
  </g>

  <!-- Decorative dots -->
  <circle cx="560" cy="430" r="4" fill="#01AD9F" fill-opacity="0.3"/>
  <circle cx="920" cy="78" r="5" fill="#2563EB" fill-opacity="0.28"/>
  <circle cx="480" cy="120" r="3" fill="#94A3B8" fill-opacity="0.35"/>

  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
