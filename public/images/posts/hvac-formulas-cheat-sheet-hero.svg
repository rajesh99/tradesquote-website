<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">HVAC formulas cheat sheet</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients and floating cards showing core HVAC equations like sensible heat, CFM, and tonnage.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="cardTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Soft ambient blobs -->
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="280" rx="120" ry="120" fill="url(#indigoGrad)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>

  <g opacity="0.16">
    <circle cx="80" cy="140" r="2" fill="#94A3B8"/>
    <circle cx="120" cy="180" r="2" fill="#94A3B8"/>
    <circle cx="160" cy="120" r="2" fill="#94A3B8"/>
    <circle cx="200" cy="220" r="2" fill="#94A3B8"/>
    <circle cx="100" cy="280" r="2" fill="#94A3B8"/>
    <circle cx="180" cy="320" r="2" fill="#94A3B8"/>
    <circle cx="240" cy="160" r="2" fill="#94A3B8"/>
    <circle cx="60" cy="360" r="2" fill="#94A3B8"/>
  </g>

  <text x="80" y="200" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">HVAC formulas</tspan>
    <tspan x="80" dy="50" fill="#01AD9F">cheat sheet</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">The math, in one place</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Floating formula cards -->
  <g font-family="system-ui, -apple-system, sans-serif" filter="url(#cardShadow)">
    <g transform="rotate(-6 660 150)">
      <rect x="560" y="112" width="200" height="76" rx="14" fill="#FFFFFF" fill-opacity="0.94" stroke="#5EEAD4" stroke-width="1.5"/>
      <text x="578" y="138" fill="#0F766E" font-size="11" font-weight="700" letter-spacing="1">SENSIBLE HEAT</text>
      <text x="578" y="166" fill="#152035" font-size="17" font-weight="800">Qs = 1.08&#215;CFM&#215;&#916;T</text>
    </g>

    <g transform="rotate(5 850 250)">
      <rect x="752" y="214" width="196" height="72" rx="14" fill="#FFFFFF" fill-opacity="0.94" stroke="#BAE6FD" stroke-width="1.5"/>
      <text x="770" y="240" fill="#1D4ED8" font-size="11" font-weight="700" letter-spacing="1">AIRFLOW</text>
      <text x="770" y="266" fill="#152035" font-size="16" font-weight="800">CFM = BTU/hr &#247; (1.08&#215;&#916;T)</text>
    </g>

    <g transform="rotate(-3 660 360)">
      <rect x="552" y="324" width="216" height="72" rx="14" fill="#FFFFFF" fill-opacity="0.94" stroke="#C7D2FE" stroke-width="1.5"/>
      <text x="570" y="350" fill="#4F46E5" font-size="11" font-weight="700" letter-spacing="1">TONNAGE</text>
      <text x="570" y="376" fill="#152035" font-size="16" font-weight="800">1 ton = 12,000 BTU/hr</text>
    </g>
  </g>

  <!-- Floating glyph accents -->
  <circle cx="900" cy="130" r="26" fill="url(#cardTeal)" stroke="#99F6E4" stroke-width="1.5"/>
  <text x="900" y="139" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800">&#215;</text>
  <circle cx="540" cy="250" r="20" fill="#FFFFFF" fill-opacity="0.6" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="540" y="259" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800">&#247;</text>
  <circle cx="930" cy="400" r="18" fill="#FFFFFF" fill-opacity="0.6" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="930" y="408" text-anchor="middle" fill="#4F46E5" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800">&#916;</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
