<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">SEER Rating Savings Calculator</title>
  <desc id="heroDesc">Abstract hero graphic showing SEER efficiency ratings with dollar savings badges and an energy meter, representing how higher SEER ratings reduce annual cooling costs.</desc>

  <defs>
    <linearGradient id="seer-bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="seer-skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="seer-tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="seer-barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="seer-acBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="seer-meterGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="seer-softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="seer-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#seer-bgGrad)"/>
  <ellipse cx="800" cy="110" rx="210" ry="170" fill="url(#seer-skyGrad)" filter="url(#seer-softBlur)"/>
  <ellipse cx="660" cy="390" rx="190" ry="150" fill="url(#seer-tealGrad)" filter="url(#seer-softBlur)"/>

  <!-- Frosted card -->
  <rect x="48" y="72" width="410" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="82" y="192" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em">
    <tspan x="82" dy="0">SEER rating</tspan>
    <tspan x="82" dy="46" fill="#01AD9F">savings calculator</tspan>
  </text>
  <text x="82" y="295" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">Is the higher-SEER unit worth the premium?</text>
  <rect x="82" y="317" width="56" height="4" rx="2" fill="url(#seer-barGrad)"/>

  <!-- Abstract illustration: energy meter + SEER bars + $ badge -->

  <!-- Meter base unit -->
  <rect x="560" y="185" width="130" height="175" rx="14" fill="url(#seer-meterGrad)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.50"/>
  <text x="625" y="215" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" letter-spacing="0.5">kWh METER</text>
  <!-- Meter dial arc -->
  <path d="M576 310 A 50 50 0 0 1 674 310" stroke="#D5D5D5" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Colored arc portion (efficiency reading) -->
  <path d="M576 310 A 50 50 0 0 1 640 265" stroke="url(#seer-barGrad)" stroke-width="6" stroke-linecap="round" fill="none" filter="url(#seer-glow)"/>
  <!-- Needle -->
  <line x1="625" y1="310" x2="638" y2="268" stroke="#01AD9F" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <circle cx="625" cy="310" r="5" fill="#01AD9F" opacity="0.85"/>
  <!-- Tick marks -->
  <line x1="576" y1="310" x2="583" y2="308" stroke="#64748B" stroke-width="1.2" opacity="0.5"/>
  <line x1="625" y1="260" x2="625" y2="267" stroke="#64748B" stroke-width="1.2" opacity="0.5"/>
  <line x1="674" y1="310" x2="667" y2="308" stroke="#64748B" stroke-width="1.2" opacity="0.5"/>

  <!-- SEER bars (rising heights, left to right) -->
  <!-- Bar: SEER 13.4 -->
  <rect x="720" y="298" width="22" height="62" rx="4" fill="#0EA5E9" fill-opacity="0.55"/>
  <text x="731" y="372" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">13.4</text>

  <!-- Bar: SEER 15 -->
  <rect x="752" y="279" width="22" height="81" rx="4" fill="#01AD9F" fill-opacity="0.60"/>
  <text x="763" y="372" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">15</text>

  <!-- Bar: SEER 18 -->
  <rect x="784" y="248" width="22" height="112" rx="4" fill="#01AD9F" fill-opacity="0.80"/>
  <text x="795" y="372" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600">18</text>

  <!-- Bar: SEER 20 -->
  <rect x="816" y="225" width="22" height="135" rx="4" fill="url(#seer-barGrad)" fill-opacity="0.90" filter="url(#seer-glow)"/>
  <text x="827" y="372" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700">20</text>

  <!-- Baseline -->
  <line x1="710" y1="360" x2="850" y2="360" stroke="#D5D5D5" stroke-width="1.5"/>

  <!-- Savings badge -->
  <rect x="700" y="158" width="152" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="776" y="182" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" letter-spacing="0.3">Save ~$300/yr</text>

  <!-- Down-arrow from badge toward bars -->
  <line x1="776" y1="196" x2="776" y2="218" stroke="#01AD9F" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.6"/>
  <path d="M771 216 l5 6 l5-6" fill="none" stroke="#01AD9F" stroke-width="1.5" opacity="0.6"/>

  <!-- Bottom teal strip -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
