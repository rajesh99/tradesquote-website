<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">BTU per square foot for air conditioning</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, a floor-area grid marked with BTU figures, and a sizing gauge representing cooling load sized by square footage.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Soft ambient blobs -->
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="280" rx="120" ry="120" fill="url(#indigoGrad)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>

  <g opacity="0.16">
    <circle cx="80" cy="140" r="2" fill="#94A3B8"/>
    <circle cx="120" cy="180" r="2" fill="#94A3B8"/>
    <circle cx="160" cy="120" r="2" fill="#94A3B8"/>
    <circle cx="200" cy="220" r="2" fill="#94A3B8"/>
    <circle cx="100" cy="280" r="2" fill="#94A3B8"/>
    <circle cx="180" cy="320" r="2" fill="#94A3B8"/>
    <circle cx="240" cy="160" r="2" fill="#94A3B8"/>
    <circle cx="60" cy="360" r="2" fill="#94A3B8"/>
  </g>

  <text x="80" y="196" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">BTU per</tspan>
    <tspan x="80" dy="50" fill="#01AD9F">square foot</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Cooling load, sized right</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Floor-area grid -->
  <g transform="translate(560 150)">
    <rect x="0" y="0" width="280" height="200" rx="10" fill="url(#gridGrad)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.5"/>
    <!-- grid lines -->
    <g stroke="#01AD9F" stroke-width="1" stroke-opacity="0.28">
      <line x1="70" y1="0" x2="70" y2="200"/>
      <line x1="140" y1="0" x2="140" y2="200"/>
      <line x1="210" y1="0" x2="210" y2="200"/>
      <line x1="0" y1="50" x2="280" y2="50"/>
      <line x1="0" y1="100" x2="280" y2="100"/>
      <line x1="0" y1="150" x2="280" y2="150"/>
    </g>
    <!-- BTU figures sprinkled in cells -->
    <g font-family="system-ui, -apple-system, sans-serif" fill="#0F766E" font-size="12" font-weight="700" text-anchor="middle">
      <text x="35" y="30">20</text>
      <text x="105" y="30">20</text>
      <text x="175" y="80">20</text>
      <text x="245" y="130">20</text>
      <text x="35" y="180">20</text>
      <text x="105" y="130">20</text>
    </g>
  </g>

  <!-- sq ft label -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="566" y="356" width="120" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="626" y="376" text-anchor="middle" fill="#0F766E" font-size="13" font-weight="700" letter-spacing="0.5">SQ FT &#215; 20</text>
  </g>

  <!-- Sizing gauge -->
  <g transform="translate(700 96)">
    <path d="M0 60 A 60 60 0 0 1 120 60" fill="none" stroke="#E2E8F0" stroke-width="12" stroke-linecap="round"/>
    <path d="M0 60 A 60 60 0 0 1 96 18" fill="none" stroke="url(#gaugeGrad)" stroke-width="12" stroke-linecap="round"/>
    <line x1="60" y1="60" x2="92" y2="26" stroke="#152035" stroke-width="3" stroke-linecap="round"/>
    <circle cx="60" cy="60" r="6" fill="#152035"/>
    <text x="60" y="92" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">TONS</text>
  </g>

  <!-- Floating rounded shapes -->
  <rect x="700" y="372" width="52" height="52" rx="14" fill="#FFFFFF" fill-opacity="0.6" stroke="#C7D2FE" stroke-width="1.5" transform="rotate(18 726 398)"/>
  <circle cx="880" cy="380" r="18" fill="#FFFFFF" fill-opacity="0.6" stroke="#5EEAD4" stroke-width="1.5"/>
  <circle cx="900" cy="120" r="22" fill="#FFFFFF" fill-opacity="0.65" stroke="#99F6E4" stroke-width="1.5"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
