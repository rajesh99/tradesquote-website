<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Fan laws - how blower speed drives airflow, pressure and power</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, a stylized blower wheel, and three rising curves representing linear, square, and cube growth from the fan affinity laws.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="curveBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="curveOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="curveRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F87171"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Soft ambient blobs -->
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="300" rx="120" ry="120" fill="url(#indigoGrad)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>

  <g opacity="0.16">
    <circle cx="80" cy="140" r="2" fill="#94A3B8"/>
    <circle cx="120" cy="180" r="2" fill="#94A3B8"/>
    <circle cx="160" cy="120" r="2" fill="#94A3B8"/>
    <circle cx="200" cy="220" r="2" fill="#94A3B8"/>
    <circle cx="100" cy="280" r="2" fill="#94A3B8"/>
    <circle cx="180" cy="320" r="2" fill="#94A3B8"/>
    <circle cx="240" cy="160" r="2" fill="#94A3B8"/>
    <circle cx="60" cy="360" r="2" fill="#94A3B8"/>
  </g>

  <text x="80" y="200" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Fan Laws</tspan>
    <tspan x="80" dy="50" fill="#01AD9F">Speed, air &amp; power</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">How blower RPM drives everything</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Stylized blower wheel -->
  <g filter="url(#glow)">
    <circle cx="640" cy="270" r="92" fill="#FFFFFF" fill-opacity="0.55" stroke="#5EEAD4" stroke-width="2"/>
    <circle cx="640" cy="270" r="92" fill="none" stroke="url(#wheelGrad)" stroke-width="3" stroke-opacity="0.5"/>
    <!-- curved blade arcs -->
    <g stroke="url(#wheelGrad)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.85">
      <path d="M 640 200 A 70 70 0 0 1 696 232"/>
      <path d="M 705 233 A 70 70 0 0 1 706 305"/>
      <path d="M 703 312 A 70 70 0 0 1 645 340"/>
      <path d="M 638 340 A 70 70 0 0 1 580 304"/>
      <path d="M 575 300 A 70 70 0 0 1 575 232"/>
      <path d="M 577 226 A 70 70 0 0 1 634 200"/>
    </g>
    <circle cx="640" cy="270" r="22" fill="#FFFFFF" stroke="#01AD9F" stroke-width="2"/>
    <circle cx="640" cy="270" r="8" fill="#01AD9F"/>
  </g>

  <!-- Three rising curves: linear, square, cube -->
  <g fill="none" stroke-linecap="round" filter="url(#glow)">
    <path d="M 470 392 L 560 360" stroke="url(#curveBlue)" stroke-width="8" opacity="0.9"/>
    <path d="M 470 392 Q 530 380 590 332" stroke="url(#curveOrange)" stroke-width="8" opacity="0.9"/>
    <path d="M 470 392 Q 560 388 620 290" stroke="url(#curveRed)" stroke-width="8" opacity="0.9"/>
  </g>
  <circle cx="560" cy="360" r="5" fill="#2563EB"/>
  <circle cx="590" cy="332" r="5" fill="#EA580C"/>
  <circle cx="620" cy="290" r="5" fill="#DC2626"/>

  <!-- Floating abstract shapes -->
  <rect x="560" y="96" width="68" height="68" rx="18" fill="#FFFFFF" fill-opacity="0.7" stroke="#BAE6FD" stroke-width="1.5" transform="rotate(-12 594 130)"/>
  <circle cx="838" cy="170" r="26" fill="#FFFFFF" fill-opacity="0.65" stroke="#99F6E4" stroke-width="1.5"/>
  <rect x="820" y="360" width="52" height="52" rx="14" fill="#FFFFFF" fill-opacity="0.6" stroke="#C7D2FE" stroke-width="1.5" transform="rotate(18 846 386)"/>

  <!-- Small law badges -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="724" y="120" width="118" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#7DD3FC" stroke-width="1.5"/>
    <text x="783" y="140" text-anchor="middle" fill="#1D4ED8" font-size="12" font-weight="700">CFM &#8733; RPM</text>

    <rect x="744" y="160" width="128" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#FDBA74" stroke-width="1.5"/>
    <text x="808" y="180" text-anchor="middle" fill="#C2410C" font-size="12" font-weight="700">SP &#8733; RPM&#178;</text>

    <rect x="764" y="200" width="138" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#FCA5A5" stroke-width="1.5"/>
    <text x="833" y="220" text-anchor="middle" fill="#B91C1C" font-size="12" font-weight="700">BHP &#8733; RPM&#179;</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
