<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Heat Pump vs Gas Furnace – running cost comparison</title>
  <desc id="heroDesc">Side-by-side comparison of a heat pump outdoor unit and a gas furnace with cost and efficiency indicators.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="blueZone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="warmZone" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="730" cy="110" rx="200" ry="160" fill="url(#blueZone)" filter="url(#softBlur)"/>
  <ellipse cx="910" cy="370" rx="170" ry="130" fill="url(#warmZone)" filter="url(#softBlur)"/>

  <!-- Left headline card -->
  <rect x="48" y="68" width="380" height="364" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="178" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Heat Pump</tspan>
    <tspan x="80" dy="46">vs Gas</tspan>
    <tspan x="80" dy="46" fill="#01AD9F">Furnace</tspan>
  </text>
  <text x="80" y="316" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">Which is cheaper to run?</text>
  <text x="80" y="340" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="13">Break-even by climate and energy rate</text>
  <rect x="80" y="360" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- HEAT PUMP card -->
  <g filter="url(#cardShadow)">
    <rect x="462" y="86" width="194" height="282" rx="14" fill="#FFFFFF" stroke="#7DD3FC" stroke-width="2"/>
    <rect x="462" y="86" width="194" height="46" rx="14" fill="#EFF6FF"/>
    <rect x="462" y="118" width="194" height="14" fill="#EFF6FF"/>
    <text x="559" y="116" text-anchor="middle" fill="#0369A1" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">HEAT PUMP</text>
    <!-- Outdoor coil -->
    <rect x="480" y="142" width="158" height="78" rx="6" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1.5"/>
    <text x="559" y="158" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="8" font-weight="600" letter-spacing="0.8">OUTDOOR COIL</text>
    <line x1="492" y1="168" x2="626" y2="168" stroke="#7DD3FC" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="492" y1="176" x2="626" y2="176" stroke="#38BDF8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="492" y1="184" x2="626" y2="184" stroke="#7DD3FC" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="492" y1="192" x2="626" y2="192" stroke="#38BDF8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="492" y1="200" x2="626" y2="200" stroke="#7DD3FC" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Fan -->
    <circle cx="559" cy="278" r="34" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
    <circle cx="559" cy="278" r="24" fill="#EFF6FF" stroke="#BAE6FD" stroke-width="1"/>
    <line x1="559" y1="254" x2="559" y2="302" stroke="#0EA5E9" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="535" y1="278" x2="583" y2="278" stroke="#0EA5E9" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="542" y1="261" x2="576" y2="295" stroke="#0EA5E9" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="576" y1="261" x2="542" y2="295" stroke="#0EA5E9" stroke-width="1.8" stroke-linecap="round"/>
    <text x="559" y="322" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="8" letter-spacing="0.5">OUTDOOR FAN</text>
    <!-- COP badge -->
    <rect x="478" y="340" width="162" height="22" rx="11" fill="#DBEAFE"/>
    <text x="559" y="355" text-anchor="middle" fill="#1D4ED8" font-family="system-ui, sans-serif" font-size="11" font-weight="700">COP 2.5 – 4.0</text>
  </g>

  <!-- VS circle -->
  <circle cx="700" cy="228" r="28" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#cardShadow)"/>
  <text x="700" y="234" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="14" font-weight="700">VS</text>

  <!-- GAS FURNACE card -->
  <g filter="url(#cardShadow)">
    <rect x="738" y="86" width="194" height="282" rx="14" fill="#FFFFFF" stroke="#FED7AA" stroke-width="2"/>
    <rect x="738" y="86" width="194" height="46" rx="14" fill="#FFF7ED"/>
    <rect x="738" y="118" width="194" height="14" fill="#FFF7ED"/>
    <text x="835" y="116" text-anchor="middle" fill="#C2410C" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">GAS FURNACE</text>
    <!-- Heat exchanger -->
    <rect x="756" y="142" width="158" height="78" rx="6" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
    <text x="835" y="158" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="8" font-weight="600" letter-spacing="0.8">HEAT EXCHANGER</text>
    <!-- Flames -->
    <path d="M 794 220 C 794 212 787 196 794 180 C 798 196 808 200 805 220 Z" fill="#FB923C" opacity="0.9"/>
    <path d="M 814 220 C 814 210 807 192 814 174 C 818 192 827 196 824 220 Z" fill="#EF4444" opacity="0.85"/>
    <path d="M 834 220 C 834 209 827 190 834 172 C 838 190 847 195 844 220 Z" fill="#FB923C" opacity="0.9"/>
    <path d="M 854 220 C 854 210 847 192 854 174 C 858 192 866 196 863 220 Z" fill="#EF4444" opacity="0.85"/>
    <!-- Blower -->
    <circle cx="835" cy="278" r="34" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
    <circle cx="835" cy="278" r="24" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
    <line x1="835" y1="254" x2="835" y2="302" stroke="#B45309" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="811" y1="278" x2="859" y2="278" stroke="#B45309" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="818" y1="261" x2="852" y2="295" stroke="#B45309" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="852" y1="261" x2="818" y2="295" stroke="#B45309" stroke-width="1.8" stroke-linecap="round"/>
    <text x="835" y="322" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="8" letter-spacing="0.5">BLOWER MOTOR</text>
    <!-- AFUE badge -->
    <rect x="754" y="340" width="162" height="22" rx="11" fill="#FEE2E2"/>
    <text x="835" y="355" text-anchor="middle" fill="#B91C1C" font-family="system-ui, sans-serif" font-size="11" font-weight="700">96% AFUE max</text>
  </g>

  <!-- Break-even callout -->
  <rect x="448" y="392" width="510" height="54" rx="10" fill="#FFFFFF" fill-opacity="0.88" stroke="#E2E8F0" stroke-width="1"/>
  <text x="703" y="418" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="12">
    <tspan fill="#0369A1" font-weight="600">Break-even: </tspan>
    <tspan>electricity </tspan>
    <tspan fill="#01AD9F" font-weight="700">&lt; $0.145/kWh</tspan>
    <tspan> &#8594; heat pump wins</tspan>
  </text>
  <text x="703" y="436" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">Threshold shifts with climate zone, COP, and local gas price</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
