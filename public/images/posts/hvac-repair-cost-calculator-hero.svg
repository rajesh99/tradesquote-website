<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">HVAC Repair Cost Calculator Guide</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, a wrench icon, dollar-sign cost badges, and an AC unit representing HVAC repair cost estimation and the repair-vs-replace decision.</desc>

  <defs>
    <linearGradient id="repairBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="repairSkyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="repairTealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="repairUnitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="repairAccentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="repairSoftBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="repairGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#repairBgGrad)"/>
  <ellipse cx="800" cy="100" rx="210" ry="170" fill="url(#repairSkyGrad)" filter="url(#repairSoftBlur)"/>
  <ellipse cx="670" cy="390" rx="190" ry="150" fill="url(#repairTealGrad)" filter="url(#repairSoftBlur)"/>

  <!-- Frosted card -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="185" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">HVAC Repair</tspan>
    <tspan x="80" dy="46" fill="#01AD9F">Cost Calculator</tspan>
  </text>
  <text x="80" y="295" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Repair ranges, repair vs replace rules</text>
  <rect x="80" y="319" width="56" height="4" rx="2" fill="url(#repairAccentBar)"/>

  <!-- AC outdoor unit body -->
  <rect x="560" y="200" width="140" height="190" rx="14" fill="url(#repairUnitGrad)" stroke="#01AD9F" stroke-width="2.5" stroke-opacity="0.55"/>
  <!-- Fan grill circle -->
  <circle cx="630" cy="285" r="52" fill="none" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.4"/>
  <circle cx="630" cy="285" r="36" fill="none" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="630" cy="285" r="12" fill="#01AD9F" fill-opacity="0.25"/>
  <!-- Fan blades simplified -->
  <line x1="630" y1="233" x2="630" y2="337" stroke="#01AD9F" stroke-width="1.8" stroke-opacity="0.35"/>
  <line x1="578" y1="285" x2="682" y2="285" stroke="#01AD9F" stroke-width="1.8" stroke-opacity="0.35"/>
  <line x1="593" y1="248" x2="667" y2="322" stroke="#01AD9F" stroke-width="1.4" stroke-opacity="0.25"/>
  <line x1="593" y1="322" x2="667" y2="248" stroke="#01AD9F" stroke-width="1.4" stroke-opacity="0.25"/>
  <!-- Unit top panel -->
  <rect x="560" y="200" width="140" height="28" rx="14" fill="#01AD9F" fill-opacity="0.18" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Wrench icon (abstract) -->
  <g transform="translate(730, 195)" filter="url(#repairGlow)">
    <rect x="0" y="0" width="50" height="14" rx="7" fill="#2563EB" fill-opacity="0.55" transform="rotate(-40)"/>
    <circle cx="-8" cy="8" r="10" fill="none" stroke="#2563EB" stroke-width="3" stroke-opacity="0.5"/>
  </g>

  <!-- Cost badges -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- Badge 1: capacitor -->
    <rect x="570" y="140" width="140" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="640" y="163" text-anchor="middle" fill="#0F766E" font-size="13" font-weight="700">Capacitor $150–$400</text>

    <!-- Badge 2: compressor -->
    <rect x="740" y="300" width="150" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.92" stroke="#2563EB" stroke-width="1.5"/>
    <text x="815" y="323" text-anchor="middle" fill="#2563EB" font-size="12" font-weight="700">Compressor $1,500–$3,500</text>

    <!-- Badge 3: duct cleaning -->
    <rect x="555" y="415" width="150" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.92" stroke="#01AD9F" stroke-width="1.5"/>
    <text x="630" y="438" text-anchor="middle" fill="#0F766E" font-size="12" font-weight="700">Duct cleaning $300–$700</text>
  </g>

  <!-- Bottom teal strip -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
