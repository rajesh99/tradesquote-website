<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Refrigerant overcharge vs undercharge - reading the charge</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients and two pressure-gauge-like rings, one low and one high, representing how superheat and subcooling reveal refrigerant charge.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#EA580C" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="arcLow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="arcHigh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Soft ambient blobs -->
  <ellipse cx="770" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="390" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="300" rx="130" ry="130" fill="url(#orangeGrad)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="72" width="404" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>

  <g opacity="0.16">
    <circle cx="80" cy="140" r="2" fill="#94A3B8"/>
    <circle cx="120" cy="180" r="2" fill="#94A3B8"/>
    <circle cx="160" cy="120" r="2" fill="#94A3B8"/>
    <circle cx="200" cy="220" r="2" fill="#94A3B8"/>
    <circle cx="100" cy="280" r="2" fill="#94A3B8"/>
    <circle cx="180" cy="320" r="2" fill="#94A3B8"/>
    <circle cx="240" cy="160" r="2" fill="#94A3B8"/>
    <circle cx="60" cy="360" r="2" fill="#94A3B8"/>
  </g>

  <text x="80" y="206" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Overcharge vs</tspan>
    <tspan x="80" dy="46" fill="#01AD9F">Undercharge</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Reading the refrigerant charge</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Low gauge ring -->
  <circle cx="650" cy="250" r="96" stroke="#E2E8F0" stroke-width="1.5" fill="none"/>
  <circle cx="650" cy="250" r="72" stroke="#E2E8F0" stroke-width="1" fill="none" stroke-dasharray="6 8"/>
  <path
    d="M 650 154 A 96 96 0 0 1 718 318"
    stroke="url(#arcLow)"
    stroke-width="10"
    stroke-linecap="round"
    fill="none"
    opacity="0.9"
    filter="url(#glow)"
  />
  <circle cx="650" cy="250" r="26" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="650" cy="250" r="15" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="650" y1="250" x2="608" y2="214" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>

  <!-- High gauge ring -->
  <circle cx="838" cy="300" r="80" stroke="#E2E8F0" stroke-width="1.5" fill="none"/>
  <circle cx="838" cy="300" r="58" stroke="#E2E8F0" stroke-width="1" fill="none" stroke-dasharray="6 8"/>
  <path
    d="M 838 220 A 80 80 0 1 1 758 300"
    stroke="url(#arcHigh)"
    stroke-width="10"
    stroke-linecap="round"
    fill="none"
    opacity="0.9"
    filter="url(#glow)"
  />
  <circle cx="838" cy="300" r="22" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="838" cy="300" r="13" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="838" y1="300" x2="872" y2="268" stroke="#EA580C" stroke-width="3" stroke-linecap="round"/>

  <!-- Floating abstract shapes -->
  <rect x="560" y="96" width="64" height="64" rx="16" fill="#FFFFFF" fill-opacity="0.7" stroke="#BAE6FD" stroke-width="1.5" transform="rotate(-12 592 128)"/>
  <circle cx="922" cy="168" r="26" fill="#FFFFFF" fill-opacity="0.65" stroke="#FED7AA" stroke-width="1.5"/>
  <rect x="566" y="356" width="52" height="52" rx="13" fill="#FFFFFF" fill-opacity="0.6" stroke="#99F6E4" stroke-width="1.5" transform="rotate(16 592 382)"/>

  <!-- Gauge labels -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="600" y="356" width="100" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#93C5FD" stroke-width="1.5"/>
    <text x="650" y="376" text-anchor="middle" fill="#1D4ED8" font-size="12" font-weight="700" letter-spacing="0.5">LOW SIDE</text>

    <rect x="784" y="392" width="108" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#FDBA74" stroke-width="1.5"/>
    <text x="838" y="412" text-anchor="middle" fill="#C2410C" font-size="12" font-weight="700" letter-spacing="0.5">HIGH SIDE</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
