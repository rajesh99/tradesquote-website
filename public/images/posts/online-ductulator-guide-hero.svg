<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Online ductulator guide</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients showing a ductulator sizing wheel, round ducts, and CFM/friction-rate labels — representing an online duct sizing tool.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="wheelRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="700" cy="390" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <!-- Frosted card left -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="190" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Online</tspan>
    <tspan x="80" dy="48" fill="#01AD9F">Ductulator</tspan>
  </text>
  <text x="80" y="292" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">CFM + friction rate → duct size</text>
  <rect x="80" y="316" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Ductulator wheel illustration (right side) -->
  <!-- Outer wheel ring -->
  <circle cx="730" cy="250" r="160" fill="none" stroke="#01AD9F" stroke-width="3" stroke-opacity="0.25"/>
  <circle cx="730" cy="250" r="155" fill="url(#wheelRim)"/>
  <!-- Inner ring -->
  <circle cx="730" cy="250" r="110" fill="#FFFFFF" fill-opacity="0.55" stroke="#2563EB" stroke-width="2" stroke-opacity="0.25"/>
  <!-- Center hub -->
  <circle cx="730" cy="250" r="44" fill="#FFFFFF" fill-opacity="0.80" stroke="#01AD9F" stroke-width="2.5" stroke-opacity="0.50"/>
  <text x="730" y="244" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800">DUCT</text>
  <text x="730" y="260" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800">SIZER</text>

  <!-- Tick marks on outer ring -->
  <line x1="730" y1="92" x2="730" y2="104" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.55"/>
  <line x1="730" y1="396" x2="730" y2="408" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.55"/>
  <line x1="572" y1="250" x2="584" y2="250" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.55"/>
  <line x1="876" y1="250" x2="888" y2="250" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.55"/>
  <!-- Diagonal ticks -->
  <line x1="618" y1="136" x2="627" y2="145" stroke="#2563EB" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="833" y1="355" x2="842" y2="364" stroke="#2563EB" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="618" y1="364" x2="627" y2="355" stroke="#2563EB" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="833" y1="145" x2="842" y2="136" stroke="#2563EB" stroke-width="1.5" stroke-opacity="0.35"/>

  <!-- Pointer / indicator arrow -->
  <line x1="730" y1="250" x2="730" y2="108" stroke="#2563EB" stroke-width="2.5" stroke-opacity="0.60" stroke-linecap="round" filter="url(#glow)"/>
  <polygon points="730,96 724,114 736,114" fill="#2563EB" fill-opacity="0.65"/>

  <!-- CFM badge -->
  <rect x="600" y="148" width="90" height="26" rx="13" fill="#FFFFFF" fill-opacity="0.90" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="645" y="165" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">400 CFM</text>

  <!-- Friction rate badge -->
  <rect x="756" y="148" width="106" height="26" rx="13" fill="#FFFFFF" fill-opacity="0.90" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="809" y="165" text-anchor="middle" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">0.10 in.wg/100ft</text>

  <!-- Result badge -->
  <rect x="668" y="328" width="124" height="30" rx="15" fill="#01AD9F" fill-opacity="0.18" stroke="#01AD9F" stroke-width="1.8"/>
  <text x="730" y="348" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800">→ 10" round</text>

  <!-- Small round duct cross-section illustration -->
  <circle cx="920" cy="160" r="30" fill="none" stroke="#01AD9F" stroke-width="2.5" stroke-opacity="0.45"/>
  <circle cx="920" cy="160" r="22" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-opacity="0.30"/>
  <text x="920" y="165" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">10"</text>

  <!-- Bottom teal strip -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
