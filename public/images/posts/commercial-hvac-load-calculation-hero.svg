<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Commercial HVAC Load Calculation Guide</title>
  <desc id="heroDesc">Abstract hero graphic showing a commercial building outline with HVAC load factors — occupants, lighting, equipment, and envelope — feeding into a central cooling load result, representing commercial HVAC load calculation methodology.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="buildingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="790" cy="110" rx="210" ry="170" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="660" cy="390" rx="190" ry="145" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <!-- Frosted card (left) -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="185" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Commercial HVAC</tspan>
    <tspan x="80" dy="46" fill="#01AD9F">Load Calculation</tspan>
  </text>
  <text x="80" y="288" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">Envelope · Occupants · Equipment · Ventilation</text>
  <rect x="80" y="310" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Commercial building outline (right) -->
  <!-- Main building body -->
  <rect x="540" y="180" width="230" height="210" rx="8" fill="url(#buildingGrad)" stroke="#01AD9F" stroke-width="2.2" stroke-opacity="0.50"/>
  <!-- Roof parapet -->
  <rect x="532" y="168" width="246" height="20" rx="4" fill="#01AD9F" fill-opacity="0.18" stroke="#01AD9F" stroke-width="1.8" stroke-opacity="0.45"/>
  <!-- Rooftop unit (RTU) -->
  <rect x="620" y="142" width="76" height="32" rx="6" fill="#FFFFFF" fill-opacity="0.60" stroke="#2563EB" stroke-width="1.8" stroke-opacity="0.50"/>
  <text x="658" y="163" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="800">RTU</text>
  <!-- Windows (3 rows) -->
  <rect x="560" y="200" width="40" height="28" rx="3" fill="#FFFFFF" fill-opacity="0.55" stroke="#38BDF8" stroke-width="1.2" stroke-opacity="0.60"/>
  <rect x="620" y="200" width="40" height="28" rx="3" fill="#FFFFFF" fill-opacity="0.55" stroke="#38BDF8" stroke-width="1.2" stroke-opacity="0.60"/>
  <rect x="680" y="200" width="40" height="28" rx="3" fill="#FFFFFF" fill-opacity="0.55" stroke="#38BDF8" stroke-width="1.2" stroke-opacity="0.60"/>
  <rect x="560" y="248" width="40" height="28" rx="3" fill="#FFFFFF" fill-opacity="0.55" stroke="#38BDF8" stroke-width="1.2" stroke-opacity="0.60"/>
  <rect x="620" y="248" width="40" height="28" rx="3" fill="#FFFFFF" fill-opacity="0.55" stroke="#38BDF8" stroke-width="1.2" stroke-opacity="0.60"/>
  <rect x="680" y="248" width="40" height="28" rx="3" fill="#FFFFFF" fill-opacity="0.55" stroke="#38BDF8" stroke-width="1.2" stroke-opacity="0.60"/>
  <rect x="560" y="296" width="40" height="28" rx="3" fill="#FFFFFF" fill-opacity="0.55" stroke="#38BDF8" stroke-width="1.2" stroke-opacity="0.60"/>
  <rect x="620" y="296" width="40" height="28" rx="3" fill="#FFFFFF" fill-opacity="0.55" stroke="#38BDF8" stroke-width="1.2" stroke-opacity="0.60"/>
  <rect x="680" y="296" width="40" height="28" rx="3" fill="#FFFFFF" fill-opacity="0.55" stroke="#38BDF8" stroke-width="1.2" stroke-opacity="0.60"/>
  <!-- Door -->
  <rect x="630" y="345" width="48" height="45" rx="3" fill="#FFFFFF" fill-opacity="0.45" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.55"/>

  <!-- Load factor badges -->
  <!-- People badge -->
  <rect x="800" y="185" width="110" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.90" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="855" y="205" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">👤 Occupants</text>
  <!-- Lighting badge -->
  <rect x="808" y="230" width="110" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.90" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="863" y="250" text-anchor="middle" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">💡 Lighting</text>
  <!-- Plug load badge -->
  <rect x="800" y="275" width="120" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.90" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="860" y="295" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">🔌 Equipment</text>
  <!-- Ventilation badge -->
  <rect x="808" y="320" width="115" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.90" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="865" y="340" text-anchor="middle" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">🌬 Ventilation</text>

  <!-- Connecting lines from building to badges -->
  <path d="M770 230 Q 792 200, 800 200" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.35" fill="none" stroke-dasharray="4 3"/>
  <path d="M770 248 Q 800 245, 808 245" stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.35" fill="none" stroke-dasharray="4 3"/>
  <path d="M770 296 Q 792 290, 800 290" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.35" fill="none" stroke-dasharray="4 3"/>
  <path d="M770 335 Q 800 335, 808 335" stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.35" fill="none" stroke-dasharray="4 3"/>

  <!-- Tons result badge above building -->
  <rect x="570" y="88" width="170" height="38" rx="19" fill="#01AD9F" fill-opacity="0.14" stroke="#01AD9F" stroke-width="1.8" stroke-opacity="0.55" filter="url(#glow)"/>
  <text x="655" y="113" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" letter-spacing="0.3">2.5 – 4 tons / 1,000 sf</text>

  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
