<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">BTU by room size</title>
  <desc id="heroDesc">Abstract hero graphic showing a room floorplan with a wall-mounted AC head and a BTU badge, illustrating how to match BTU to room size for air conditioner sizing.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="roomGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="acGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0F766E" stop-opacity="0.30"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="800" cy="110" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="660" cy="390" rx="190" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <!-- Frosted card (left) -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="195" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">BTU by</tspan>
    <tspan x="80" dy="50" fill="#01AD9F">room size</tspan>
  </text>
  <text x="80" y="298" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Size an AC to the space</text>
  <rect x="80" y="320" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Abstract room floorplan outline -->
  <rect x="545" y="145" width="330" height="240" rx="14" fill="url(#roomGrad)" stroke="#01AD9F" stroke-width="2.2" stroke-opacity="0.50"/>

  <!-- Room grid lines (floor tiles suggestion) -->
  <line x1="655" y1="145" x2="655" y2="385" stroke="#01AD9F" stroke-width="0.7" stroke-opacity="0.18"/>
  <line x1="765" y1="145" x2="765" y2="385" stroke="#01AD9F" stroke-width="0.7" stroke-opacity="0.18"/>
  <line x1="545" y1="225" x2="875" y2="225" stroke="#01AD9F" stroke-width="0.7" stroke-opacity="0.18"/>
  <line x1="545" y1="305" x2="875" y2="305" stroke="#01AD9F" stroke-width="0.7" stroke-opacity="0.18"/>

  <!-- Wall-mount AC head on top wall -->
  <rect x="680" y="148" width="90" height="34" rx="8" fill="url(#acGrad)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.75"/>
  <!-- AC grille slats -->
  <line x1="688" y1="162" x2="762" y2="162" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.70"/>
  <line x1="688" y1="170" x2="762" y2="170" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.55"/>
  <!-- Air flow curves from AC downward -->
  <path d="M705 184 Q705 215 730 220" stroke="#38BDF8" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.65" filter="url(#glow)"/>
  <path d="M725 184 Q730 220 730 240" stroke="#38BDF8" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.55" filter="url(#glow)"/>
  <path d="M745 184 Q755 215 730 220" stroke="#38BDF8" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.45" filter="url(#glow)"/>

  <!-- BTU badge sized to room -->
  <rect x="786" y="282" width="76" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="2"/>
  <text x="824" y="298" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" letter-spacing="0.5">BTU</text>
  <text x="824" y="315" text-anchor="middle" fill="#01AD9F" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800">5k – 18k</text>

  <!-- Sq ft label bottom of room -->
  <rect x="600" y="356" width="106" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.80" stroke="#D5D5D5" stroke-width="1"/>
  <text x="653" y="373" text-anchor="middle" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="600">100 – 700 sq ft</text>

  <!-- Teal bottom strip -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
