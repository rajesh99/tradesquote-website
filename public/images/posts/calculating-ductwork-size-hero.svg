<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Calculating ductwork size</title>
  <desc>Abstract hero graphic with soft gradients showing round and rectangular ducts of stepped sizes with an airflow stream and a CFM badge, representing how to match duct size to airflow in CFM.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="ductFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="streamFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="660" cy="390" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <!-- Frosted card -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="195" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Calculating</tspan>
    <tspan x="80" dy="48" fill="#01AD9F">ductwork size</tspan>
  </text>
  <text x="80" y="295" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Match duct size to CFM</text>
  <rect x="80" y="319" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Stepped round ducts (right side) -->
  <!-- Smallest: 6-in duct (circle r=18) -->
  <circle cx="600" cy="200" r="18" fill="url(#ductFill)" stroke="#01AD9F" stroke-width="2.5" stroke-opacity="0.55"/>
  <text x="600" y="205" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700">6"</text>

  <!-- Medium: 10-in duct (circle r=30) -->
  <circle cx="660" cy="220" r="30" fill="url(#ductFill)" stroke="#01AD9F" stroke-width="2.5" stroke-opacity="0.6"/>
  <text x="660" y="225" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">10"</text>

  <!-- Large: 14-in duct (circle r=44) -->
  <circle cx="740" cy="240" r="44" fill="url(#ductFill)" stroke="#2563EB" stroke-width="2.5" stroke-opacity="0.5"/>
  <text x="740" y="245" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">14"</text>

  <!-- Rectangular duct below the round ones -->
  <rect x="580" y="310" width="200" height="70" rx="8" fill="url(#ductFill)" stroke="#2563EB" stroke-width="2" stroke-opacity="0.45"/>
  <text x="680" y="350" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">8 × 10 rect</text>

  <!-- Airflow stream arrows across ducts -->
  <path d="M555 240 C580 235, 620 238, 656 238" stroke="url(#streamFlow)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.8" filter="url(#glow)"/>
  <path d="M656 238 l-10 -5 l2 11" fill="#0EA5E9" opacity="0.85"/>

  <!-- CFM badge -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="820" y="158" width="100" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="870" y="181" text-anchor="middle" fill="#0F766E" font-size="13" font-weight="800" letter-spacing="0.5">CFM</text>
  </g>

  <!-- Connector line from CFM badge to large duct -->
  <line x1="820" y1="176" x2="784" y2="230" stroke="#5EEAD4" stroke-width="1.5" stroke-opacity="0.6" stroke-dasharray="4 3"/>

  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
