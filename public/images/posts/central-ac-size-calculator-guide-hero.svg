<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Central AC size calculator guide</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, a house silhouette connected to an outdoor condenser unit with a tonnage badge, representing how to size a central air conditioning system for the whole home.</desc>

  <defs>
    <linearGradient id="cac-bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="cac-skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="cac-tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="cac-accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="cac-houseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="cac-condenserGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="cac-softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="cac-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#cac-bgGrad)"/>
  <ellipse cx="800" cy="110" rx="210" ry="165" fill="url(#cac-skyGrad)" filter="url(#cac-softBlur)"/>
  <ellipse cx="700" cy="390" rx="185" ry="145" fill="url(#cac-tealGrad)" filter="url(#cac-softBlur)"/>

  <!-- Frosted card left -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" y="195" fill="#152035">Central AC</tspan>
    <tspan x="80" dy="48" fill="#01AD9F">size calculator</tspan>
  </text>
  <text x="80" y="298" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Tons &amp; BTU for the whole home</text>
  <rect x="80" y="322" width="56" height="4" rx="2" fill="url(#cac-accentBar)"/>

  <!-- House body -->
  <rect x="560" y="235" width="160" height="120" rx="8" fill="url(#cac-houseGrad)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.55"/>
  <!-- House roof -->
  <polygon points="548,238 720,238 634,160" fill="#FFFFFF" fill-opacity="0.35" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Door -->
  <rect x="618" y="305" width="32" height="50" rx="4" fill="#FFFFFF" fill-opacity="0.55" stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.45"/>
  <!-- Windows -->
  <rect x="572" y="260" width="36" height="28" rx="4" fill="#FFFFFF" fill-opacity="0.6" stroke="#38BDF8" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="660" y="260" width="36" height="28" rx="4" fill="#FFFFFF" fill-opacity="0.6" stroke="#38BDF8" stroke-width="1.2" stroke-opacity="0.5"/>

  <!-- Connector line from house to condenser -->
  <path d="M734 315 C 770 315, 790 340, 830 340" stroke="#01AD9F" stroke-width="2.5" stroke-dasharray="6 4" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Outdoor condenser unit -->
  <rect x="828" y="305" width="100" height="80" rx="10" fill="url(#cac-condenserGrad)" stroke="#0EA5E9" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Condenser fan circle -->
  <circle cx="878" cy="340" r="28" fill="none" stroke="#01AD9F" stroke-width="1.8" stroke-opacity="0.55"/>
  <circle cx="878" cy="340" r="8" fill="#FFFFFF" fill-opacity="0.5" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Fan blades -->
  <line x1="878" y1="314" x2="878" y2="326" stroke="#01AD9F" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.65"/>
  <line x1="878" y1="354" x2="878" y2="366" stroke="#01AD9F" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.65"/>
  <line x1="852" y1="340" x2="864" y2="340" stroke="#01AD9F" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.65"/>
  <line x1="892" y1="340" x2="904" y2="340" stroke="#01AD9F" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.65"/>
  <!-- Condenser label -->
  <text x="878" y="398" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">condenser</text>

  <!-- Tonnage badge -->
  <g filter="url(#cac-glow)">
    <rect x="746" y="160" width="136" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.8"/>
    <text x="814" y="186" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" letter-spacing="0.3">2 – 5 ton range</text>
  </g>

  <!-- Cool airflow puffs from condenser top -->
  <path d="M860 305 C 855 285, 870 275, 878 260" stroke="url(#cac-accentBar)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.55"/>
  <path d="M878 305 C 878 285, 888 278, 894 265" stroke="#38BDF8" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Bottom teal strip -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
