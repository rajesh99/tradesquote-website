<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">HVAC kWh Calculator</title>
  <desc id="heroDesc">Abstract hero graphic showing an electricity meter and energy gauge with a kWh badge and AC unit motif, representing how to estimate AC electricity usage in kilowatt-hours.</desc>

  <defs>
    <linearGradient id="kwh-bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="kwh-skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="kwh-tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="kwh-meterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="kwh-arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="60%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="kwh-accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="kwh-softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="kwh-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#kwh-bgGrad)"/>
  <ellipse cx="790" cy="130" rx="210" ry="165" fill="url(#kwh-skyGrad)" filter="url(#kwh-softBlur)"/>
  <ellipse cx="670" cy="390" rx="175" ry="145" fill="url(#kwh-tealGrad)" filter="url(#kwh-softBlur)"/>

  <!-- Frosted card left -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="195" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">HVAC kWh</tspan>
    <tspan x="80" dy="50" fill="#01AD9F">calculator</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Estimate AC electricity usage</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#kwh-accentBar)"/>

  <!-- Right illustration: energy meter body -->
  <rect x="570" y="130" width="180" height="250" rx="18" fill="url(#kwh-meterGrad)" stroke="#01AD9F" stroke-width="2.2" stroke-opacity="0.55"/>
  <!-- Meter display screen -->
  <rect x="592" y="162" width="136" height="60" rx="8" fill="#FFFFFF" fill-opacity="0.72" stroke="#5EEAD4" stroke-width="1.5"/>
  <!-- kWh display value -->
  <text x="660" y="200" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="800" letter-spacing="-0.01em">2.40</text>
  <text x="660" y="215" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" letter-spacing="0.06em">kWh / hr</text>

  <!-- Gauge arc below display -->
  <!-- Arc track background -->
  <path d="M 605 310 A 65 65 0 0 1 715 310" stroke="#D5D5D5" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- Arc fill (about 70% of the arc) -->
  <path d="M 605 310 A 65 65 0 0 1 692 266" stroke="url(#kwh-arcGrad)" stroke-width="10" stroke-linecap="round" fill="none" filter="url(#kwh-glow)"/>
  <!-- Gauge needle -->
  <line x1="660" y1="310" x2="693" y2="267" stroke="#152035" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="660" cy="310" r="6" fill="#01AD9F" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Tick marks on gauge -->
  <line x1="596" y1="313" x2="601" y2="304" stroke="#D5D5D5" stroke-width="1.5"/>
  <line x1="615" y1="275" x2="620" y2="267" stroke="#D5D5D5" stroke-width="1.5"/>
  <line x1="660" y1="248" x2="660" y2="240" stroke="#D5D5D5" stroke-width="1.5"/>
  <line x1="705" y1="275" x2="710" y2="267" stroke="#D5D5D5" stroke-width="1.5"/>
  <line x1="722" y1="313" x2="718" y2="304" stroke="#D5D5D5" stroke-width="1.5"/>

  <!-- Meter bottom buttons -->
  <rect x="610" y="338" width="22" height="8" rx="4" fill="#5EEAD4" fill-opacity="0.55"/>
  <rect x="640" y="338" width="22" height="8" rx="4" fill="#5EEAD4" fill-opacity="0.35"/>
  <rect x="670" y="338" width="22" height="8" rx="4" fill="#5EEAD4" fill-opacity="0.20"/>

  <!-- kWh badge pill -->
  <rect x="620" y="368" width="80" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="660" y="387" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" letter-spacing="0.5">kWh</text>

  <!-- Subtle AC unit motif (small, to the right) -->
  <rect x="790" y="210" width="110" height="70" rx="10" fill="#FFFFFF" fill-opacity="0.30" stroke="#2563EB" stroke-width="1.8" stroke-opacity="0.40"/>
  <!-- AC grille lines -->
  <line x1="800" y1="228" x2="890" y2="228" stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="800" y1="244" x2="890" y2="244" stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="800" y1="260" x2="890" y2="260" stroke="#2563EB" stroke-width="1.2" stroke-opacity="0.35"/>
  <!-- AC fan circle -->
  <circle cx="855" cy="260" r="14" fill="none" stroke="#2563EB" stroke-width="1.4" stroke-opacity="0.40"/>
  <circle cx="855" cy="260" r="5" fill="#2563EB" fill-opacity="0.25"/>
  <!-- AC label -->
  <text x="840" y="298" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">AC unit</text>

  <!-- Lightning bolt energy symbol -->
  <path d="M 825 155 L 812 178 L 820 178 L 808 200 L 830 172 L 821 172 Z" fill="#01AD9F" fill-opacity="0.55" stroke="#0F766E" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Bottom teal strip -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
