<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">ASHRAE 62.2 residential ventilation requirements</title>
  <desc id="heroDesc">Illustration of the ASHRAE 62.2 whole-building ventilation formula showing fresh-air CFM calculation from floor area and occupancy.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="tealBlob" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="skyBlob" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="freshAir" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#01AD9F"/>
    </linearGradient>
    <linearGradient id="areaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="occGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#D1FAE5"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#01AD9F"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="720" cy="120" rx="200" ry="150" fill="url(#tealBlob)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="360" rx="160" ry="130" fill="url(#skyBlob)" filter="url(#softBlur)"/>

  <!-- Left headline card -->
  <rect x="48" y="68" width="380" height="364" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="168" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0" fill="#01AD9F">ASHRAE</tspan>
    <tspan x="80" dy="48">62.2</tspan>
  </text>
  <text x="80" y="270" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500">Ventilation Requirements</text>
  <text x="80" y="294" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="13">Fresh-air CFM for your home</text>
  <rect x="80" y="318" width="56" height="4" rx="2" fill="url(#accentBar)"/>
  <!-- Standard note -->
  <rect x="80" y="334" width="300" height="52" rx="10" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="230" y="355" text-anchor="middle" fill="#065F46" font-family="system-ui, sans-serif" font-size="10" font-weight="600">ASHRAE 62.2-2022</text>
  <text x="230" y="371" text-anchor="middle" fill="#047857" font-family="system-ui, sans-serif" font-size="10">Mechanical ventilation standard for</text>
  <text x="230" y="384" text-anchor="middle" fill="#047857" font-family="system-ui, sans-serif" font-size="10">low-rise residential buildings</text>

  <!-- Formula card -->
  <g filter="url(#cardShadow)">
    <rect x="462" y="80" width="496" height="120" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="710" y="110" text-anchor="middle" fill="#152035" font-family="system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.5">WHOLE-BUILDING VENTILATION FORMULA</text>
    <!-- Formula display -->
    <text x="486" y="148" fill="#0369A1" font-family="system-ui, -apple-system, monospace" font-size="16" font-weight="700">Q</text>
    <text x="500" y="148" fill="#475569" font-family="system-ui, -apple-system, monospace" font-size="16" font-weight="400"> = </text>
    <text x="522" y="148" fill="#1D4ED8" font-family="system-ui, -apple-system, monospace" font-size="16" font-weight="700">0.01 &#215; A</text>
    <text x="616" y="152" fill="#1D4ED8" font-family="system-ui, -apple-system, monospace" font-size="10">f</text>
    <text x="626" y="148" fill="#475569" font-family="system-ui, -apple-system, monospace" font-size="16"> + </text>
    <text x="652" y="148" fill="#047857" font-family="system-ui, -apple-system, monospace" font-size="16" font-weight="700">7.5 &#215; (N</text>
    <text x="740" y="152" fill="#047857" font-family="system-ui, -apple-system, monospace" font-size="10">br</text>
    <text x="757" y="148" fill="#047857" font-family="system-ui, -apple-system, monospace" font-size="16" font-weight="700"> + 1)</text>
    <text x="828" y="148" fill="#94A3B8" font-family="system-ui, -apple-system, monospace" font-size="13"> CFM</text>
    <!-- Underlines for terms -->
    <line x1="522" y1="155" x2="625" y2="155" stroke="#1D4ED8" stroke-width="1.5" stroke-dasharray="3 2"/>
    <line x1="652" y1="155" x2="810" y2="155" stroke="#047857" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="574" y="170" text-anchor="middle" fill="#3B82F6" font-family="system-ui, sans-serif" font-size="9">floor area factor</text>
    <text x="730" y="170" text-anchor="middle" fill="#059669" font-family="system-ui, sans-serif" font-size="9">occupancy factor</text>
  </g>

  <!-- Area component card -->
  <g filter="url(#cardShadow)">
    <rect x="462" y="224" width="230" height="150" rx="14" fill="url(#areaGrad)" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="577" y="250" text-anchor="middle" fill="#1E40AF" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="0.8">AREA FACTOR</text>
    <text x="577" y="278" text-anchor="middle" fill="#1D4ED8" font-family="system-ui, sans-serif" font-size="26" font-weight="700">0.01 &#215; A</text>
    <text x="635" y="282" fill="#1D4ED8" font-family="system-ui, sans-serif" font-size="13">f</text>
    <text x="577" y="302" text-anchor="middle" fill="#3B82F6" font-family="system-ui, sans-serif" font-size="11">A = conditioned floor area (ft&#178;)</text>
    <!-- Example -->
    <rect x="482" y="314" width="190" height="48" rx="8" fill="#FFFFFF" fill-opacity="0.7"/>
    <text x="577" y="332" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Example: 2,000 ft&#178; home</text>
    <text x="577" y="350" text-anchor="middle" fill="#1D4ED8" font-family="system-ui, sans-serif" font-size="12" font-weight="700">0.01 &#215; 2000 = 20 CFM</text>
  </g>

  <!-- Plus sign -->
  <circle cx="710" cy="300" r="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="710" y="306" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="18" font-weight="700">+</text>

  <!-- Occupancy component card -->
  <g filter="url(#cardShadow)">
    <rect x="728" y="224" width="230" height="150" rx="14" fill="url(#occGrad)" stroke="#A7F3D0" stroke-width="1.5"/>
    <text x="843" y="250" text-anchor="middle" fill="#065F46" font-family="system-ui, sans-serif" font-size="11" font-weight="700" letter-spacing="0.8">OCCUPANCY FACTOR</text>
    <text x="843" y="278" text-anchor="middle" fill="#047857" font-family="system-ui, sans-serif" font-size="22" font-weight="700">7.5 &#215; (N</text>
    <text x="914" y="282" fill="#047857" font-family="system-ui, sans-serif" font-size="13">br</text>
    <text x="926" y="278" fill="#047857" font-family="system-ui, sans-serif" font-size="22" font-weight="700">+1)</text>
    <text x="843" y="302" text-anchor="middle" fill="#059669" font-family="system-ui, sans-serif" font-size="11">N = number of bedrooms</text>
    <!-- Example -->
    <rect x="748" y="314" width="190" height="48" rx="8" fill="#FFFFFF" fill-opacity="0.7"/>
    <text x="843" y="332" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="10">Example: 3-bedroom home</text>
    <text x="843" y="350" text-anchor="middle" fill="#047857" font-family="system-ui, sans-serif" font-size="12" font-weight="700">7.5 &#215; (3+1) = 30 CFM</text>
  </g>

  <!-- Result bar -->
  <rect x="462" y="394" width="496" height="54" rx="12" fill="#FFFFFF" fill-opacity="0.9" stroke="#E2E8F0" stroke-width="1.5" filter="url(#cardShadow)"/>
  <text x="710" y="416" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="12">
    <tspan fill="#152035" font-weight="700">Total: </tspan>
    <tspan fill="#1D4ED8" font-weight="700">20 CFM</tspan>
    <tspan fill="#475569"> + </tspan>
    <tspan fill="#047857" font-weight="700">30 CFM</tspan>
    <tspan fill="#475569"> = </tspan>
    <tspan fill="#01AD9F" font-weight="700">50 CFM</tspan>
    <tspan fill="#475569"> whole-building ventilation</tspan>
  </text>
  <text x="710" y="434" text-anchor="middle" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="10">2,000 ft&#178; &#183; 3-bedroom example  &#183;  Deliver continuously or as intermittent equivalent</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
