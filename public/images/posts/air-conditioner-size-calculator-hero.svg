<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Air conditioner size calculator</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, a home outline with BTU and tonnage badges, representing how to size an air conditioner by square footage.</desc>

  <defs>
    <linearGradient id="acHeroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="acHeroSky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="acHeroTeal" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="acHeroAccentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="acHouseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="acUnitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="acSoftBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="acGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#acHeroBg)"/>
  <ellipse cx="800" cy="130" rx="210" ry="165" fill="url(#acHeroSky)" filter="url(#acSoftBlur)"/>
  <ellipse cx="680" cy="390" rx="180" ry="140" fill="url(#acHeroTeal)" filter="url(#acSoftBlur)"/>

  <!-- Frosted card left -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="195" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">AC Size</tspan>
    <tspan x="80" dy="46" fill="#01AD9F">Calculator</tspan>
  </text>
  <text x="80" y="295" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Sq ft → BTU → tons, done right</text>
  <rect x="80" y="319" width="56" height="4" rx="2" fill="url(#acHeroAccentBar)"/>

  <!-- House outline -->
  <!-- Roof -->
  <polygon points="570,155 720,80 870,155" fill="url(#acHouseGrad)" stroke="#01AD9F" stroke-width="2.2" stroke-opacity="0.55"/>
  <!-- Walls -->
  <rect x="580" y="155" width="280" height="190" rx="6" fill="url(#acHouseGrad)" stroke="#2563EB" stroke-width="2" stroke-opacity="0.40"/>
  <!-- Door -->
  <rect x="692" y="270" width="56" height="76" rx="5" fill="#FFFFFF" fill-opacity="0.55" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.50"/>
  <!-- Window left -->
  <rect x="598" y="185" width="58" height="48" rx="5" fill="#FFFFFF" fill-opacity="0.50" stroke="#0EA5E9" stroke-width="1.4" stroke-opacity="0.45"/>
  <line x1="627" y1="185" x2="627" y2="233" stroke="#0EA5E9" stroke-width="1" stroke-opacity="0.35"/>
  <!-- Window right -->
  <rect x="784" y="185" width="58" height="48" rx="5" fill="#FFFFFF" fill-opacity="0.50" stroke="#0EA5E9" stroke-width="1.4" stroke-opacity="0.45"/>
  <line x1="813" y1="185" x2="813" y2="233" stroke="#0EA5E9" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Outdoor AC condenser unit -->
  <rect x="860" y="270" width="68" height="60" rx="8" fill="url(#acUnitGrad)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.60"/>
  <!-- Fan circle -->
  <circle cx="894" cy="300" r="22" fill="none" stroke="#01AD9F" stroke-width="1.4" stroke-opacity="0.45"/>
  <circle cx="894" cy="300" r="5" fill="#01AD9F" fill-opacity="0.4"/>
  <!-- Fan blades -->
  <line x1="894" y1="278" x2="894" y2="290" stroke="#0F766E" stroke-width="2" stroke-opacity="0.55"/>
  <line x1="894" y1="310" x2="894" y2="322" stroke="#0F766E" stroke-width="2" stroke-opacity="0.55"/>
  <line x1="872" y1="300" x2="884" y2="300" stroke="#0F766E" stroke-width="2" stroke-opacity="0.55"/>
  <line x1="904" y1="300" x2="916" y2="300" stroke="#0F766E" stroke-width="2" stroke-opacity="0.55"/>

  <!-- Cool air stream from unit into house -->
  <path d="M860 295 C 830 295, 820 270, 800 265" stroke="url(#acHeroAccentBar)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.65" filter="url(#acGlow)"/>
  <path d="M860 308 C 825 308, 815 285, 795 280" stroke="#38BDF8" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.50" filter="url(#acGlow)"/>

  <!-- BTU badge -->
  <rect x="575" y="370" width="110" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.90" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="630" y="391" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">12,000 BTU = 1 ton</text>

  <!-- Sq ft badge -->
  <rect x="700" y="370" width="112" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.90" stroke="#2563EB" stroke-width="1.5"/>
  <text x="756" y="391" text-anchor="middle" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">600 sq ft = 1 ton</text>

  <!-- Accent strip bottom -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
