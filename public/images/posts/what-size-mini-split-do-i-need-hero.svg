<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">What size mini split do I need</title>
  <desc>Abstract hero graphic with soft gradients, a wall-mounted mini split head with airflow arrows and a BTU badge representing how to size a ductless mini split.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E0F2FE" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="streamCool" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="195" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">What size</tspan>
    <tspan x="80" dy="48" fill="#01AD9F">mini split?</tspan>
  </text>
  <text x="80" y="295" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Match BTU to the room</text>
  <rect x="80" y="319" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Wall head -->
  <rect x="600" y="150" width="230" height="64" rx="16" fill="url(#headGrad)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="615" y1="200" x2="815" y2="200" stroke="#0EA5E9" stroke-width="2" stroke-opacity="0.4"/>
  <circle cx="800" cy="172" r="5" fill="#01AD9F" opacity="0.5"/>

  <!-- Airflow -->
  <path d="M640 230 C 640 280, 640 320, 640 360" stroke="url(#streamCool)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.8" filter="url(#glow)"/>
  <path d="M715 230 C 715 280, 715 320, 715 360" stroke="url(#streamCool)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.7" filter="url(#glow)"/>
  <path d="M790 230 C 790 280, 790 320, 790 360" stroke="url(#streamCool)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6" filter="url(#glow)"/>
  <path d="M640 360 l -5 -15 l 10 0 Z" fill="#0EA5E9" opacity="0.85"/>
  <path d="M715 360 l -5 -15 l 10 0 Z" fill="#0EA5E9" opacity="0.8"/>
  <path d="M790 360 l -5 -15 l 10 0 Z" fill="#0EA5E9" opacity="0.7"/>

  <!-- BTU badge -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="666" y="108" width="98" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="715" y="129" text-anchor="middle" fill="#0F766E" font-size="13" font-weight="800" letter-spacing="0.5">BTU</text>
  </g>

  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
