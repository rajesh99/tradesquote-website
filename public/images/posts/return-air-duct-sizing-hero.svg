<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Return air duct sizing</title>
  <desc>Abstract hero graphic with soft gradients, an air handler with a large return duct and a return grille with airflow arrows pulled back toward the unit, representing how to size return air ducts.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="ductGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="streamCool" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="195" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Return air</tspan>
    <tspan x="80" dy="48" fill="#01AD9F">duct sizing</tspan>
  </text>
  <text x="80" y="295" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">The half most installs undersize</text>
  <rect x="80" y="319" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Air handler -->
  <rect x="560" y="170" width="110" height="190" rx="12" fill="url(#ductGrad)" stroke="#01AD9F" stroke-width="2.5" stroke-opacity="0.55"/>
  <text x="615" y="270" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800">air</text>
  <text x="615" y="288" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800">handler</text>

  <!-- Big return duct -->
  <rect x="670" y="210" width="200" height="110" rx="10" fill="url(#ductGrad)" stroke="#2563EB" stroke-width="2" stroke-opacity="0.45"/>
  <!-- Return grille at far end -->
  <rect x="850" y="200" width="22" height="130" rx="5" fill="#FFFFFF" fill-opacity="0.6" stroke="#2563EB" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="850" y1="222" x2="872" y2="222" stroke="#2563EB" stroke-width="1.4" stroke-opacity="0.4"/>
  <line x1="850" y1="244" x2="872" y2="244" stroke="#2563EB" stroke-width="1.4" stroke-opacity="0.4"/>
  <line x1="850" y1="266" x2="872" y2="266" stroke="#2563EB" stroke-width="1.4" stroke-opacity="0.4"/>
  <line x1="850" y1="288" x2="872" y2="288" stroke="#2563EB" stroke-width="1.4" stroke-opacity="0.4"/>

  <!-- Airflow pulled toward handler -->
  <path d="M845 240 C 780 240, 720 240, 680 240" stroke="url(#streamCool)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.8" filter="url(#glow)"/>
  <path d="M845 290 C 780 290, 720 290, 680 290" stroke="url(#streamCool)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.65" filter="url(#glow)"/>
  <path d="M680 240 l 16 -5 l -6 12" fill="#0EA5E9" opacity="0.85"/>
  <path d="M680 290 l 16 -5 l -6 12" fill="#0EA5E9" opacity="0.7"/>

  <!-- CFM badge -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="700" y="170" width="140" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="770" y="190" text-anchor="middle" fill="#0F766E" font-size="12" font-weight="700" letter-spacing="0.5">return = supply CFM</text>
  </g>

  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
