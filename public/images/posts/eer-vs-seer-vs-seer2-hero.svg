<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">EER vs SEER vs SEER2 - air conditioner efficiency ratings explained</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients and an efficiency rating dial, representing the difference between EER, SEER, and SEER2 air conditioner efficiency ratings.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="dialArc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="50%" stop-color="#FACC15"/>
      <stop offset="100%" stop-color="#01AD9F"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Soft ambient blobs -->
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="280" rx="120" ry="120" fill="url(#indigoGrad)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>

  <g opacity="0.16">
    <circle cx="80" cy="140" r="2" fill="#94A3B8"/>
    <circle cx="120" cy="180" r="2" fill="#94A3B8"/>
    <circle cx="160" cy="120" r="2" fill="#94A3B8"/>
    <circle cx="200" cy="220" r="2" fill="#94A3B8"/>
    <circle cx="100" cy="280" r="2" fill="#94A3B8"/>
    <circle cx="180" cy="320" r="2" fill="#94A3B8"/>
    <circle cx="240" cy="160" r="2" fill="#94A3B8"/>
    <circle cx="60" cy="360" r="2" fill="#94A3B8"/>
  </g>

  <text x="80" y="196" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">EER vs SEER</tspan>
    <tspan x="80" dy="50" fill="#01AD9F">vs SEER2</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Efficiency, decoded</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Efficiency rating dial -->
  <g filter="url(#glow)">
    <path d="M620 320 A 130 130 0 0 1 880 320" stroke="url(#dialArc)" stroke-width="18" stroke-linecap="round" fill="none"/>
  </g>
  <!-- Dial track ticks -->
  <g stroke="#94A3B8" stroke-width="2" opacity="0.5">
    <line x1="630" y1="276" x2="644" y2="284"/>
    <line x1="688" y1="226" x2="697" y2="240"/>
    <line x1="750" y1="206" x2="750" y2="222"/>
    <line x1="812" y1="226" x2="803" y2="240"/>
    <line x1="870" y1="276" x2="856" y2="284"/>
  </g>
  <!-- Needle pointing to high-efficiency end -->
  <g transform="rotate(48 750 320)">
    <line x1="750" y1="320" x2="750" y2="214" stroke="#152035" stroke-width="4" stroke-linecap="round"/>
  </g>
  <circle cx="750" cy="320" r="12" fill="#FFFFFF" stroke="#152035" stroke-width="3"/>

  <!-- Dial labels -->
  <text x="616" y="346" text-anchor="middle" fill="#EA580C" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">Low</text>
  <text x="884" y="346" text-anchor="middle" fill="#01AD9F" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">High</text>

  <!-- Rating badge -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="700" y="366" width="100" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="750" y="392" text-anchor="middle" fill="#0F766E" font-size="16" font-weight="800" letter-spacing="0.5">SEER2 16</text>
  </g>

  <!-- Floating rounded shapes -->
  <rect x="700" y="92" width="64" height="64" rx="16" fill="#FFFFFF" fill-opacity="0.7" stroke="#BAE6FD" stroke-width="1.5" transform="rotate(-12 732 124)"/>
  <circle cx="888" cy="150" r="26" fill="#FFFFFF" fill-opacity="0.65" stroke="#99F6E4" stroke-width="1.5"/>
  <rect x="612" y="120" width="52" height="52" rx="14" fill="#FFFFFF" fill-opacity="0.6" stroke="#C7D2FE" stroke-width="1.5" transform="rotate(18 638 146)"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
