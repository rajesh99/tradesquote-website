<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">What Is CFM - HVAC airflow explained</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, a duct mouth, and curved air streamlines representing the volume of air an HVAC system moves per minute.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="ductGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="streamTeal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="streamBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="streamIndigo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Soft ambient blobs -->
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="280" rx="120" ry="120" fill="url(#indigoGrad)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>

  <g opacity="0.16">
    <circle cx="80" cy="140" r="2" fill="#94A3B8"/>
    <circle cx="120" cy="180" r="2" fill="#94A3B8"/>
    <circle cx="160" cy="120" r="2" fill="#94A3B8"/>
    <circle cx="200" cy="220" r="2" fill="#94A3B8"/>
    <circle cx="100" cy="280" r="2" fill="#94A3B8"/>
    <circle cx="180" cy="320" r="2" fill="#94A3B8"/>
    <circle cx="240" cy="160" r="2" fill="#94A3B8"/>
    <circle cx="60" cy="360" r="2" fill="#94A3B8"/>
  </g>

  <text x="80" y="200" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">What Is CFM?</tspan>
    <tspan x="80" dy="50" fill="#01AD9F">Airflow, explained</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Volume of air per minute</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Duct mouth -->
  <path d="M548 150 L548 350 L640 320 L640 180 Z" fill="url(#ductGrad)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.55"/>
  <ellipse cx="640" cy="250" rx="22" ry="70" fill="#FFFFFF" fill-opacity="0.55" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.5"/>
  <ellipse cx="548" cy="250" rx="14" ry="100" fill="#01AD9F" fill-opacity="0.10"/>

  <!-- Curved air streamlines flowing out of the duct -->
  <path d="M648 200 C 730 180, 800 200, 900 168" stroke="url(#streamBlue)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.8" filter="url(#glow)"/>
  <path d="M650 232 C 740 224, 820 236, 920 220" stroke="url(#streamTeal)" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.9" filter="url(#glow)"/>
  <path d="M650 268 C 740 276, 820 264, 920 280" stroke="url(#streamTeal)" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.9" filter="url(#glow)"/>
  <path d="M648 300 C 730 320, 800 300, 900 332" stroke="url(#streamIndigo)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.75" filter="url(#glow)"/>

  <!-- Arrow heads on the lead streamlines -->
  <path d="M900 168 l -14 -3 l 9 11" fill="#0EA5E9" opacity="0.85"/>
  <path d="M920 220 l -14 -2 l 8 12" fill="#01AD9F" opacity="0.9"/>
  <path d="M920 280 l -14 2 l 8 -12" fill="#01AD9F" opacity="0.9"/>
  <path d="M900 332 l -14 3 l 9 -11" fill="#6366F1" opacity="0.8"/>

  <!-- Floating rounded shapes -->
  <rect x="700" y="92" width="64" height="64" rx="16" fill="#FFFFFF" fill-opacity="0.7" stroke="#BAE6FD" stroke-width="1.5" transform="rotate(-12 732 124)"/>
  <circle cx="870" cy="120" r="26" fill="#FFFFFF" fill-opacity="0.65" stroke="#99F6E4" stroke-width="1.5"/>
  <rect x="840" y="370" width="52" height="52" rx="14" fill="#FFFFFF" fill-opacity="0.6" stroke="#C7D2FE" stroke-width="1.5" transform="rotate(18 866 396)"/>
  <circle cx="760" cy="400" r="18" fill="#FFFFFF" fill-opacity="0.6" stroke="#5EEAD4" stroke-width="1.5"/>

  <!-- CFM badge -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="566" y="234" width="64" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="598" y="255" text-anchor="middle" fill="#0F766E" font-size="13" font-weight="700" letter-spacing="1.5">CFM</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
