<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Cost to run central AC - per hour, day, and month</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, an electricity meter dial, and dollar accents representing the cost of running a central air conditioner.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="meterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="dialArc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Soft ambient blobs -->
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="280" rx="120" ry="120" fill="url(#indigoGrad)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>

  <g opacity="0.16">
    <circle cx="80" cy="140" r="2" fill="#94A3B8"/>
    <circle cx="120" cy="180" r="2" fill="#94A3B8"/>
    <circle cx="160" cy="120" r="2" fill="#94A3B8"/>
    <circle cx="200" cy="220" r="2" fill="#94A3B8"/>
    <circle cx="100" cy="280" r="2" fill="#94A3B8"/>
    <circle cx="180" cy="320" r="2" fill="#94A3B8"/>
    <circle cx="240" cy="160" r="2" fill="#94A3B8"/>
    <circle cx="60" cy="360" r="2" fill="#94A3B8"/>
  </g>

  <text x="80" y="200" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Cost to run</tspan>
    <tspan x="80" dy="50" fill="#01AD9F">central AC</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Per hour, day, month</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Electricity meter body -->
  <rect x="560" y="150" width="190" height="210" rx="22" fill="url(#meterGrad)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.55"/>

  <!-- Meter dial -->
  <circle cx="655" cy="232" r="66" fill="#FFFFFF" fill-opacity="0.7" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.5"/>
  <!-- kWh sweep arc -->
  <path d="M610 268 A 64 64 0 1 1 700 268" stroke="url(#dialArc)" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.9" filter="url(#glow)"/>
  <!-- Tick marks -->
  <g stroke="#0F766E" stroke-width="2" opacity="0.5">
    <line x1="655" y1="172" x2="655" y2="182"/>
    <line x1="705" y1="232" x2="695" y2="232"/>
    <line x1="605" y1="232" x2="615" y2="232"/>
    <line x1="690" y1="197" x2="683" y2="204"/>
    <line x1="620" y1="197" x2="627" y2="204"/>
  </g>
  <!-- Needle -->
  <line x1="655" y1="232" x2="693" y2="200" stroke="#152035" stroke-width="3" stroke-linecap="round"/>
  <circle cx="655" cy="232" r="5" fill="#152035"/>
  <!-- kWh label -->
  <text x="655" y="304" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" letter-spacing="1">kWh</text>

  <!-- Dollar accents -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <circle cx="838" cy="180" r="30" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="838" y="190" text-anchor="middle" fill="#01AD9F" font-size="26" font-weight="800">$</text>

    <circle cx="800" cy="300" r="22" fill="#FFFFFF" fill-opacity="0.85" stroke="#BAE6FD" stroke-width="1.5"/>
    <text x="800" y="308" text-anchor="middle" fill="#0EA5E9" font-size="18" font-weight="800">$</text>

    <circle cx="880" cy="350" r="18" fill="#FFFFFF" fill-opacity="0.8" stroke="#C7D2FE" stroke-width="1.5"/>
    <text x="880" y="356" text-anchor="middle" fill="#6366F1" font-size="14" font-weight="800">$</text>
  </g>

  <!-- Floating rounded shapes -->
  <rect x="700" y="92" width="56" height="56" rx="16" fill="#FFFFFF" fill-opacity="0.7" stroke="#BAE6FD" stroke-width="1.5" transform="rotate(-12 728 120)"/>
  <circle cx="760" cy="410" r="18" fill="#FFFFFF" fill-opacity="0.6" stroke="#5EEAD4" stroke-width="1.5"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
