<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Duct size chart for CFM</title>
  <desc>Abstract hero graphic with soft gradients, round and rectangular duct shapes and airflow arrows representing a CFM to duct size lookup chart.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="ductGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="streamCool" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="200" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Duct size</tspan>
    <tspan x="80" dy="50" fill="#01AD9F">for your CFM</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Match airflow to the right size</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Round duct (end-on) -->
  <ellipse cx="640" cy="190" rx="70" ry="70" fill="url(#ductGrad)" stroke="#01AD9F" stroke-width="2.5" stroke-opacity="0.6"/>
  <ellipse cx="640" cy="190" rx="44" ry="44" fill="none" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="640" y="196" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800">round</text>

  <!-- Rectangular duct -->
  <rect x="780" y="150" width="120" height="80" rx="8" fill="url(#ductGrad)" stroke="#2563EB" stroke-width="2.5" stroke-opacity="0.55"/>
  <text x="840" y="196" text-anchor="middle" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800">rect</text>

  <!-- Airflow arrows -->
  <path d="M540 320 C 620 320, 740 320, 900 320" stroke="url(#streamCool)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.8" filter="url(#glow)"/>
  <path d="M900 320 l -16 -5 l 6 12" fill="#0EA5E9" opacity="0.9"/>
  <path d="M540 360 C 620 360, 740 360, 880 360" stroke="url(#streamCool)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6" filter="url(#glow)"/>
  <path d="M880 360 l -16 -5 l 6 12" fill="#0EA5E9" opacity="0.75"/>

  <!-- CFM badge -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="592" y="276" width="96" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="640" y="296" text-anchor="middle" fill="#0F766E" font-size="12" font-weight="700" letter-spacing="1">CFM</text>
  </g>

  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
