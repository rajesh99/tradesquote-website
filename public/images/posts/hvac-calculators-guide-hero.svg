<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">HVAC calculators</title>
  <desc id="heroDesc">Abstract hero graphic showing a grid of calculator tiles labeled BTU, CFM, SEER, dollar, delta T, and tons, representing a hub of free HVAC calculators for sizing, airflow, and cost.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bgGrad)"/>
  <ellipse cx="790" cy="120" rx="210" ry="170" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="660" cy="390" rx="190" ry="150" fill="url(#tealGrad)" filter="url(#softBlur)"/>

  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="80" y="195" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">HVAC</tspan>
    <tspan x="80" dy="48" fill="#01AD9F">calculators</tspan>
  </text>
  <text x="80" y="295" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Free tools for sizing, airflow &amp; cost</text>
  <rect x="80" y="319" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="560" y="150" width="170" height="74" rx="14" fill="#E8F8F6" stroke="#01AD9F" stroke-width="1.6" stroke-opacity="0.6"/>
    <text x="580" y="190" fill="#0F766E" font-size="24" font-weight="800">BTU</text>
    <text x="580" y="210" fill="#64748B" font-size="11">cooling load</text>

    <rect x="748" y="150" width="170" height="74" rx="14" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.6" stroke-opacity="0.55"/>
    <text x="768" y="190" fill="#1D4ED8" font-size="24" font-weight="800">CFM</text>
    <text x="768" y="210" fill="#64748B" font-size="11">airflow</text>

    <rect x="560" y="238" width="170" height="74" rx="14" fill="#E8F8F6" stroke="#01AD9F" stroke-width="1.6" stroke-opacity="0.6"/>
    <text x="580" y="278" fill="#0F766E" font-size="24" font-weight="800">SEER</text>
    <text x="580" y="298" fill="#64748B" font-size="11">efficiency</text>

    <rect x="748" y="238" width="170" height="74" rx="14" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.6" stroke-opacity="0.5"/>
    <text x="768" y="280" fill="#C2410C" font-size="26" font-weight="800">$</text>
    <text x="768" y="298" fill="#64748B" font-size="11">install &amp; cost</text>

    <rect x="560" y="326" width="170" height="74" rx="14" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.6" stroke-opacity="0.55"/>
    <text x="580" y="366" fill="#1D4ED8" font-size="22" font-weight="800">ΔT</text>
    <text x="580" y="386" fill="#64748B" font-size="11">diagnostics</text>

    <rect x="748" y="326" width="170" height="74" rx="14" fill="#E8F8F6" stroke="#01AD9F" stroke-width="1.6" stroke-opacity="0.6"/>
    <text x="768" y="366" fill="#0F766E" font-size="22" font-weight="800">tons</text>
    <text x="768" y="386" fill="#64748B" font-size="11">sizing</text>
  </g>

  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
