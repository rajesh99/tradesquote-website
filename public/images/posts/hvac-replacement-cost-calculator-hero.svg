<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">HVAC Replacement Cost Calculator</title>
  <desc id="heroDesc">Abstract hero graphic showing an outdoor AC condenser unit with dollar-badge cost indicators and a teal/blue palette, representing HVAC system replacement cost estimation.</desc>

  <defs>
    <linearGradient id="rc-bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="rc-skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="rc-tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="rc-unitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="rc-accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="rc-softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="rc-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#rc-bgGrad)"/>
  <ellipse cx="800" cy="110" rx="210" ry="165" fill="url(#rc-skyGrad)" filter="url(#rc-softBlur)"/>
  <ellipse cx="680" cy="390" rx="190" ry="145" fill="url(#rc-tealGrad)" filter="url(#rc-softBlur)"/>

  <!-- Frosted card left -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>
  <text fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" y="205">HVAC Replacement</tspan>
    <tspan x="80" dy="50" fill="#01AD9F">Cost Calculator</tspan>
  </text>
  <text x="80" y="310" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Estimate before you call for quotes</text>
  <rect x="80" y="332" width="56" height="4" rx="2" fill="url(#rc-accentBar)"/>

  <!-- Outdoor condenser unit body -->
  <rect x="555" y="210" width="170" height="200" rx="14" fill="url(#rc-unitGrad)" stroke="#01AD9F" stroke-width="2.5" stroke-opacity="0.55"/>
  <!-- Fan circle on top of condenser -->
  <circle cx="640" cy="255" r="52" fill="#FFFFFF" fill-opacity="0.12" stroke="#2563EB" stroke-width="1.8" stroke-opacity="0.45"/>
  <circle cx="640" cy="255" r="30" fill="#FFFFFF" fill-opacity="0.08" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.4"/>
  <!-- Fan blades -->
  <line x1="640" y1="225" x2="640" y2="285" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="610" y1="255" x2="670" y2="255" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="619" y1="234" x2="661" y2="276" stroke="#01AD9F" stroke-width="1.6" stroke-opacity="0.35"/>
  <line x1="661" y1="234" x2="619" y2="276" stroke="#01AD9F" stroke-width="1.6" stroke-opacity="0.35"/>
  <!-- Coil fins -->
  <line x1="558" y1="310" x2="722" y2="310" stroke="#2563EB" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="558" y1="325" x2="722" y2="325" stroke="#2563EB" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="558" y1="340" x2="722" y2="340" stroke="#2563EB" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="558" y1="355" x2="722" y2="355" stroke="#2563EB" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="558" y1="370" x2="722" y2="370" stroke="#2563EB" stroke-width="1" stroke-opacity="0.18"/>
  <!-- Unit label -->
  <text x="640" y="400" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700">outdoor unit</text>

  <!-- Dollar badge 1 — large -->
  <rect x="755" y="190" width="120" height="48" rx="24" fill="#FFFFFF" fill-opacity="0.90" stroke="#01AD9F" stroke-width="1.8"/>
  <text x="815" y="221" text-anchor="middle" fill="#01AD9F" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" filter="url(#rc-glow)">$7k–$14k</text>

  <!-- Dollar badge 2 — medium -->
  <rect x="790" y="290" width="108" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.88" stroke="#2563EB" stroke-width="1.5"/>
  <text x="844" y="316" text-anchor="middle" fill="#2563EB" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">full system</text>

  <!-- Dollar badge 3 — small -->
  <rect x="760" y="380" width="114" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.86" stroke="#5EEAD4" stroke-width="1.4"/>
  <text x="817" y="403" text-anchor="middle" fill="#0F766E" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">2,000 sq ft</text>

  <!-- Connecting lines from badges to unit -->
  <line x1="755" y1="214" x2="725" y2="255" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.35" stroke-dasharray="4 3"/>
  <line x1="790" y1="310" x2="725" y2="330" stroke="#2563EB" stroke-width="1" stroke-opacity="0.30" stroke-dasharray="4 3"/>

  <!-- Bottom teal strip -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
