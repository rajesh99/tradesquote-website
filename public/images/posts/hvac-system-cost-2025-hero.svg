<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">HVAC system cost 2025 - pricing guide hero</title>
  <desc id="heroDesc">Abstract hero illustration for HVAC installation costs with soft gradients, price range bars, and minimal geometric shapes on a wide panoramic layout.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFBF5"/>
      <stop offset="40%" stop-color="#F0FDFA"/>
      <stop offset="100%" stop-color="#F0F9FF"/>
    </linearGradient>
    <linearGradient id="tealBlob" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="warmBlob" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FDBA74" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="blueBlob" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#F8FAFC" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <ellipse cx="780" cy="100" rx="175" ry="130" fill="url(#tealBlob)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="340" rx="155" ry="120" fill="url(#warmBlob)" filter="url(#softBlur)"/>
  <ellipse cx="640" cy="400" rx="115" ry="90" fill="url(#blueBlob)" filter="url(#softBlur)"/>

  <circle cx="720" cy="260" r="108" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.16"/>
  <circle cx="720" cy="260" r="76" stroke="#2563EB" stroke-width="1.5" stroke-opacity="0.14"/>
  <circle cx="720" cy="260" r="46" stroke="#EA580C" stroke-width="2" stroke-opacity="0.18"/>

  <circle cx="590" cy="115" r="6" fill="#01AD9F" fill-opacity="0.35"/>
  <circle cx="850" cy="175" r="4" fill="#EA580C" fill-opacity="0.35"/>
  <circle cx="920" cy="290" r="5" fill="#2563EB" fill-opacity="0.3"/>
  <circle cx="670" cy="90" r="3.5" fill="#FB923C" fill-opacity="0.4"/>

  <g opacity="0.45">
    <rect x="560" y="88" width="8" height="72" rx="4" fill="#99F6E4"/>
    <rect x="576" y="104" width="8" height="56" rx="4" fill="#01AD9F" fill-opacity="0.55"/>
    <rect x="592" y="96" width="8" height="64" rx="4" fill="#2563EB" fill-opacity="0.45"/>
    <rect x="608" y="112" width="8" height="48" rx="4" fill="#FB923C" fill-opacity="0.5"/>
    <rect x="624" y="100" width="8" height="60" rx="4" fill="#EA580C" fill-opacity="0.4"/>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="548" y="158" width="200" height="220" rx="20" fill="url(#cardGrad)" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect x="548" y="158" width="200" height="48" rx="20" fill="#F8FAFC"/>
    <rect x="548" y="190" width="200" height="16" fill="#F8FAFC"/>
    <text x="572" y="190" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" letter-spacing="0.08em">FULL SYSTEM</text>
    <text x="572" y="212" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="11">AC + furnace, installed</text>

    <text x="648" y="268" text-anchor="middle" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700">$7k - $14k</text>
    <text x="648" y="292" text-anchor="middle" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="11">typical 2,000 sq ft home</text>

    <rect x="572" y="312" width="152" height="10" rx="5" fill="#E2E8F0"/>
    <rect x="572" y="312" width="118" height="10" rx="5" fill="url(#barGrad)"/>

    <rect x="572" y="336" width="70" height="24" rx="12" fill="#F0FDFA" stroke="#01AD9F" stroke-width="1" stroke-opacity="0.4"/>
    <text x="607" y="352" text-anchor="middle" fill="#01AD9F" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">Standard</text>

    <rect x="654" y="336" width="70" height="24" rx="12" fill="#FFF7ED" stroke="#EA580C" stroke-width="1" stroke-opacity="0.4"/>
    <text x="689" y="352" text-anchor="middle" fill="#EA580C" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">High-eff</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="768" y="178" width="168" height="88" rx="16" fill="url(#cardGrad)" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="792" y="210" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Central AC</text>
    <text x="792" y="238" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">$4k  -  $10k</text>
    <rect x="792" y="248" width="120" height="6" rx="3" fill="#E2E8F0"/>
    <rect x="792" y="248" width="88" height="6" rx="3" fill="#2563EB" fill-opacity="0.55"/>

    <rect x="768" y="282" width="168" height="88" rx="16" fill="url(#cardGrad)" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="792" y="314" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Heat pump</text>
    <text x="792" y="342" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">$5.5k  -  $12k</text>
    <rect x="792" y="352" width="120" height="6" rx="3" fill="#E2E8F0"/>
    <rect x="792" y="352" width="96" height="6" rx="3" fill="#01AD9F" fill-opacity="0.55"/>
  </g>

  <g opacity="0.2" transform="translate(610, 68)">
    <rect x="0" y="20" width="52" height="40" rx="6" fill="#152035"/>
    <text x="26" y="46" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700">$</text>
  </g>

  <rect x="48" y="56" width="440" height="388" rx="24" fill="#FFFFFF" fill-opacity="0.35" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.7"/>

  <text x="80" y="176" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">New HVAC System</tspan>
    <tspan x="80" dy="44">Cost in</tspan>
    <tspan x="80" dy="44" fill="#01AD9F">2025</tspan>
  </text>
  <text x="80" y="318" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Installed prices, factors, and what to expect</text>

  <rect x="80" y="342" width="56" height="4" rx="2" fill="url(#accentGrad)"/>

  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
