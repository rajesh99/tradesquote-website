<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">What Is Manual J - HVAC load calculation explained</title>
  <desc id="heroDesc">Abstract hero graphic with soft gradients, a house outline with heat-flow arrows, and a load gauge representing how a Manual J calculation sizes a home's heating and cooling system.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="45%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#01AD9F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#01AD9F" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="gaugeArc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="streamWarm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="streamCool" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01AD9F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1000" height="500" fill="url(#bgGrad)"/>

  <!-- Soft ambient blobs -->
  <ellipse cx="780" cy="120" rx="200" ry="160" fill="url(#skyGrad)" filter="url(#softBlur)"/>
  <ellipse cx="680" cy="380" rx="180" ry="140" fill="url(#tealGrad)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="280" rx="120" ry="120" fill="url(#indigoGrad)" filter="url(#softBlur)"/>

  <!-- Left headline zone -->
  <rect x="48" y="72" width="400" height="356" rx="24" fill="#FFFFFF" fill-opacity="0.42" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.8"/>

  <g opacity="0.16">
    <circle cx="80" cy="140" r="2" fill="#94A3B8"/>
    <circle cx="120" cy="180" r="2" fill="#94A3B8"/>
    <circle cx="160" cy="120" r="2" fill="#94A3B8"/>
    <circle cx="200" cy="220" r="2" fill="#94A3B8"/>
    <circle cx="100" cy="280" r="2" fill="#94A3B8"/>
    <circle cx="180" cy="320" r="2" fill="#94A3B8"/>
    <circle cx="240" cy="160" r="2" fill="#94A3B8"/>
    <circle cx="60" cy="360" r="2" fill="#94A3B8"/>
  </g>

  <text x="80" y="200" fill="#152035" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.02em">
    <tspan x="80" dy="0">Manual J</tspan>
    <tspan x="80" dy="50" fill="#01AD9F">load calculation</tspan>
  </text>
  <text x="80" y="300" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">Right-size every system</text>
  <rect x="80" y="324" width="56" height="4" rx="2" fill="url(#accentBar)"/>

  <!-- Abstract house outline -->
  <path d="M560 220 L700 130 L840 220 L840 360 L560 360 Z" fill="url(#houseGrad)" stroke="#01AD9F" stroke-width="2" stroke-opacity="0.55"/>
  <path d="M548 228 L700 130 L852 228" fill="none" stroke="#01AD9F" stroke-width="2.5" stroke-opacity="0.6" stroke-linecap="round"/>
  <!-- Window on the house -->
  <rect x="650" y="270" width="56" height="56" rx="6" fill="#FFFFFF" fill-opacity="0.55" stroke="#01AD9F" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="678" y1="270" x2="678" y2="326" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.45"/>
  <line x1="650" y1="298" x2="706" y2="298" stroke="#01AD9F" stroke-width="1.2" stroke-opacity="0.45"/>

  <!-- Heat-loss arrows leaving the house (warm) -->
  <path d="M840 250 C 890 244, 920 250, 956 236" stroke="url(#streamWarm)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.85" filter="url(#glow)"/>
  <path d="M840 290 C 890 296, 920 290, 956 304" stroke="url(#streamWarm)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.75" filter="url(#glow)"/>
  <path d="M956 236 l -14 -3 l 9 11" fill="#EA580C" opacity="0.85"/>
  <path d="M956 304 l -14 3 l 9 -11" fill="#EA580C" opacity="0.8"/>

  <!-- Solar / heat-gain arrows entering the house (cool/blue) -->
  <path d="M560 250 C 510 244, 480 250, 444 236" stroke="url(#streamCool)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.8" filter="url(#glow)"/>
  <path d="M560 250 l 14 -3 l -9 11" fill="#0EA5E9" opacity="0.85"/>

  <!-- Load gauge -->
  <g>
    <path d="M600 432 A 100 100 0 0 1 800 432" fill="none" stroke="#E2E8F0" stroke-width="12" stroke-linecap="round"/>
    <path d="M600 432 A 100 100 0 0 1 760 372" fill="none" stroke="url(#gaugeArc)" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
    <!-- needle -->
    <line x1="700" y1="432" x2="752" y2="382" stroke="#152035" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="700" cy="432" r="7" fill="#152035"/>
  </g>

  <!-- Floating rounded shapes -->
  <rect x="468" y="110" width="56" height="56" rx="16" fill="#FFFFFF" fill-opacity="0.7" stroke="#BAE6FD" stroke-width="1.5" transform="rotate(-12 496 138)"/>
  <circle cx="900" cy="130" r="24" fill="#FFFFFF" fill-opacity="0.65" stroke="#99F6E4" stroke-width="1.5"/>
  <rect x="470" y="370" width="48" height="48" rx="14" fill="#FFFFFF" fill-opacity="0.6" stroke="#C7D2FE" stroke-width="1.5" transform="rotate(18 494 394)"/>

  <!-- BTU/hr badge -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="652" y="396" width="96" height="30" rx="15" fill="#FFFFFF" fill-opacity="0.92" stroke="#5EEAD4" stroke-width="1.5"/>
    <text x="700" y="416" text-anchor="middle" fill="#0F766E" font-size="12" font-weight="700" letter-spacing="1">BTU/hr</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="496" width="1000" height="4" fill="#01AD9F"/>
</svg>
